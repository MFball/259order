<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Million 麵店 - 專業出單版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/encoding-japanese/2.0.0/encoding.min.js"></script>
    <style>
        :root { --primary: #1a73e8; --secondary: #f0f2f5; --success: #34a853; --price-tag: #d93025; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--secondary); margin: 0; padding: 10px; text-align: center; }
        .container { max-width: 500px; margin: auto; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding-bottom: 90px; min-height: 85vh; position: relative; }
        .step { display: none; animation: fadeIn 0.3s; position: relative; }
        .step.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .back-btn-top { position: absolute; right: 0; top: 0; width: 35px; height: 35px; border-radius: 50%; background: #eee; color: #555; border: none; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; }
        h2 { color: #333; font-size: 1.1rem; margin: 10px 0 20px 0; border-left: 5px solid var(--primary); padding-left: 10px; text-align: left; padding-right: 40px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .opt { background: #fff; border: 2px solid #eee; border-radius: 12px; cursor: pointer; overflow: hidden; position: relative; display: flex; flex-direction: column; min-height: 140px; }
        .img-box { width: 100%; height: 100px; display: flex; background: #fafafa; overflow: hidden; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; flex: 1; }
        .price-label { position: absolute; bottom: 35px; right: 5px; background: var(--price-tag); color: white; padding: 2px 8px; border-radius: 5px; font-size: 12px; font-weight: bold; }
        .opt span { padding: 8px 5px; font-weight: bold; font-size: 0.9rem; }
        .opt.selected { border-color: var(--primary); background: #e8f0fe; }
        .opt.selected::after { content: '✅'; position: absolute; top: 5px; right: 5px; background: white; border-radius: 50%; padding: 2px; font-size: 12px; }
        .cart-box { margin-top: 20px; padding: 15px; border: 2px dashed var(--primary); border-radius: 10px; text-align: left; background: #fffbe6; }
        .cart-item { border-bottom: 1px solid #ddd; padding: 10px 0; display: flex; justify-content: space-between; align-items: center; }
        .total-price-bar { font-size: 1.6rem; color: var(--price-tag); font-weight: bold; margin: 20px 0; }
        .nav-btns { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px; display: flex; gap: 10px; max-width: 500px; margin: auto; box-shadow: 0 -5px 10px rgba(0,0,0,0.05); z-index: 1000; }
        button { flex: 1; padding: 15px; border-radius: 10px; border: none; font-size: 1rem; cursor: pointer; font-weight: bold; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-green { background: var(--success); color: white; }
        #preview-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; justify-content: center; align-items: center; }
        .preview-content { background: #fff; width: 300px; padding: 20px; border-radius: 10px; font-family: monospace; text-align: left; max-height: 80vh; overflow-y: auto; }
        .preview-paper { border: 1px solid #ddd; padding: 10px; background: #fff; line-height: 1.2; white-space: pre-wrap; font-size: 14px; color: #000; }
        .preview-btns { margin-top: 15px; display: flex; gap: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="status" style="font-size: 10px; color: #888; margin-bottom: 5px;">藍牙狀態：未連接</div>
    
    <div class="step active" id="step-start">
        <h2>1. 請選擇類別</h2>
        <div class="grid">
            <div class="opt" onclick="setCategory('湯')">
                <div class="img-box"><img src="https://via.placeholder.com/150?text=Soup"></div>
                <span>湯品類</span>
            </div>
            <div class="opt" onclick="setCategory('面')">
                <div class="img-box"><img src="https://via.placeholder.com/150?text=Noodle"></div>
                <span>麵食類</span>
            </div>
        </div>
    </div>

    <div class="step" id="step-soup-select">
        <button class="back-btn-top" onclick="goNext('step-start')">×</button>
        <h2>2. 選擇湯品 (最多2個)</h2>
        <div class="grid" id="grid-soupItems"></div>
        <div class="nav-btns"><button class="btn-blue" onclick="checkSoupNext()">下一步</button></div>
    </div>

    <div class="step" id="step-food-select">
        <button class="back-btn-top" onclick="goNext('step-start')">×</button>
        <h2>2. 選擇主食</h2>
        <div class="grid" id="grid-foodItems"></div>
    </div>

    <div class="step" id="step-size">
        <button class="back-btn-top" onclick="handleSizeBack()">×</button>
        <h2>3. 選擇大小碼</h2>
        <div class="grid" id="grid-size"></div>
    </div>

    <div class="step" id="step-noodle-type">
        <button class="back-btn-top" onclick="goNext('step-size')">×</button>
        <h2>4. 選擇麵類</h2>
        <div class="grid" id="grid-noodleType"></div>
    </div>

    <div class="step" id="step-sauce-select">
        <button class="back-btn-top" onclick="goNext('step-noodle-type')">×</button>
        <h2>5. 選擇醬料 (最多3個)</h2>
        <div class="grid" id="grid-sauce"></div>
        <div class="nav-btns"><button class="btn-blue" onclick="addToCart()">✅ 加入購物車</button></div>
    </div>

    <div class="step" id="step-finish">
        <h2>🛒 購物車明細</h2>
        <div class="cart-box" id="current-cart"></div>
        <div class="total-price-bar">總計: $<span id="total-sum">0</span></div>
        <div class="nav-btns">
            <button class="btn-blue" onclick="resetForNewItem()">➕ 繼續點餐</button>
            <button class="btn-green" onclick="showPreview()">🖨️ 預覽並列印</button>
        </div>
    </div>
</div>

<div id="preview-modal">
    <div class="preview-content">
        <h3 style="margin-top:0">出單預覽 (省紙模式)</h3>
        <div class="preview-paper" id="paper-content"></div>
        <div class="preview-btns">
            <button style="background:#eee" onclick="closePreview()">取消</button>
            <button class="btn-green" onclick="handleActualPrint()">確認列印</button>
        </div>
    </div>
</div>

<script>
    const config = {
        '魚圓湯': { p: 5 }, '肉圓湯': { p: 5 }, '魚餃湯': { p: 5 }, '三寶湯': { p: 6 },
        '魚圓面': { p: 4 }, '香菇肉碎面': { p: 5 }, '招牌面': { p: 6 }, '餐餐面': { p: 6 },
        '肉圓面': { p: 4 }, '蝦魚面': { p: 5 }, '西刀魚面': { p: 4 }, '香菇面': { p: 5 },
        '魚餃面': { p: 4 }, '(純)肉碎面': { p: 4 }, '小魚香面': { p: 4 },
        '小的': { p: 0 }, '大的': { p: 1 },
        'noodleType': { '面薄': '', '幼面': '', '粿條': '', '熟面': '', '米粉': '', '米太目': '', '冬粉': '', '粿條面': '', '粿條米粉': '', '米粉面': '' },
        'sauce': { '辣椒': '', '茄汁': '', '黑醬油': '', '白醬青': '', '黑醋': '', '(湯)': '' }
    };

    let cart = [];
    let tempItem = { category: '', names: [], size: '', noodle: '', sauces: [], price: 0 };
    let printCharacteristic;

    function init() {
        renderGrid(['魚圓湯','肉圓湯','魚餃湯','三寶湯'], 'grid-soupItems', (val, el) => toggleMulti(val, el, tempItem.names, 2), true);
        const foodList = ['魚圓面', '香菇肉碎面', '招牌面', '餐餐面', '肉圓面', '蝦魚面', '西刀魚面', '香菇面', '魚餃面', '(純)肉碎面', '小魚香面'];
        renderGrid(foodList, 'grid-foodItems', (val) => { tempItem.names = [val]; goNext('step-size'); });
        renderGrid(['小的', '大的'], 'grid-size', (val) => { tempItem.size = val; if(tempItem.category === '湯') addToCart(); else goNext('step-noodle-type'); });
        renderGrid(Object.keys(config.noodleType), 'grid-noodleType', (val) => { tempItem.noodle = val; goNext('step-sauce-select'); });
        renderGrid(Object.keys(config.sauce), 'grid-sauce', (val, el) => toggleMulti(val, el, tempItem.sauces, 3), true);
    }

    function renderGrid(list, containerId, clickFn, isMulti = false) {
        const cont = document.getElementById(containerId);
        if(!cont) return;
        cont.innerHTML = ''; 
        list.forEach(name => {
            const div = document.createElement('div');
            div.className = 'opt';
            div.innerHTML = `<span>${name}</span>${(config[name] && config[name].p > 0) ? '<div class="price-label">+$'+config[name].p+'</div>' : ''}`;
            div.onclick = function() {
                if(!isMulti) { cont.querySelectorAll('.opt').forEach(o => o.classList.remove('selected')); div.classList.add('selected'); }
                clickFn(name, div);
            };
            cont.appendChild(div);
        });
    }

    function setCategory(val) { tempItem.category = val; goNext(val === '湯' ? 'step-soup-select' : 'step-food-select'); }
    function toggleMulti(val, el, list, max) {
        if(list.includes(val)) { list.splice(list.indexOf(val), 1); el.classList.remove('selected'); } 
        else { if(list.length >= max) return alert("最多選"+max+"個"); list.push(val); el.classList.add('selected'); }
    }
    function goNext(id) { document.querySelectorAll('.step').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); window.scrollTo(0,0); }
    function checkSoupNext() { if(tempItem.names.length === 0) return alert("請至少選一個湯品"); goNext('step-size'); }
    function handleSizeBack() { goNext(tempItem.category === '湯' ? 'step-soup-select' : 'step-food-select'); }
    
    function addToCart() {
        let price = 0;
        tempItem.names.forEach(n => price += (config[n]?.p || 0));
        price += (config[tempItem.size]?.p || 0);
        tempItem.price = price;
        cart.push(JSON.parse(JSON.stringify(tempItem)));
        updateCartDisplay();
        goNext('step-finish');
    }

    function updateCartDisplay() {
        let total = 0;
        document.getElementById('current-cart').innerHTML = cart.map((item, i) => {
            total += item.price;
            return `<div class="cart-item"><div><b>#${i+1} ${item.names.join('+')}</b> [${item.size}]<br><small>${item.noodle || ''} ${item.sauces.length ? ' / ' + item.sauces.join(',') : ''}</small></div><div>$${item.price}</div></div>`;
        }).join('');
        document.getElementById('total-sum').innerText = total;
    }

    function resetForNewItem() {
        tempItem = { category: '', names: [], size: '', noodle: '', sauces: [], price: 0 };
        document.querySelectorAll('.opt').forEach(o => o.classList.remove('selected'));
        goNext('step-start');
    }

    function generateReceiptText() {
        let text = "      Million Noodles\n";
        text += "--------------------------------\n";
        cart.forEach((item, i) => {
            text += `#${i+1} ${item.names.join('+')}\n`;
            text += `  [${item.size}] ${item.noodle || ''}\n`;
            if(item.sauces.length) text += `  醬: ${item.sauces.join(',')}\n`;
            text += `                   $${item.price}\n`;
        });
        text += "--------------------------------\n";
        text += `TOTAL:            $${document.getElementById('total-sum').innerText}\n\n`;
        text += "      Thank You!\n\n\n\n";
        return text;
    }

    function showPreview() {
        if(cart.length === 0) return alert("購物車是空的");
        document.getElementById('paper-content').innerText = generateReceiptText();
        document.getElementById('preview-modal').style.display = 'flex';
    }

    function closePreview() { document.getElementById('preview-modal').style.display = 'none'; }

    // --- 核心：iPhone / Big5 優化列印邏輯 ---
    async function handleActualPrint() {
        closePreview();
        const statusEl = document.getElementById('status');
        
        if (!printCharacteristic) {
            try {
                statusEl.innerText = "正在連線 Printer001...";
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: [
                        '0000ffe0-0000-1000-8000-00805f9b34fb', 
                        '000018f0-0000-1000-8000-00805f9b34fb',
                        'e7e11000-49f1-b3a2-991d-7199629b8e36'
                    ]
                });
                
                const server = await device.gatt.connect();
                const services = await server.getPrimaryServices();
                
                for (const service of services) {
                    const characteristics = await service.getCharacteristics();
                    printCharacteristic = characteristics.find(c => 
                        c.properties.write || c.properties.writeWithoutResponse
                    );
                    if (printCharacteristic) break;
                }

                if (!printCharacteristic) throw new Error("找不到列印特徵值");
                statusEl.innerText = "✅ 已連線";
            } catch (err) {
                statusEl.innerText = "❌ 連線失敗";
                alert("連線錯誤：" + err.message);
                return;
            }
        }

        try {
            statusEl.innerText = "正在轉碼並傳送...";
            
            // 1. 初始化印表機 (ESC/POS)
            const initCmd = new Uint8Array([0x1B, 0x40, 0x1C, 0x26]); 
            await printCharacteristic.writeValue(initCmd);

            // 2. 繁體字轉碼 (UTF-16 -> BIG5)
            const content = generateReceiptText();
            const charArray = Array.from(content).map(c => c.charCodeAt(0));
            const big5Array = Encoding.convert(charArray, {
                to: 'BIG5',
                from: 'UNICODE'
            });
            const data = new Uint8Array(big5Array);

            // 3. 分段傳輸 (iPhone 穩定版)
            const CHUNK_SIZE = 20;
            for (let i = 0; i < data.length; i += CHUNK_SIZE) {
                const chunk = data.slice(i, i + CHUNK_SIZE);
                await printCharacteristic.writeValue(chunk);
                // iPhone 需要較長的停頓來處理藍牙數據包
                await new Promise(r => setTimeout(r, 70)); 
            }
            
            statusEl.innerText = "✅ 列印完成";
            alert("成功！請查看列印機");
            cart = [];
            updateCartDisplay();
            resetForNewItem();
        } catch (err) {
            statusEl.innerText = "❌ 傳送出錯";
            alert("列印出錯：" + err.message);
            printCharacteristic = null;
        }
    }

    init();
</script>
</body>
</html>
