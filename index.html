<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Million 麵店 - 最終圖片列印版</title>
    <style>
        :root { --primary: #1a73e8; --secondary: #f0f2f5; --success: #34a853; --price-tag: #d93025; }
        body { font-family: sans-serif; background: var(--secondary); margin: 0; padding: 10px; text-align: center; }
        .container { max-width: 500px; margin: auto; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding-bottom: 90px; min-height: 85vh; position: relative; }
        .step { display: none; animation: fadeIn 0.3s; }
        .step.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .back-btn-top { position: absolute; right: 0; top: 0; width: 35px; height: 35px; border-radius: 50%; background: #eee; color: #555; border: none; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; }
        h2 { color: #333; font-size: 1.1rem; margin: 10px 0 20px 0; border-left: 5px solid var(--primary); padding-left: 10px; text-align: left; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .opt { background: #fff; border: 2px solid #eee; border-radius: 12px; cursor: pointer; overflow: hidden; position: relative; display: flex; flex-direction: column; }
        .img-box { width: 100%; height: 100px; display: flex; background: #fafafa; overflow: hidden; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; flex: 1; }
        .price-label { position: absolute; bottom: 35px; right: 5px; background: var(--price-tag); color: white; padding: 2px 8px; border-radius: 5px; font-size: 12px; font-weight: bold; }
        .opt span { padding: 8px 5px; font-weight: bold; font-size: 0.9rem; }
        .opt.selected { border-color: var(--primary); background: #e8f0fe; }
        .cart-box { margin-top: 20px; padding: 15px; border: 2px dashed var(--primary); border-radius: 10px; text-align: left; background: #fffbe6; }
        .cart-item { border-bottom: 1px solid #ddd; padding: 10px 0; display: flex; justify-content: space-between; align-items: center; }
        .total-price-bar { font-size: 1.6rem; color: var(--price-tag); font-weight: bold; margin: 20px 0; }
        .nav-btns { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px; display: flex; gap: 10px; max-width: 500px; margin: auto; box-shadow: 0 -5px 10px rgba(0,0,0,0.05); z-index: 1000; }
        button { flex: 1; padding: 15px; border-radius: 10px; border: none; font-size: 1rem; cursor: pointer; font-weight: bold; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-green { background: var(--success); color: white; }
        #status { font-size: 11px; color: #666; font-weight: bold; margin-bottom: 5px; }
        canvas { display: none; } /* 平時隱藏繪圖板 */
    </style>
</head>
<body>

<div class="container">
    <div id="status">● 系統就緒</div>
    
    <div class="step active" id="step-start">
        <h2>1. 請選擇類別</h2>
        <div class="grid">
            <div class="opt" onclick="setCategory('湯')">
                <div class="img-box"><img src="https://lh3.googleusercontent.com/pw/AP1GczOoXizYOs7TlJVh_ikXpPT_8uSFOyH2mnDMFvu2CIFXpJVYqNssfvAbgkwksOqIi89J0NAktQdtJStc5KB6YPkxqk0ccWLkjKAGWKILKERYMt_PYsI=w2400?source=screenshot.guru"></div>
                <span>湯品類</span>
            </div>
            <div class="opt" onclick="setCategory('面')">
                <div class="img-box"><img src="https://lh3.googleusercontent.com/pw/AP1GczM1EgErnLz57PZ0ckyDapaXUx27rggwr5VvU49Yo1vpygNeiLiTCVK6nGMT7UewX9jWyWN7Q04y5g8QeGtKBFBtYod8YZd1L42sFsRuRCpY2EvidrI=w2400?source=screenshot.guru"></div>
                <span>麵食類</span>
            </div>
        </div>
    </div>

    <div class="step" id="step-soup-select">
        <button class="back-btn-top" onclick="goNext('step-start')">←</button>
        <h2>2. 選擇湯品 (最多2個)</h2>
        <div class="grid" id="grid-soupItems"></div>
        <div class="nav-btns"><button class="btn-blue" onclick="checkSoupNext()">下一步</button></div>
    </div>

    <div class="step" id="step-food-select">
        <button class="back-btn-top" onclick="goNext('step-start')">←</button>
        <h2>2. 選擇主食</h2>
        <div class="grid" id="grid-foodItems"></div>
    </div>

    <div class="step" id="step-size">
        <button class="back-btn-top" onclick="handleSizeBack()">←</button>
        <h2>3. 選擇大小</h2>
        <div class="grid" id="grid-size"></div>
    </div>

    <div class="step" id="step-noodle-type">
        <button class="back-btn-top" onclick="goNext('step-size')">←</button>
        <h2>4. 選擇麵類</h2>
        <div class="grid" id="grid-noodleType"></div>
    </div>

    <div class="step" id="step-sauce-select">
        <button class="back-btn-top" onclick="goNext('step-noodle-type')">←</button>
        <h2>5. 選擇醬料</h2>
        <div class="grid" id="grid-sauce"></div>
        <div class="nav-btns"><button class="btn-blue" onclick="addToCart()">✅ 加入購物車</button></div>
    </div>

    <div class="step" id="step-finish">
        <h2>🛒 購物車明細</h2>
        <div class="cart-box" id="current-cart"></div>
        <div class="total-price-bar">總計: $<span id="total-sum">0</span></div>
        <div class="nav-btns">
            <button class="btn-blue" onclick="resetForNewItem()">➕ 繼續點餐</button>
            <button class="btn-green" onclick="handleImagePrint()">🖨️ 圖片化列印</button>
        </div>
    </div>
</div>

<canvas id="printCanvas" width="384"></canvas>

<script>
    const config = {
        '魚圓湯': { p: 5, img: 'https://lh3.googleusercontent.com/pw/AP1GczOoXizYOs7TlJVh_ikXpPT_8uSFOyH2mnDMFvu2CIFXpJVYqNssfvAbgkwksOqIi89J0NAktQdtJStc5KB6YPkxqk0ccWLkjKAGWKILKERYMt_PYsI=w2400?source=screenshot.guru' }, 
        '肉圓湯': { p: 5, img: 'https://lh3.googleusercontent.com/pw/AP1GczO53IM8P6okuoqH4lpXGLStyLy4PSLp2LEAXBolANcUA0dm0WBHCGxJ965cGrMP9F72cF24Uln8JbdwG9pt910rs1pG-dnU-CrwKWKcOhZoPnNbR6Q=w2400?source=screenshot.guru' }, 
        '魚餃湯': { p: 5, img: 'https://lh3.googleusercontent.com/pw/AP1GczN3UWnlef_F80kDzpyJtDbUke-trWR_2HA4zVAnHG8PlM1N9FoBkIAThTpdOffxXiIKGYn9gNQV9Defs8T8CC7ChbKQGKCLctVtW-G84qTu6qGcuvM=w2400?source=screenshot.guru' }, 
        '三寶湯': { p: 6, img: 'https://lh3.googleusercontent.com/pw/AP1GczOGkSr6douVYw5ED49ONXDbTqp9tX92Syg3QnRHG43a8zZebTgtjWEUXgLieeqYOw-7CQdLF9Tm_1aVhak1HCxrCdPKf6lwtrrL9GopjkdCwX9FUtM=w2400?source=screenshot.guru' },
        '魚圓面': { p: 4, img: 'https://lh3.googleusercontent.com/pw/AP1GczM1EgErnLz57PZ0ckyDapaXUx27rggwr5VvU49Yo1vpygNeiLiTCVK6nGMT7UewX9jWyWN7Q04y5g8QeGtKBFBtYod8YZd1L42sFsRuRCpY2EvidrI=w2400?source=screenshot.guru' }, 
        '香菇肉碎面': { p: 5, img: 'https://lh3.googleusercontent.com/pw/AP1GczPRrBESQHr4MjJaDdiXYFda03b72aUrxqrO--coLUrariBXksy0KTPNNaXhzOmmrVhkbChOGKQFqiR8zRRcPZWSd7Hk-inOhSXStOXgC8d0a85lycU=w2400?source=screenshot.guru' },
        '招牌面': { p: 6, img: 'https://lh3.googleusercontent.com/pw/AP1GczOVfyFF0BVjs49utoC4oxktdqpCblSROVp-z7A0aH5pjECVNDmcaKulF2YA7DBUEDZxzEij53427j1LqfZYPzUSFGdUM2_Zt-aYxIYJY40qAfH5wq8=w2400?source=screenshot.guru' }, 
        '餐餐面': { p: 6, img: 'https://lh3.googleusercontent.com/pw/AP1GczPI477AgneL3f4pcuLKg25GQlwB9XCNdxRaABOxwTvciSuYeGzbEu1cez6OIb25ZSS6RMchPIuuTEFHKttxXRnvYboZ5PQh-0HJH1MtI49AWBL1GDA=w2400?source=screenshot.guru' }, 
        '肉圓面': { p: 4, img: 'https://lh3.googleusercontent.com/pw/AP1GczO2J-xP5sDqsYL-5nFYQgmYldq26dabn-ezwb-vCUGDZ-S5nq_i7dsnWNmsswG5ippV0aBSwxf3zx6lfCHrhVOehydel1JSOBnr0aXMXmInJ1_9gnM=w2400?source=screenshot.guru' }, 
        '蝦魚面': { p: 5, img: 'https://lh3.googleusercontent.com/pw/AP1GczPzLY41C33tAb9NV8EUJrRpiZGqc1WqVhSNhr9K5H41JKgfnEG4CqFIDluEUqs4wRf67VHhOcvgN_9z1J6UrQAQWtj-SvpBk8V7RoiRxNjsTE-NfVE=w2400?source=screenshot.guru' }, 
        '西刀魚面': { p: 4, img: 'https://lh3.googleusercontent.com/pw/AP1GczP8Id6j5IYXzYS9x0xyNmfZWXGzQHCdfQBNbC34EmSqOTaA8rw5DGfhdsijfjfb_EnoCdl4nbXlowqkys6NnbQok762CxfDYno4mODYOp4oEp4EqAM=w2400?source=screenshot.guru' }, 
        '香菇面': { p: 5, img: 'https://lh3.googleusercontent.com/pw/AP1GczOMJvr-1snMcDEsJsBV_QX2oISkKXtVZQGiajhBRNCUkTEpzev8LTJzjQ4jzeziLq4inDVPgROLRQ9NXxT3tnZGxJAgPNtPg3lgC-Cs582xH1jRiho=w2400?source=screenshot.guru' }, 
        '魚餃面': { p: 4, img: 'https://placehold.co/200x150?text=FishDumpling' }, 
        '(純)肉碎面': { p: 4, img: 'https://placehold.co/200x150?text=MincedMeat' },
        '小魚香面': { p: 4, img: 'https://lh3.googleusercontent.com/pw/AP1GczMOea7U-V10ztFr3Yim6w3K_-waMrZWgn9f5VdLk6JeObgOJpJu47IZGZ_N2Ok0WW57U0oCvjQ8Cd1llJYnEiMKw5BSLetmhF5BBxFnnGQwFCqmUjE=w2400?source=screenshot.guru' }, 
        '小的': { p: 0, img: 'https://lh3.googleusercontent.com/pw/AP1GczPVUDzaSjsxGM5SLTH5vQ1L3q_kYvg-rODSuyuaMc7cvzy7mE6J444Su11jn8BcNozPnU1HugjPWT7yrwmi32UXTzLVKmnU8UxmXgChQwef44QHmks=w2400?source=screenshot.guru' }, 
        '大的': { p: 1, img: 'https://lh3.googleusercontent.com/pw/AP1GczMvZGsBT3O0_nf6xlgiB6CabiQfww_9AMqN0gtyoo7SQtrWKBMnV73nMe6xLathms5gRBnv-nGEs6sK0kT6SHvbjlnbmd40MmVv1R9m7xLD3eoBYZg=w2400?source=screenshot.guru' },
        'noodleType': { '面薄':'15','幼面':'16','粿條':'17','熟面':'18','米粉':'19','米太目':'20','冬粉':'21','粿條面':'17','粿條米粉':'17','米粉面':'19' },
        'sauce': { '辣椒':'22','茄汁':'23','黑醬油':'24','白醬青':'25','黑醋':'26','(湯)':'27' }
    };

    let cart = [];
    let tempItem = { category: '', names: [], size: '', noodle: '', sauces: [], price: 0 };

    function init() {
        renderGrid(['魚圓湯','肉圓湯','魚餃湯','三寶湯'], 'grid-soupItems', (val, el) => toggleMulti(val, el, tempItem.names, 2), true);
        const foodList = ['魚圓面', '香菇肉碎面', '招牌面', '餐餐面', '肉圓面', '蝦魚面', '西刀魚面', '香菇面', '魚餃面', '(純)肉碎面', '小魚香面'];
        renderGrid(foodList, 'grid-foodItems', (val) => { tempItem.names = [val]; goNext('step-size'); });
        renderGrid(['小的', '大的'], 'grid-size', (val) => { 
            tempItem.size = val; 
            if(tempItem.category === '湯') addToCart(); else goNext('step-noodle-type'); 
        });
        renderGrid(Object.keys(config.noodleType), 'grid-noodleType', (val) => { tempItem.noodle = val; goNext('step-sauce-select'); });
        renderGrid(Object.keys(config.sauce), 'grid-sauce', (val, el) => toggleMulti(val, el, tempItem.sauces, 3), true);
    }

    function renderGrid(list, id, clickFn, multi = false) {
        const cont = document.getElementById(id); if(!cont) return;
        cont.innerHTML = '';
        list.forEach(name => {
            const div = document.createElement('div');
            div.className = 'opt';
            let imgSrc = (id === 'grid-noodleType') ? `http://googleusercontent.com/profile/picture/${config.noodleType[name]}` : (id === 'grid-sauce' ? `http://googleusercontent.com/profile/picture/${config.sauce[name]}` : config[name]?.img);
            div.innerHTML = `<div class="img-box"><img src="${imgSrc}"></div><span>${name}</span>`;
            div.onclick = () => {
                if(!multi) { Array.from(cont.children).forEach(c=>c.classList.remove('selected')); div.classList.add('selected'); }
                clickFn(name, div);
            };
            cont.appendChild(div);
        });
    }

    function setCategory(val) { tempItem.category = val; goNext(val === '湯' ? 'step-soup-select' : 'step-food-select'); }
    function toggleMulti(val, el, list, max) {
        if(list.includes(val)) { list.splice(list.indexOf(val), 1); el.classList.remove('selected'); }
        else { if(list.length >= max) return alert("最多"+max+"個"); list.push(val); el.classList.add('selected'); }
    }
    function goNext(id) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0,0);
    }
    function checkSoupNext() { if(tempItem.names.length===0) return; goNext('step-size'); }
    function handleSizeBack() { goNext(tempItem.category === '湯' ? 'step-soup-select' : 'step-food-select'); }

    function addToCart() {
        let p = 0; tempItem.names.forEach(n => p += (config[n]?.p || 0));
        p += (config[tempItem.size]?.p || 0);
        tempItem.price = p;
        cart.push(JSON.parse(JSON.stringify(tempItem)));
        updateCartDisplay();
        goNext('step-finish');
    }

    function updateCartDisplay() {
        let total = 0;
        document.getElementById('current-cart').innerHTML = cart.map((item, i) => {
            total += item.price;
            return `<div class="cart-item"><div><b>#${i+1} ${item.names.join('+')}</b> [${item.size}]<br><small>${item.noodle||''} ${item.sauces.join(',')}</small></div><div>$${item.price}</div></div>`;
        }).join('');
        document.getElementById('total-sum').innerText = total;
    }

    function resetForNewItem() {
        tempItem = { category: '', names: [], size: '', noodle: '', sauces: [], price: 0 };
        document.querySelectorAll('.opt').forEach(o => o.classList.remove('selected'));
        goNext('step-start');
    }

    async function handleImagePrint() {
        const status = document.getElementById('status');
        const canvas = document.getElementById('printCanvas');
        const ctx = canvas.getContext('2d');
        
        try {
            status.innerText = "⏳ 繪製收據中...";
            canvas.height = 200 + (cart.length * 100);
            ctx.fillStyle = "white"; ctx.fillRect(0, 0, 384, canvas.height);
            ctx.fillStyle = "black"; ctx.textAlign = "center";
            ctx.font = "bold 32px sans-serif"; ctx.fillText("Million Noodles", 192, 50);
            
            ctx.textAlign = "left"; ctx.font = "24px sans-serif";
            let y = 100;
            cart.forEach((item, i) => {
                ctx.fillText(`#${i+1} ${item.names.join('+')} [${item.size}]`, 10, y); y += 35;
                ctx.font = "20px sans-serif"; ctx.fillText(`   ${item.noodle||''} ${item.sauces.join(',')}`, 10, y); y += 45;
                ctx.font = "24px sans-serif";
            });
            ctx.fillText("----------------------------", 10, y); y += 40;
            ctx.font = "bold 28px sans-serif"; ctx.fillText("TOTAL: $" + document.getElementById('total-sum').innerText, 10, y);

            status.innerText = "⏳ 正在連線...";
            const dev = await navigator.bluetooth.requestDevice({ acceptAllDevices: true, optionalServices: ['0000ffe0-0000-1000-8000-00805f9b34fb'] });
            const srv = await dev.gatt.connect();
            const sc = await srv.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
            const cs = await sc.getCharacteristics();
            const bleChar = cs.find(c => c.properties.write || c.properties.writeWithoutResponse);

            status.innerText = "📤 圖片列印中 (請勿離開)...";
            const imgData = ctx.getImageData(0, 0, 384, canvas.height);
            const pixels = imgData.data;

            // ESC/POS 圖片列印模式
            await bleChar.writeValue(new Uint8Array([0x1B, 0x40])); // 重設
            const widthBytes = 384 / 8;

            for (let y = 0; y < canvas.height; y++) {
                let data = new Uint8Array(8 + widthBytes);
                data.set([0x1D, 0x76, 0x30, 0, widthBytes, 0, 1, 0]);
                for (let x = 0; x < widthBytes; x++) {
                    let b = 0;
                    for (let bit = 0; bit < 8; bit++) {
                        let idx = ((y * 384) + (x * 8 + bit)) * 4;
                        if (pixels[idx] < 128) b |= (1 << (7 - bit));
                    }
                    data[8 + x] = b;
                }
                await bleChar.writeValue(data);
                if (y % 10 === 0) await new Promise(r => setTimeout(r, 50));
            }

            await bleChar.writeValue(new Uint8Array([0x1B, 0x64, 0x05])); // 走紙
            status.innerText = "✅ 列印完成";
            cart = []; updateCartDisplay(); resetForNewItem();

        } catch (e) { alert("錯誤: " + e.message); status.innerText = "❌ 列印失敗"; }
    }
    init();
</script>
</body>
</html>
