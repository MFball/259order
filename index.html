<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Million 麵店 - 排版最終修正版</title>
    <style>
        :root { --primary: #1a73e8; --secondary: #f0f2f5; --success: #34a853; --price-tag: #d93025; --cancel: #666; }
        body { font-family: sans-serif; background: var(--secondary); margin: 0; padding: 10px; text-align: center; }
        .container { max-width: 500px; margin: auto; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding-bottom: 110px; min-height: 85vh; position: relative; }
        .step { display: none; animation: fadeIn 0.3s; }
        .step.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .back-btn-top { position: absolute; right: 0; top: 0; width: 35px; height: 35px; border-radius: 50%; background: #eee; color: #555; border: none; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; }
        h2 { color: #333; font-size: 1.1rem; margin: 10px 0 5px 0; border-left: 5px solid var(--primary); padding-left: 10px; text-align: left; }
        .history-btn { background: #607d8b; color: white; padding: 5px 12px; border-radius: 15px; font-size: 0.8rem; position: absolute; left: 15px; top: 15px; border: none; cursor: pointer; }
        .order-info-bar { background: #fdf2f2; padding: 8px; border-radius: 10px; margin-bottom: 15px; text-align: left; font-size: 0.9rem; border: 1px dashed var(--price-tag); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .opt { background: #fff; border: 2px solid #eee; border-radius: 12px; cursor: pointer; overflow: hidden; position: relative; display: flex; flex-direction: column; min-height: 140px; }
        .img-box { width: 100%; height: 100px; display: flex; background: #fafafa; overflow: hidden; position: relative; justify-content: center; align-items: center; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .price-circle { position: absolute; top: 5px; right: 5px; background: var(--price-tag); color: white; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 5; border: 2px solid white; }
        .opt span { padding: 8px 5px; font-weight: bold; font-size: 0.9rem; flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        .opt.selected { border-color: var(--primary); background: #e8f0fe; }
        .cart-box { margin-top: 20px; padding: 10px; border: 1px solid #ddd; border-radius: 10px; text-align: left; background: #fff; }
        .cart-item { border-bottom: 1px solid #eee; padding: 8px 0; display: flex; justify-content: space-between; align-items: center; }
        .total-price-bar { font-size: 1.6rem; color: var(--price-tag); font-weight: bold; margin: 15px 0; }
        .nav-btns { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px; display: flex; gap: 8px; max-width: 500px; margin: auto; box-shadow: 0 -5px 10px rgba(0,0,0,0.05); z-index: 1000; }
        button { flex: 1; padding: 12px 5px; border-radius: 10px; border: none; font-size: 0.95rem; cursor: pointer; font-weight: bold; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-green { background: var(--success); color: white; }
        .btn-red { background: var(--price-tag); color: white; }
        #status { font-size: 11px; color: #d93025; font-weight: bold; margin-bottom: 5px; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="status">● 藍牙待機中</div>
    <div class="step active" id="step-start">
        <button class="history-btn" onclick="showHistory()">📜 歷史紀錄</button>
        <h2 style="margin-top: 40px;">1. 請選擇類別</h2>
        <div class="grid">
            <div class="opt" onclick="setCategory('湯')"><div class="img-box"><img src="https://lh3.googleusercontent.com/pw/AP1GczPcUu3GOW3xZtOFVh7le33bCNVW4F1tyBvv5cJ2V7meVDPq0zf1ZGjITf5IZdLkRv1icKIZPDvvAphvYNS6T0ZNbId2RSHGREkuS7uzTiz8boh3Fo8=w2400?source=screenshot.guru"></div><span>湯品類</span></div>

        </div>
    </div>
    <div class="step" id="step-history"><button class="back-btn-top" onclick="goNext('step-start')">←</button><h2>今天訂單歷史</h2><div id="history-container" class="history-list"></div></div>
    <div class="step" id="step-soup-select"><button class="back-btn-top" onclick="goNext('step-start')">←</button><h2>2. 請選擇湯品</h2><div class="grid" id="grid-soupItems"></div></div>
    <div class="step" id="step-food-select"><button class="back-btn-top" onclick="goNext('step-start')">←</button><h2>2. 請選擇麵食</h2><div class="grid" id="grid-foodItems"></div></div>
    <div class="step" id="step-size"><button class="back-btn-top" onclick="handleSizeBack()">←</button><h2>3. 請選擇大小</h2><div class="grid" id="grid-size"></div></div>
    <div class="step" id="step-noodle-type"><button class="back-btn-top" onclick="goNext('step-size')">←</button><h2>4. 請選擇麵種</h2><div class="grid" id="grid-noodleType"></div><div class="nav-btns"><button class="btn-blue" onclick="checkNoodleNext()">下一步</button></div></div>
    <div class="step" id="step-sauce-select"><button class="back-btn-top" onclick="goNext('step-noodle-type')">←</button><h2>5. 請選擇醬料</h2><div class="grid" id="grid-sauce"></div><div class="nav-btns"><button class="btn-blue" onclick="checkSauceNext()">下一步</button></div></div>
    <div class="step" id="step-no-extra"><button class="back-btn-top" onclick="handleNoExtraBack()">←</button><h2>6. 不要什麼配料？</h2><div class="grid" id="grid-noExtra"></div><div class="nav-btns"><button class="btn-blue" onclick="generatePreviewAndGo()">✅ 加入購物車</button></div></div>
    <div class="step" id="step-finish"><h2>🛒 購物車明細</h2><div class="order-info-bar" id="preview-order-info"></div><div class="cart-box" id="current-cart"></div><div class="total-price-bar">總金額: $<span id="total-sum">0</span></div><div class="nav-btns"><button class="btn-red" onclick="cancelAndClear()">❌ 清空</button><button class="btn-blue" onclick="resetForNewItem()">➕ 繼續點</button><button class="btn-green" id="printBtn" onclick="finalizeAndPrint()">🖨️ 確認並列印</button></div></div>
</div>

        renderGrid(['小的', '大的'], 'grid-size', (val) => { tempItem.size = val; if(tempItem.category === '湯') goNext('step-no-extra'); else goNext('step-noodle-type'); });
        renderGrid(Object.keys(config.noodleType), 'grid-noodleType', (val) => { tempItem.noodle = val; });
        renderGrid(Object.keys(config.sauce), 'grid-sauce', (val, el) => { if (val === '湯') { if (tempItem.sauces.length > 0) return; tempItem.sauces = ['湯']; goNext('step-no-extra'); } else { if (tempItem.sauces.includes('湯')) return; toggleMulti(val, el, tempItem.sauces, 3); } }, true);
        renderGrid(config.noExtra, 'grid-noExtra', (val, el) => { toggleMulti(val, el, tempItem.noExtras, 10); }, true);
    }
    function renderGrid(list, id, clickFn, multi = false) {
        const cont = document.getElementById(id); if(!cont) return;
        cont.innerHTML = '';
        list.forEach(name => {
            const div = document.createElement('div'); div.className = 'opt';
            let imgSrc, price = config[name]?.p || 0;
            if (id === 'grid-noodleType') imgSrc = config.noodleType[name];
            else if (id === 'grid-sauce') imgSrc = config.sauce[name];
            else if (id === 'grid-noExtra') imgSrc = config.noExtraImgs[name]; 
            else { imgSrc = config[name]?.img; }
            const priceTag = (price > 0) ? `<div class="price-circle">$${price}</div>` : '';
            div.innerHTML = `<div class="img-box">${priceTag}<img src="${imgSrc}" onerror="this.style.display='none'; this.nextSibling.style.display='flex';"><div style="display:none; font-size:40px; color:#ddd;">🚫</div></div><span>${name}</span>`;
            div.onclick = () => { if(!multi) Array.from(cont.children).forEach(c=>c.classList.remove('selected')); div.classList.add('selected'); clickFn(name, div); };
            cont.appendChild(div);
        });
    }
    function setCategory(v) { tempItem.category = v; goNext(v === '湯' ? 'step-soup-select' : 'step-food-select'); }
    function toggleMulti(v, el, list, max) { if(list.includes(v)) { list.splice(list.indexOf(v), 1); el.classList.remove('selected'); } else { if(list.length >= max) return; list.push(v); el.classList.add('selected'); } }
    function goNext(id) { document.querySelectorAll('.step').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    function checkNoodleNext() { if(tempItem.noodle) goNext('step-sauce-select'); else alert("請選擇一款麵種！"); }
    function checkSauceNext() { if(tempItem.sauces.length >= 1) goNext('step-no-extra'); else alert("請最少選擇一個醬料！"); }
    function handleSizeBack() { goNext(tempItem.category === '湯' ? 'step-soup-select' : 'step-food-select'); }
    function handleNoExtraBack() { goNext(tempItem.category === '湯' ? 'step-size' : 'step-sauce-select'); }
    function generatePreviewAndGo() {
        let p = 0; tempItem.names.forEach(n => p += (config[n]?.p || 0)); p += (config[tempItem.size]?.p || 0);
        tempItem.price = p; cart.push(JSON.parse(JSON.stringify(tempItem))); updateCartDisplay(); 
        const data = getOrderData(); const now = new Date();
        document.getElementById('preview-order-info').innerHTML = `<b>單號: No.${data.num}</b><br>時間: ${now.toLocaleString()}`;
        goNext('step-finish');
    }
    function updateCartDisplay() {
        let t = 0; document.getElementById('current-cart').innerHTML = cart.map((item, i) => { t += item.price; const shortSize = item.size.replace('大的', '大').replace('小的', '小'); let noExStr = item.noExtras.length > 0 ? `<br><small style="color:red;">[不要: ${item.noExtras.join(',')}]</small>` : ''; return `<div class="cart-item"><div><b>#${i+1} ${item.names.join('+')}</b> [${shortSize}]<br><small>${item.noodle||''} ${item.sauces.join(',')}</small>${noExStr}</div><div>$${item.price}</div></div>`; }).join('');
        document.getElementById('total-sum').innerText = t;
    }

    function finalizeAndPrint() {
        const data = getOrderData(); const now = new Date(); const timeStr = now.toLocaleTimeString();
        const orderRecord = { num: data.num, fullTime: `${now.toLocaleDateString()} ${timeStr}`, items: JSON.parse(JSON.stringify(cart)), total: document.getElementById('total-sum').innerText };
        data.history.push(orderRecord); data.num++; saveOrderData(data);
        drawPrintCanvas(orderRecord); handleImagePrint();
    }

    // --- 修改重點：繪製畫布邏輯 ---
    function drawPrintCanvas(record) {
        const canvas = document.getElementById('printCanvas'), ctx = canvas.getContext('2d');
        const dynamicHeight = 280 + (record.items.length * 160) + 120;
        canvas.height = dynamicHeight;
        ctx.fillStyle = "white"; ctx.fillRect(0, 0, 384, canvas.height);
        ctx.textBaseline = "top"; ctx.fillStyle = "black";
        
        // 1. 至中位置 (確保對準 192)
        ctx.textAlign = "center"; 
        ctx.font = "bold 28px sans-serif"; ctx.fillText("Million FishBall Noodle 259", 192, 20);
        ctx.font = "20px sans-serif"; ctx.fillText(record.fullTime, 192, 55);
        ctx.font = "bold 46px sans-serif"; ctx.fillText(`No. ${record.num}`, 192, 85);
        
        // 2. 左對齊但帶縮進 (避免最右邊文字被切掉，且確保可讀性)
        ctx.textAlign = "left";
        let y = 150;
        record.items.forEach((item, i) => {
            const shortSize = item.size.replace('大的', '大').replace('小的', '小');
            // 品項名稱
            ctx.font = "bold 42px sans-serif"; 
            ctx.fillText(`#${i+1} ${item.names.join('+')}`, 40, y); y += 50;
            // 大小、麵種、醬料
            ctx.font = "bold 33px sans-serif"; 
            ctx.fillText(` [${shortSize}] ${item.noodle||''} ${item.sauces.join(',')}`, 60, y); y += 40;
            
            // 3. 不要什麼配料 (多留一點距離)
            if(item.noExtras.length > 0) {
                y += 15; 
                ctx.font = "bold 30px sans-serif"; 
                ctx.fillText(` [不要: ${item.noExtras.join(',')}]`, 80, y); y += 40;
            }
            y += 20; 
        });

        // 4. 下方至中
        ctx.textAlign = "center";
        ctx.font = "bold 26px sans-serif"; ctx.fillText("----------------------------", 192, y); y += 40;
        ctx.font = "bold 42px sans-serif"; ctx.fillText("TOTAL: $" + record.total, 192, y);
    }

    // --- 藍牙與補印邏輯 ---
    function showHistory() {
        const data = getOrderData(); const cont = document.getElementById('history-container');
        cont.innerHTML = data.history.length === 0 ? '<p>今日暫無訂單</p>' : '';
        data.history.slice().reverse().forEach(ord => {
            const div = document.createElement('div'); div.className = 'history-card';
            div.innerHTML = `<div><b>No.${ord.num}</b><br><small>${ord.fullTime}</small></div><div>$${ord.total} <button class="btn-blue" style="padding:4px 8px; margin-left:10px" onclick='reprintHistory(${ord.num})'>補印</button></div>`;
            cont.appendChild(div);
        });
        goNext('step-history');
    }
    function reprintHistory(num) { const data = getOrderData(); const ord = data.history.find(o => o.num === num); if (ord) { drawPrintCanvas(ord); handleImagePrint(); } }
    function cancelAndClear() { if(confirm("確定要清空所有點餐嗎？")) { cart = []; updateCartDisplay(); resetForNewItem(); } }
    function resetForNewItem() { tempItem = { category: '', names: [], size: '', noodle: '', sauces: [], noExtras: [], price: 0 }; document.querySelectorAll('.opt').forEach(o => o.classList.remove('selected')); goNext('step-start'); }

    async function getPrinter() {
        if (savedDevice && savedDevice.gatt.connected && savedCharacteristic) return savedCharacteristic;
        document.getElementById('status').innerText = "🔍 搜尋印表機...";
        savedDevice = await navigator.bluetooth.requestDevice({ acceptAllDevices: true, optionalServices: ['0000ffe0-0000-1000-8000-00805f9b34fb'] });
        const server = await savedDevice.gatt.connect();
        const services = await server.getPrimaryServices();
        for (const s of services) {
            const chars = await s.getCharacteristics();
            savedCharacteristic = chars.find(c => c.properties.writeWithoutResponse) || chars.find(c => c.properties.write);
            if (savedCharacteristic) { isFastMode = !!chars.find(c => c.properties.writeWithoutResponse); break; }
        }
        return savedCharacteristic;
    }

    async function handleImagePrint() {
        const btn = document.getElementById('printBtn'), canvas = document.getElementById('printCanvas'), ctx = canvas.getContext('2d');
        try {
            btn.disabled = true; const targetChar = await getPrinter();
            document.getElementById('status').innerText = "📤 列印中...";
            const pixels = ctx.getImageData(0, 0, 384, canvas.height).data;
            await targetChar.writeValue(new Uint8Array([0x1B, 0x40])); 
            const widthBytes = 48;
            for (let y = 0; y < canvas.height; y++) {
                let row = new Uint8Array(8 + widthBytes);
                row.set([0x1D, 0x76, 0x30, 0, widthBytes, 0, 1, 0]);
                for (let x = 0; x < widthBytes; x++) {
                    let b = 0;
                    for (let bit = 0; bit < 8; bit++) {
                        let idx = ((y * 384) + (x * 8 + bit)) * 4;
                        if (pixels[idx] * 0.3 + pixels[idx+1] * 0.59 + pixels[idx+2] * 0.11 < 135) b |= (1 << (7 - bit));
                    }
                    row[8 + x] = b;
                }
                if (isFastMode) await targetChar.writeValueWithoutResponse(row); else await targetChar.writeValue(row);
                if (y % 25 === 0) await new Promise(r => setTimeout(r, 60));
            }
            await targetChar.writeValue(new Uint8Array([0x1B, 0x64, 0x06, 0x1D, 0x56, 0x00]));
            document.getElementById('status').innerText = "✅ 完成";
            cart = []; updateCartDisplay(); btn.disabled = false; resetForNewItem();
        } catch (e) { alert(e.message); btn.disabled = false; }
    }
    init();
</script>
