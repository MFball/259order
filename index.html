
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Million Noodles (圖像列印版)</title>
    <style>
        :root { --primary: #1a73e8; --secondary: #f0f2f5; --success: #34a853; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--secondary); margin: 0; padding: 10px; text-align: center; }
        .container { max-width: 500px; margin: auto; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); min-height: 80vh; padding-bottom: 90px; }
        .step { display: none; }
        .step.active { display: block; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .opt { background: #fff; border: 2px solid #eee; border-radius: 12px; padding: 15px 5px; font-weight: bold; cursor: pointer; }
        .opt.selected { border-color: var(--primary); background: #e8f0fe; }
        .cart-box { margin-top: 20px; padding: 15px; border: 2px dashed #ccc; text-align: left; background: #fffbe6; line-height: 1.6; }
        .nav-btns { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px; display: flex; gap: 10px; max-width: 500px; margin: auto; }
        button { flex: 1; padding: 15px; border-radius: 10px; border: none; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-green { background: var(--success); color: white; }
        #canvasContainer { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="step active" id="s1">
        <h2>1. 選擇類別</h2>
        <div class="grid">
            <div class="opt" onclick="setCat('湯')">湯品</div>
            <div class="opt" onclick="setCat('面')">麵食</div>
        </div>
    </div>

    <div class="step" id="s2">
        <h2 id="catTitle">2. 選擇品項</h2>
        <div class="grid" id="itemGrid"></div>
    </div>

    <div class="step" id="s3">
        <h2>🛒 購物車明細</h2>
        <div id="cartBox" class="cart-box"></div>
        <div class="nav-btns">
            <button class="btn-blue" onclick="location.reload()">重新開始</button>
            <button class="btn-green" onclick="printAsImage()">🖨️ 圖像化列印 (解決亂碼)</button>
        </div>
    </div>
</div>

<div id="canvasContainer">
    <canvas id="pCanvas" width="384"></canvas>
</div>

<script>
    let cart = [];
    let printChar;

    function setCat(c) {
        const items = (c === '湯') ? ['魚圓湯', '肉圓湯', '魚餃湯', '三寶湯'] : ['魚圓面', '香菇肉碎面', '招牌面', '餐餐面'];
        const grid = document.getElementById('itemGrid');
        grid.innerHTML = '';
        items.forEach(i => {
            const d = document.createElement('div'); d.className = 'opt'; d.innerText = i;
            d.onclick = () => { cart.push(i); showCart(); };
            grid.appendChild(d);
        });
        document.getElementById('s1').classList.remove('active');
        document.getElementById('s2').classList.add('active');
    }

    function showCart() {
        document.getElementById('s2').classList.remove('active');
        document.getElementById('s3').classList.add('active');
        document.getElementById('cartBox').innerHTML = cart.map((i, idx) => `<div>#${idx+1} <b>${i}</b></div>`).join('');
    }

    // 將內容繪製成位圖數據
    function getPrintData() {
        const canvas = document.getElementById('pCanvas');
        const ctx = canvas.getContext('2d');
        const height = 100 + (cart.length * 40) + 100;
        canvas.height = height;

        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "black";
        
        ctx.font = "bold 36px Arial";
        ctx.fillText("Million Noodles", 60, 50);
        
        ctx.font = "28px Arial";
        ctx.fillText("------------------------------", 10, 90);
        
        let y = 140;
        cart.forEach((item, index) => {
            ctx.fillText(`${index + 1}. ${item}`, 20, y);
            y += 45;
        });
        
        ctx.fillText("------------------------------", 10, y + 30);
        ctx.font = "24px Arial";
        ctx.fillText("圖像化打印模式 - 繁體中文", 40, y + 70);

        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        return convertToEscPos(imageData);
    }

    // 圖像轉打印機二進制指令 (GS v 0 模式)
    function convertToEscPos(imgData) {
        const width = imgData.width;
        const height = imgData.height;
        const widthBytes = width / 8;
        const data = new Uint8Array(8 + (widthBytes * height));
        
        // GS v 0 0 指令
        data[0] = 0x1D; data[1] = 0x76; data[2] = 0x30; data[3] = 0;
        data[4] = widthBytes & 0xFF; data[5] = (widthBytes >> 8) & 0xFF;
        data[6] = height & 0xFF; data[7] = (height >> 8) & 0xFF;

        let pos = 8;
        for (let y = 0; y < height; y++) {
            for (let x = 0; x < widthBytes; x++) {
                let byte = 0;
                for (let bit = 0; bit < 8; bit++) {
                    const idx = ((y * width) + (x * 8) + bit) * 4;
                    const r = imgData.data[idx];
                    if (r < 128) byte |= (0x80 >> bit);
                }
                data[pos++] = byte;
            }
        }
        return data;
    }

    async function printAsImage() {
        if (!printChar) {
            try {
                // 請求設備
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['0000ffe0-0000-1000-8000-00805f9b34fb']
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
                printChar = await service.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');
                alert("藍牙連接成功！請再按一次「列印」。");
                return;
            } catch (e) {
                alert("連接失敗原因：" + e.message + "\n(請檢查打印機是否已連接其他設備，或重開藍牙)");
                return;
            }
        }

        try {
            const data = getPrintData();
            const init = new Uint8Array([0x1B, 0x40]); // 初始化
            const cut = new Uint8Array([0x1D, 0x56, 0x41, 0x00]); // 切紙/走紙
            
            await printChar.writeValue(init);
            
            // 圖像數據較大，需要分段發送防止藍牙崩潰
            const CHUNK_SIZE = 512;
            for (let i = 0; i < data.length; i += CHUNK_SIZE) {
                const chunk = data.slice(i, i + CHUNK_SIZE);
                await printChar.writeValue(chunk);
            }
            
            await printChar.writeValue(new Uint8Array([0x0A, 0x0A, 0x0A, 0x0A, 0x0A])); // 走紙
            alert("列印指令已發送！");
        } catch (e) {
            alert("列印出錯：" + e.message);
            printChar = null;
        }
    }
</script>
</body>
</html>
