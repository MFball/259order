<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Million Noodles POS</title>
    <script src="https://unpkg.com/gbk.js/dist/gbk.js"></script>
    <style>
        :root { --primary: #1a73e8; --secondary: #f0f2f5; --success: #34a853; --price-tag: #d93025; }
        body { font-family: "Microsoft JhengHei", "PingFang HK", sans-serif; background: var(--secondary); margin: 0; padding: 10px; text-align: center; }
        .container { max-width: 500px; margin: auto; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding-bottom: 90px; min-height: 85vh; position: relative; }
        .step { display: none; animation: fadeIn 0.3s; }
        .step.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        h2 { color: #333; font-size: 1.2rem; border-left: 5px solid var(--primary); padding-left: 10px; text-align: left; margin: 20px 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .opt { background: #fff; border: 2px solid #eee; border-radius: 12px; padding: 20px 5px; font-weight: bold; cursor: pointer; transition: all 0.2s; }
        .opt.selected { border-color: var(--primary); background: #e8f0fe; color: var(--primary); }
        .cart-box { margin-top: 20px; padding: 15px; border: 2px dashed #ccc; border-radius: 10px; text-align: left; background: #fffbe6; line-height: 1.8; }
        .total-price-bar { font-size: 1.8rem; color: var(--price-tag); font-weight: bold; margin: 25px 0; }
        .nav-btns { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px; display: flex; gap: 10px; max-width: 500px; margin: auto; box-shadow: 0 -5px 10px rgba(0,0,0,0.05); }
        button { flex: 1; padding: 15px; border-radius: 10px; border: none; font-size: 1.1rem; cursor: pointer; font-weight: bold; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-green { background: var(--success); color: white; }
        #status-light { font-size: 0.8rem; color: #888; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="status-light">打印機狀態：未連接</div>

    <div class="step active" id="step1">
        <h2>1. 選擇類別</h2>
        <div class="grid">
            <div class="opt" onclick="selectCategory('湯')">湯品類</div>
            <div class="opt" onclick="selectCategory('麵')">麵食類</div>
        </div>
    </div>

    <div class="step" id="step2">
        <h2 id="category-name">2. 選擇品項</h2>
        <div class="grid" id="item-grid"></div>
        <div class="nav-btns">
            <button style="background:#ccc" onclick="goBack('step1')">返回</button>
            <button class="btn-blue" onclick="checkSelection()">下一步</button>
        </div>
    </div>

    <div class="step" id="step3">
        <h2>🛒 購物車明細</h2>
        <div id="final-cart" class="cart-box"></div>
        <div class="total-price-bar">應收總計: $<span id="total-amount">0</span></div>
        <div class="nav-btns">
            <button class="btn-blue" onclick="location.reload()">重新點餐</button>
            <button class="btn-green" onclick="startPrint()">🖨️ 藍牙出單</button>
        </div>
    </div>
</div>

<script>
    const menuData = {
        '湯': ['魚圓湯', '肉圓湯', '魚餃湯', '三寶湯'],
        '麵': ['魚圓麵', '香菇肉碎麵', '招牌麵', '餐餐麵', '肉圓麵']
    };
    
    let currentCart = [];
    let bluetoothCharacteristic;

    function selectCategory(cat) {
        document.getElementById('category-name').innerText = `2. 選擇${cat}`;
        const grid = document.getElementById('item-grid');
        grid.innerHTML = '';
        menuData[cat].forEach(item => {
            const div = document.createElement('div');
            div.className = 'opt';
            div.innerText = item;
            div.onclick = () => {
                div.classList.toggle('selected');
                if (currentCart.includes(item)) {
                    currentCart = currentCart.filter(i => i !== item);
                } else {
                    currentCart.push(item);
                }
            };
            grid.appendChild(div);
        });
        showStep('step2');
    }

    function checkSelection() {
        if (currentCart.length === 0) return alert("請至少選擇一項商品");
        const cartBox = document.getElementById('final-cart');
        cartBox.innerHTML = currentCart.map((item, index) => `<div>#${index + 1} <b>${item}</b> <span style="float:right">$5</span></div>`).join('');
        document.getElementById('total-amount').innerText = currentCart.length * 5;
        showStep('step3');
    }

    function showStep(id) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function goBack(id) { showStep(id); currentCart = []; }

    // --- 核心打印邏輯 ---
    async function startPrint() {
        const status = document.getElementById('status-light');
        
        if (!bluetoothCharacteristic) {
            status.innerText = "正在搜尋 Printer001...";
            try {
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['0000ffe0-0000-1000-8000-00805f9b34fb']
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
                bluetoothCharacteristic = await service.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');
                status.innerText = "✅ 已連接 Printer001";
                alert("連接成功！請再按一次「藍牙出單」。");
                return;
            } catch (error) {
                status.innerText = "❌ 連接失敗";
                alert("連接失敗: " + error.message);
                return;
            }
        }

        try {
            status.innerText = "正在傳送數據...";
            // ESC/POS 指令
            const ESC = 0x1B;
            const FS = 0x1C;
            const init = [ESC, 0x40];       // 初始化
            const setChinese = [FS, 0x26];  // 進入漢字模式
            
            let printText = "\n   Million Noodles\n";
            printText += "--------------------------------\n";
            currentCart.forEach((item, i) => {
                printText += `${i+1}. ${item}      $5\n`;
            });
            printText += "--------------------------------\n";
            printText += `TOTAL:          $${currentCart.length * 5}\n\n\n\n\n`;

            // 關鍵：將網頁的繁體字轉換為打印機認識的 GBK 字元流
            const encoded = gbk.encode(printText);
            const finalPayload = new Uint8Array([...init, ...setChinese, ...encoded]);

            await bluetoothCharacteristic.writeValue(finalPayload);
            status.innerText = "✅ 列印完成";
            alert("訂單已送出！");
        } catch (error) {
            status.innerText = "❌ 列印失敗";
            alert("列印失敗: " + error.message);
            bluetoothCharacteristic = null;
        }
    }
</script>
</body>
</html>
