<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 10px; }
        .btn { padding: 15px; margin: 5px; width: 40%; font-size: 18px; border: 1px solid #ccc; cursor: pointer; }
        .selected { background: #e8f0fe; border: 2px solid blue; }
        #receipt { text-align: left; padding: 10px; border: 1px dashed #000; margin-top: 20px; }
        .total { color: red; font-size: 24px; font-weight: bold; }
        .hide { display: none; }
        @media print {
            .no-print { display: none !important; }
            #finish { display: block !important; width: 54mm; }
            body { margin: 0; padding: 0; }
        }
    </style>
</head>
<body>

<div id="step1">
    <h2>1. 選擇餐點</h2>
    <button class="btn" onclick="add('魚圓湯', 5)">魚圓湯 $5</button>
    <button class="btn" onclick="add('肉圓湯', 5)">肉圓湯 $5</button>
    <button class="btn" onclick="go(2)">下一步</button>
</div>

<div id="step2" class="hide">
    <h2>2. 選擇大小</h2>
    <button class="btn" onclick="finish('小', 0)">小的 (+$0)</button>
    <button class="btn" onclick="finish('大', 1)">大的 (+$1)</button>
</div>

<div id="finish" class="hide">
    <h3>Million Fishball Noodle</h3>
    <div id="content"></div>
    <div class="total">Total: $<span id="all">0</span></div>
    <div class="no-print" style="margin-top:20px;">
        <button class="btn" style="background:orange;color:white" onclick="window.print()">再次列印</button>
        <button class="btn" style="background:blue;color:white" onclick="location.reload()">下一位</button>
    </div>
</div>

<script>
    let order = { items: [], total: 0 };
    function go(n) { 
        document.getElementById('step1').className = n==1?'':'hide';
        document.getElementById('step2').className = n==2?'':'hide';
        document.getElementById('finish').className = n==3?'':'hide';
    }
    function add(name, p) {
        order.items.push(name);
        order.total += p;
        event.target.classList.add('selected');
    }
    function finish(sz, p) {
        order.total += p;
        document.getElementById('content').innerHTML = `<p>${order.items.join(' + ')} (${sz})</p>`;
        document.getElementById('all').innerText = order.total;
        go(3);
        // 自動列印：延遲一秒讓畫面渲染完成
        setTimeout(() => { window.print(); }, 1000);
    }
</script>
</body>
</html>
