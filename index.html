<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Million 麵店 - 醬料改版</title>
    <style>
        :root { --primary: #1a73e8; --secondary: #f0f2f5; --success: #34a853; --price-tag: #d93025; --edit: #f39c12; --add: #673ab7; }
        body { font-family: sans-serif; background: var(--secondary); margin: 0; padding: 10px; text-align: center; }
        .container { max-width: 500px; margin: auto; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding-bottom: 110px; min-height: 85vh; position: relative; }
        .step { display: none; animation: fadeIn 0.3s; }
        .step.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .back-btn-top { position: absolute; right: 0; top: 0; width: 35px; height: 35px; border-radius: 50%; background: #eee; color: #555; border: none; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; }
        h2 { color: #333; font-size: 1.1rem; margin: 10px 0 5px 0; border-left: 5px solid var(--primary); padding-left: 10px; text-align: left; }
        
        /* 醬料頁專用排版 */
        .sauce-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; padding: 10px; background: #f8f9fa; border-radius: 10px; }
        .sauce-label { text-align: left; font-weight: bold; color: #555; font-size: 0.9rem; margin-left: 5px; }
        .sauce-options { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .sauce-btn { background: white; border: 2px solid #ddd; padding: 12px 5px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 0.9rem; transition: 0.2s; }
        .sauce-btn.selected { border-color: var(--primary); background: #e8f0fe; color: var(--primary); }
        .special-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

        /* 通用排版 */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .opt { background: #fff; border: 2px solid #eee; border-radius: 12px; cursor: pointer; overflow: hidden; position: relative; display: flex; flex-direction: column; min-height: 140px; }
        .img-box { width: 100%; height: 100px; display: flex; background: #fafafa; overflow: hidden; position: relative; justify-content: center; align-items: center; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .price-circle { position: absolute; top: 5px; right: 5px; background: var(--price-tag); color: white; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; font-weight: bold; z-index: 5; border: 2px solid white; }
        .opt span { padding: 8px 5px; font-weight: bold; font-size: 0.9rem; flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        .opt.selected { border-color: var(--primary); background: #e8f0fe; }
        
        .add-qty-bar { display: flex; align-items: center; justify-content: center; gap: 5px; padding: 8px 5px; background: #f9f9f9; border-top: 1px solid #eee; white-space: nowrap; }
        .btn-add-minus { width: 32px; height: 32px; border-radius: 5px; border: 1px solid #ddd; background: white; font-weight: bold; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .add-num { font-size: 1.1rem; font-weight: bold; color: var(--add); min-width: 25px; text-align: center; }

        .cart-box { margin-top: 20px; padding: 10px; border: 1px solid #ddd; border-radius: 10px; text-align: left; background: #fff; }
        .cart-item { border-bottom: 1px solid #eee; padding: 12px 0; }
        .item-row { display: flex; justify-content: space-between; align-items: center; }
        .qty-controls { display: flex; align-items: center; gap: 5px; }
        .btn-qty { width: 28px; height: 28px; border-radius: 50%; border: 1px solid #ccc; background: #f8f9fa; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        .nav-btns { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px; display: flex; gap: 8px; max-width: 500px; margin: auto; box-shadow: 0 -5px 10px rgba(0,0,0,0.05); z-index: 1000; }
        button { flex: 1; padding: 12px 5px; border-radius: 10px; border: none; font-size: 0.95rem; cursor: pointer; font-weight: bold; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-green { background: var(--success); color: white; }
        .btn-red { background: var(--price-tag); color: white; }
        #status { font-size: 11px; color: #d93025; font-weight: bold; margin-bottom: 5px; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="status">● 藍牙待機中</div>
    
    <div class="step active" id="step-start">
        <button onclick="showHistory()" style="background: #607d8b; color: white; padding: 5px 12px; border-radius: 15px; font-size: 0.8rem; position: absolute; left: 15px; top: 15px; border: none; cursor: pointer;">📜 歷史紀錄</button>
        <h2 style="margin-top: 40px;">1. 請選擇類別</h2>
        <div class="grid">
            <div class="opt" onclick="setCategory('湯')"><div class="img-box"><img src="https://i.ibb.co/3ykXFzB/soup.png"></div><span>湯品類</span></div>
            <div class="opt" onclick="setCategory('面')"><div class="img-box"><img src="https://i.ibb.co/L6M0N0X/noodle.png"></div><span>麵食類</span></div>
        </div>
    </div>

    <div class="step" id="step-soup-select"><button class="back-btn-top" onclick="goNext('step-start')">←</button><h2>2. 請選擇湯品</h2><div class="grid" id="grid-soupItems"></div></div>
    <div class="step" id="step-food-select"><button class="back-btn-top" onclick="goNext('step-start')">←</button><h2>2. 請選擇麵食</h2><div class="grid" id="grid-foodItems"></div></div>
    
    <div class="step" id="step-noodle-type"><button class="back-btn-top" onclick="goNext('step-food-select')">←</button><h2>3. 請選擇麵種</h2><div class="grid" id="grid-noodleType"></div><div class="nav-btns"><button class="btn-blue" onclick="checkNoodleNext()">下一步</button></div></div>
    
    <div class="step" id="step-size"><button class="back-btn-top" onclick="handleSizeBack()">←</button><h2>4. 請選擇大小</h2><div class="grid" id="grid-size"></div></div>
    
    <div class="step" id="step-sauce-select">
        <button class="back-btn-top" onclick="goNext('step-size')">←</button>
        <h2>5. 請選擇醬料 (1-3項)</h2>
        
        <div class="sauce-group">
            <div class="sauce-label">辣椒</div>
            <div class="sauce-options">
                <button class="sauce-btn" id="s-少辣" onclick="toggleSauce('少辣', '辣椒')">少辣</button>
                <button class="sauce-btn" id="s-辣椒" onclick="toggleSauce('辣椒', '辣椒')">正常</button>
                <button class="sauce-btn" id="s-多辣" onclick="toggleSauce('多辣', '辣椒')">多辣</button>
            </div>
        </div>

        <div class="sauce-group">
            <div class="sauce-label">茄汁</div>
            <div class="sauce-options">
                <button class="sauce-btn" id="s-少茄" onclick="toggleSauce('少茄', '茄汁')">少茄</button>
                <button class="sauce-btn" id="s-茄汁" onclick="toggleSauce('茄汁', '茄汁')">正常</button>
                <button class="sauce-btn" id="s-多茄" onclick="toggleSauce('多茄', '茄汁')">多茄</button>
            </div>
        </div>

        <div class="sauce-group">
            <div class="sauce-label">醋</div>
            <div class="sauce-options">
                <button class="sauce-btn" id="s-少醋" onclick="toggleSauce('少醋', '醋')">少醋</button>
                <button class="sauce-btn" id="s-醋" onclick="toggleSauce('醋', '醋')">正常</button>
                <button class="sauce-btn" id="s-多醋" onclick="toggleSauce('多醋', '醋')">多醋</button>
            </div>
        </div>

        <div class="sauce-group">
            <div class="sauce-label">其他</div>
            <div class="special-grid">
                <button class="sauce-btn" id="s-黑醬油" onclick="toggleSauce('黑醬油', '其他')">黑醬油</button>
                <button class="sauce-btn" id="s-白醬青" onclick="toggleSauce('白醬青', '其他')">白醬青</button>
                <button class="sauce-btn" id="s-湯" onclick="toggleSauce('湯', '其他')">湯(麵分開)</button>
            </div>
        </div>

        <div style="margin-bottom: 20px;">
            <button class="btn-add-minus" style="width: 100%; height: 50px; background: #fff5e6; border: 2px dashed #f39c12; color: #d35400;" onclick="selectThreeTaste()">✨ 三口味 (辣椒,茄汁,醋)</button>
        </div>

        <div class="nav-btns"><button class="btn-blue" onclick="checkSauceNext()">下一步</button></div>
    </div>

    <div class="step" id="step-no-extra"><button class="back-btn-top" onclick="handleNoExtraBack()">←</button><h2>6. 不要什麼配料？</h2><div class="grid" id="grid-noExtra"></div><div class="nav-btns"><button class="btn-blue" onclick="goNext('step-additions')">下一步 (加料)</button></div></div>
    
    <div class="step" id="step-additions"><button class="back-btn-top" onclick="goNext('step-no-extra')">←</button><h2>7. 加料區 ($1/份)</h2><div class="grid" id="grid-additions"></div><div class="nav-btns"><button class="btn-blue" onclick="generatePreviewAndGo()">✅ 加入購物車</button></div></div>
    
    <div class="step" id="step-finish">
        <h2>🛒 購物車明細</h2>
        <div id="preview-order-info" style="text-align: left; font-size: 0.9rem; margin-bottom: 10px;"></div>
        <div class="cart-box" id="current-cart"></div>
        <div style="font-size: 1.6rem; color: var(--price-tag); font-weight: bold; margin: 15px 0;">總金額: $<span id="total-sum">0</span></div>
        <div class="nav-btns">
            <button class="btn-red" onclick="cancelAndClear()">❌ 清空</button>
            <button class="btn-blue" onclick="resetForNewItem()">➕ 繼續點</button>
            <button class="btn-green" id="printBtn" onclick="finalizeAndPrint()">🖨️ 確認並列印</button>
        </div>
    </div>
    <div class="step" id="step-history"><button class="back-btn-top" onclick="goNext('step-start')">←</button><h2>今天訂單歷史</h2><div id="history-container"></div></div>
</div>

<canvas id="printCanvas" width="384"></canvas>

<script>
    const START_NO = 8238;
    const ITEM_RULES = { '魚圓': { unit: '粒', factor: 2 }, '肉圓': { unit: '粒', factor: 2 }, '魚餃': { unit: '粒', factor: 2 }, '蝦': { unit: '隻', factor: 1 } };
    const config = {
        '魚圓湯': { p: 5, img: 'https://i.ibb.co/3ykXFzB/soup.png' }, '肉圓湯': { p: 5, img: 'https://i.ibb.co/3ykXFzB/soup.png' }, '魚餃湯': { p: 5, img: 'https://i.ibb.co/3ykXFzB/soup.png' }, '三寶湯': { p: 6, img: 'https://i.ibb.co/3ykXFzB/soup.png' },
        '魚圓面': { p: 4, img: 'https://i.ibb.co/L6M0N0X/noodle.png' }, '香菇肉碎面': { p: 5, img: 'https://i.ibb.co/L6M0N0X/noodle.png' }, '招牌面': { p: 6, img: 'https://i.ibb.co/L6M0N0X/noodle.png' }, '餐餐面': { p: 6, img: 'https://i.ibb.co/L6M0N0X/noodle.png' },
        '肉圓面': { p: 4, img: 'https://i.ibb.co/L6M0N0X/noodle.png' }, '蝦魚面': { p: 5, img: 'https://i.ibb.co/L6M0N0X/noodle.png' }, '西刀魚面': { p: 4, img: 'https://i.ibb.co/L6M0N0X/noodle.png' }, '香菇面': { p: 5, img: 'https://i.ibb.co/L6M0N0X/noodle.png' },
        '魚餃面': { p: 4, img: 'https://i.ibb.co/L6M0N0X/noodle.png' }, '(純)肉碎面': { p: 4, img: 'https://i.ibb.co/L6M0N0X/noodle.png' }, '小魚香面': { p: 4, img: 'https://i.ibb.co/L6M0N0X/noodle.png' },
        '小的': { p: 0, img: 'https://i.ibb.co/L6M0N0X/noodle.png' }, '大的': { p: 1, img: 'https://i.ibb.co/L6M0N0X/noodle.png' },
        'noodleType': { '面薄': '','幼面': '','粿條': '','熟面': '','米粉': '','米太目': '','冬粉': '','粿條面': '','粿條米粉': '','米粉面': '' },
        'noExtra': ['油', '蔥', '香菇', '肉碎', '黑醬油', '肉圓換魚圓'],
        'additionsList': ['魚圓', '肉圓', '魚餃', '香菇', '肉碎', '西刀魚餅', '小魚香', '蝦']
    };

    let cart = [], editIndex = -1, savedDevice = null, savedCharacteristic = null, isFastMode = false;
    let tempItem = { category: '', names: [], size: '', noodle: '', sauces: [], noExtras: [], additions: {}, price: 0, qty: 1 };

    function init() {
        renderGrid(['魚圓湯','肉圓湯','魚餃湯','三寶湯'], 'grid-soupItems', (val) => { tempItem.names = [val]; goNext('step-size'); });
        renderGrid(Object.keys(config).filter(k=>k.includes('面')&&!k.includes('Type')), 'grid-foodItems', (val) => { tempItem.names = [val]; goNext('step-noodle-type'); });
        renderGrid(['小的', '大的'], 'grid-size', (val) => { tempItem.size = val; if(tempItem.category === '湯') goNext('step-no-extra'); else goNext('step-sauce-select'); });
        renderGrid(Object.keys(config.noodleType), 'grid-noodleType', (val) => { tempItem.noodle = val; });
        renderGrid(config.noExtra, 'grid-noExtra', (val, el) => { toggleMulti(val, el, tempItem.noExtras, 10); }, true);
        renderAdditionsGrid();
    }

    // 醬料邏輯
    function toggleSauce(val, group) {
        // 如果選的是"湯"，清空其他所有醬料
        if (val === '湯') {
            tempItem.sauces = ['湯'];
        } else {
            // 如果原本有"湯"，點別的時要把"湯"去掉
            if (tempItem.sauces.includes('湯')) tempItem.sauces = [];
            
            // 同組互斥邏輯 (例如點了少辣，就要去掉正常辣和多辣)
            const spice = ['少辣', '辣椒', '多辣'];
            const tomato = ['少茄', '茄汁', '多茄'];
            const vinegar = ['少醋', '醋', '多醋'];
            
            let targetGroup = [];
            if (spice.includes(val)) targetGroup = spice;
            else if (tomato.includes(val)) targetGroup = tomato;
            else if (vinegar.includes(val)) targetGroup = vinegar;

            if (tempItem.sauces.includes(val)) {
                tempItem.sauces = tempItem.sauces.filter(s => s !== val);
            } else {
                if (targetGroup.length > 0) {
                    tempItem.sauces = tempItem.sauces.filter(s => !targetGroup.includes(s));
                }
                if (tempItem.sauces.length < 3) tempItem.sauces.push(val);
                else alert("最多只能選 3 種醬料");
            }
        }
        updateSauceUI();
    }

    function selectThreeTaste() {
        tempItem.sauces = ['辣椒', '茄汁', '醋'];
        updateSauceUI();
    }

    function updateSauceUI() {
        document.querySelectorAll('.sauce-btn').forEach(btn => btn.classList.remove('selected'));
        tempItem.sauces.forEach(s => {
            const el = document.getElementById('s-' + s);
            if (el) el.classList.add('selected');
        });
    }

    function renderGrid(list, id, clickFn, multi = false) {
        const cont = document.getElementById(id); if(!cont) return;
        cont.innerHTML = '';
        list.forEach(name => {
            const div = document.createElement('div'); div.className = 'opt';
            const price = config[name]?.p || 0;
            const priceTag = (price > 0) ? `<div class="price-circle">$${price}</div>` : '';
            div.innerHTML = `<div class="img-box">${priceTag}</div><span>${name}</span>`;
            div.onclick = () => { if(!multi) Array.from(cont.children).forEach(c=>c.classList.remove('selected')); div.classList.toggle('selected'); clickFn(name, div); };
            if (multi && tempItem.noExtras.includes(name)) div.classList.add('selected');
            else if (!multi && (tempItem.names.includes(name) || tempItem.size === name || tempItem.noodle === name)) div.classList.add('selected');
            cont.appendChild(div);
        });
    }

    function renderAdditionsGrid() {
        const cont = document.getElementById('grid-additions'); cont.innerHTML = '';
        config.additionsList.forEach(name => {
            const div = document.createElement('div'); div.className = 'opt';
            const qty = tempItem.additions[name] || 0;
            div.innerHTML = `<div class="img-box"><div class="price-circle">$1</div></div><span>${name}</span>
                <div class="add-qty-bar"><button class="btn-add-minus" onclick="changeAddQty('${name}',-1,event)">-</button>
                <span class="add-num" id="add-val-${name}">${qty}</span><button class="btn-add-minus" onclick="changeAddQty('${name}',1,event)">+</button></div>`;
            cont.appendChild(div);
        });
    }

    function changeAddQty(name, d, e) { e.stopPropagation(); let q = (tempItem.additions[name]||0)+d; if(q>=0&&q<=9){ if(q===0) delete tempItem.additions[name]; else tempItem.additions[name]=q; document.getElementById(`add-val-${name}`).innerText=q; } }
    function setCategory(v) { tempItem.category = v; goNext(v === '湯' ? 'step-soup-select' : 'step-food-select'); }
    function toggleMulti(v, el, list, max) { if(list.includes(v)) { list.splice(list.indexOf(v), 1); el.classList.remove('selected'); } else { if(list.length >= max) return; list.push(v); el.classList.add('selected'); } }
    function goNext(id) { document.querySelectorAll('.step').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); window.scrollTo(0,0); }
    function checkNoodleNext() { if(tempItem.noodle) goNext('step-size'); else alert("請選擇麵種"); }
    function checkSauceNext() { if(tempItem.sauces.length > 0) goNext('step-no-extra'); else alert("請最少選擇一個醬料"); }
    function handleSizeBack() { goNext(tempItem.category === '湯' ? 'step-soup-select' : 'step-noodle-type'); }
    function handleNoExtraBack() { goNext(tempItem.category === '湯' ? 'step-size' : 'step-sauce-select'); }

    function generatePreviewAndGo() {
        let p = 0; tempItem.names.forEach(n => p += (config[n]?.p || 0)); p += (config[tempItem.size]?.p || 0);
        Object.values(tempItem.additions).forEach(q => p += q); tempItem.price = p;
        if (editIndex > -1) cart[editIndex] = JSON.parse(JSON.stringify(tempItem)); else cart.push(JSON.parse(JSON.stringify(tempItem)));
        editIndex = -1; updateCartDisplay(); goNext('step-finish');
    }

    function updateCartDisplay() {
        let t = 0; const cont = document.getElementById('current-cart');
        cont.innerHTML = cart.map((item, i) => {
            t += item.price * item.qty;
            let adds = Object.entries(item.additions).map(([n, q]) => {
                const rule = ITEM_RULES[n]; return rule ? `${n}(${q * rule.factor}${rule.unit})` : `${n}(${q}份)`;
            }).join(', ');
            return `<div class="cart-item"><div class="item-row"><div><b>${item.names[0]}</b> [${item.size}]<br><small>${item.noodle||''} ${item.sauces.join(',')}</small>
                ${adds ? '<br><small style="color:var(--add);">+加料: '+adds+'</small>':''}</div>
                <div class="qty-controls"><button class="btn-qty" onclick="changeQty(${i},-1)">-</button><span>${item.qty}</span><button class="btn-qty" onclick="changeQty(${i},1)">+</button></div></div></div>`;
        }).join('');
        document.getElementById('total-sum').innerText = t;
    }

    function changeQty(i, d) { if(cart[i].qty+d > 0) cart[i].qty+=d; else if(confirm("刪除此項?")) cart.splice(i,1); updateCartDisplay(); }
    function cancelAndClear() { if(confirm("確定清空?")) { cart=[]; updateCartDisplay(); resetForNewItem(); } }
    function resetForNewItem() { tempItem = { category: '', names: [], size: '', noodle: '', sauces: [], noExtras: [], additions: {}, price: 0, qty: 1 }; updateSauceUI(); document.querySelectorAll('.opt').forEach(o => o.classList.remove('selected')); goNext('step-start'); }

    // 列印邏輯
    function drawPrintCanvas(record) {
        const canvas = document.getElementById('printCanvas'), ctx = canvas.getContext('2d');
        canvas.height = 300 + (record.items.length * 150);
        ctx.fillStyle = "white"; ctx.fillRect(0, 0, 384, canvas.height);
        ctx.fillStyle = "black"; ctx.textAlign = "center"; ctx.textBaseline = "top";
        ctx.font = "bold 24px sans-serif"; ctx.fillText("Million FishBall Noodle 259", 192, 10);
        ctx.font = "18px sans-serif"; ctx.fillText(record.fullTime, 192, 45);
        ctx.font = "bold 40px sans-serif"; ctx.fillText(`No. ${record.num}`, 192, 75);
        ctx.textAlign = "left"; let y = 130;
        record.items.forEach(item => {
            ctx.font = "bold 32px sans-serif"; ctx.fillText(`#${item.qty} ${item.names[0]}`, 20, y); y += 40;
            ctx.font = "bold 24px sans-serif"; ctx.fillText(`  [${item.size.replace('的','')}] ${item.noodle||''} ${item.sauces.join(' ')}`, 20, y); y += 35;
            let adds = Object.entries(item.additions).map(([n, q]) => { const r = ITEM_RULES[n]; return r ? `${n}(${q*r.factor}${r.unit})` : `${n}(${q}份)`; }).join(',');
            if(adds) { ctx.font = "20px sans-serif"; ctx.fillText(`  +加料: ${adds}`, 20, y); y += 30; }
            if(item.noExtras.length>0) { ctx.font = "20px sans-serif"; ctx.fillText(`  (不要: ${item.noExtras.join(',')})`, 20, y); y += 30; }
            y += 10;
        });
        ctx.font = "bold 28px sans-serif"; ctx.textAlign = "center"; ctx.fillText(`TOTAL: $${record.total}`, 192, y + 20);
    }

    // 藍牙列印
    async function finalizeAndPrint() {
        if(cart.length===0) return;
        const data = getOrderData(); const now = new Date();
        const record = { num: data.num, fullTime: now.toLocaleString(), items: JSON.parse(JSON.stringify(cart)), total: document.getElementById('total-sum').innerText };
        data.history.push(record); data.num++; saveOrderData(data);
        drawPrintCanvas(record);
        try {
            const btn = document.getElementById('printBtn'); btn.disabled = true;
            if (!savedCharacteristic) {
                savedDevice = await navigator.bluetooth.requestDevice({ acceptAllDevices: true, optionalServices: ['0000ffe0-0000-1000-8000-00805f9b34fb'] });
                const server = await savedDevice.gatt.connect();
                const service = await server.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
                savedCharacteristic = await service.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');
            }
            const pixels = document.getElementById('printCanvas').getContext('2d').getImageData(0,0,384,document.getElementById('printCanvas').height).data;
            await savedCharacteristic.writeValue(new Uint8Array([0x1B, 0x40]));
            for (let y = 0; y < document.getElementById('printCanvas').height; y++) {
                let row = new Uint8Array(8 + 48); row.set([0x1D, 0x76, 0x30, 0, 48, 0, 1, 0]);
                for (let x = 0; x < 48; x++) {
                    let b = 0; for (let bit = 0; bit < 8; bit++) {
                        let idx = ((y * 384) + (x * 8 + bit)) * 4;
                        if (pixels[idx] < 128) b |= (1 << (7 - bit));
                    }
                    row[8 + x] = b;
                }
                await savedCharacteristic.writeValue(row);
                if (y % 10 === 0) await new Promise(r => setTimeout(r, 20));
            }
            await savedCharacteristic.writeValue(new Uint8Array([0x1B, 0x64, 0x05, 0x1D, 0x56, 0x00]));
            resetForNewItem(); cart=[]; updateCartDisplay();
        } catch(e) { alert(e.message); } finally { document.getElementById('printBtn').disabled = false; }
    }

    function getOrderData() { let d = JSON.parse(localStorage.getItem('million_data')) || { date: '', num: START_NO, history: [] }; const today = new Date().toLocaleDateString(); if(d.date !== today) { d.date = today; d.num = START_NO; d.history = []; } return d; }
    function saveOrderData(d) { localStorage.setItem('million_data', JSON.stringify(d)); }
    function showHistory() { goNext('step-history'); }
    init();
</script>
