<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Million 麵店 - ver 3.0.2</title>
    <style>
        :root { --primary: #1a73e8; --secondary: #f0f2f5; --success: #34a853; --price-tag: #d93025; --edit: #f39c12; --add: #673ab7; }
        body { font-family: sans-serif; background: var(--secondary); margin: 0; padding: 10px; text-align: center; }
        .container { max-width: 500px; margin: auto; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding-bottom: 110px; min-height: 85vh; position: relative; }
        .step { display: none; animation: fadeIn 0.3s; }
        .step.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .back-btn-top { position: absolute; right: 0; top: 0; width: 35px; height: 35px; border-radius: 50%; background: #eee; color: #555; border: none; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; }
        h2 { color: #333; font-size: 1.1rem; margin: 10px 0 5px 0; border-left: 5px solid var(--primary); padding-left: 10px; text-align: left; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
        .opt { background: #fff; border: 2px solid #eee; border-radius: 15px; cursor: pointer; overflow: hidden; position: relative; display: flex; flex-direction: column; min-height: 160px; transition: 0.2s; }
        .img-box { width: 100%; height: 110px; display: flex; background: #fafafa; overflow: hidden; position: relative; justify-content: center; align-items: center; border-bottom: 1px solid #f0f0f0; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .price-circle { position: absolute; top: 5px; right: 5px; background: var(--price-tag); color: white; padding: 2px 8px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; font-weight: bold; z-index: 5; border: 2px solid white; }
        .opt span { padding: 10px 5px; font-weight: bold; font-size: 1rem; color: #333; flex-grow: 1; display: flex; align-items: center; justify-content: center; background: white; }
        .opt.selected { border-color: var(--primary); background: #e8f0fe; }

        .qty-input-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.95); display: flex; flex-direction: column; gap: 5px; padding: 8px; border-top: 1px solid #ddd; }
        .qty-row { display: flex; align-items: center; justify-content: space-between; font-size: 0.9rem; font-weight: bold; color: #333; }
        .qty-btn { width: 30px; height: 30px; border-radius: 6px; border: 1px solid #ccc; background: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }

        .multi-info { font-size: 1rem; color: #d93025; margin-bottom: 8px; text-align: left; background: #fff3f3; padding: 10px; border-radius: 8px; font-weight: bold; border-left: 5px solid #d93025; }
        .selection-display { font-size: 1.1rem; color: #1a73e8; margin-bottom: 10px; text-align: center; background: #e8f0fe; padding: 12px; border-radius: 10px; font-weight: bold; border: 1px solid #1a73e8; }

        .nav-btns { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px; display: flex; gap: 8px; max-width: 500px; margin: auto; box-shadow: 0 -5px 10px rgba(0,0,0,0.05); z-index: 1000; }
        button { flex: 1; padding: 12px 5px; border-radius: 10px; border: none; font-size: 0.95rem; cursor: pointer; font-weight: bold; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-green { background: var(--success); color: white; }
        .btn-red { background: var(--price-tag); color: white; }
        
        .sauce-layout { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        .sauce-row-flex { display: flex; gap: 8px; justify-content: center; }
        .sauce-btn { flex: 1; padding: 15px 5px; border: 2px solid #eee; border-radius: 10px; background: white; font-weight: bold; font-size: 1rem; cursor: pointer; }
        .sauce-btn.selected { border-color: var(--primary); background: #e8f0fe; color: var(--primary); }
        
        .add-qty-bar { display: flex; align-items: center; justify-content: center; gap: 5px; padding: 10px 5px; background: #f9f9f9; border-top: 1px solid #eee; }
        .btn-add-minus { width: 35px; height: 35px; border-radius: 8px; border: 1px solid #ddd; background: white; font-weight: bold; font-size: 1.2rem; cursor: pointer; }
        .add-num { font-size: 1.1rem; font-weight: bold; color: var(--add); min-width: 30px; text-align: center; }

        #status { font-size: 11px; color: #d93025; font-weight: bold; margin-bottom: 5px; }
        .version-tag { position: absolute; bottom: 10px; right: 15px; font-size: 10px; color: #999; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="status">● 藍牙待機中</div>
    
    <div class="step active" id="step-start">
        <button onclick="showHistory()" style="background: #607d8b; color: white; padding: 5px 12px; border-radius: 15px; font-size: 0.8rem; position: absolute; left: 15px; top: 15px; border: none; cursor: pointer;">📜 歷史紀錄</button>
        <h2 style="margin-top: 40px;">1. 請選擇類別</h2>
        <div class="grid">
            <div class="opt" onclick="setCategory('湯')"><div class="img-box"><img src="https://lh3.googleusercontent.com/pw/AP1GczPcUu3GOW3xZtOFVh7le33bCNVW4F1tyBvv5cJ2V7meVDPq0zf1ZGjITf5IZdLkRv1icKIZPDvvAphvYNS6T0ZNbId2RSHGREkuS7uzTiz8boh3Fo8=w2400?source=screenshot.guru"></div><span>湯品類</span></div>
            <div class="opt" onclick="setCategory('面')"><div class="img-box"><img src="https://lh3.googleusercontent.com/pw/AP1GczM1EgErnLz57PZ0ckyDapaXUx27rggwr5VvU49Yo1vpygNeiLiTCVK6nGMT7UewX9jWyWN7Q04y5g8QeGtKBFBtYod8YZd1L42sFsRuRCpY2EvidrI=w2400?source=screenshot.guru"></div><span>麵食類</span></div>
        </div>
        <div class="version-tag">ver 3.0.2</div>
    </div>

    <div class="step" id="step-food-select">
        <button class="back-btn-top" onclick="goNext('step-start')">←</button>
        <h2>2. 請選擇麵食與數量</h2>
        <div class="grid" id="grid-foodItems"></div>
        <div class="nav-btns"><button class="btn-blue" onclick="checkFoodNext()">下一步</button></div>
    </div>

    <div class="step" id="step-soup-select">
        <button class="back-btn-top" onclick="goNext('step-start')">←</button>
        <h2>2. 請選擇湯品</h2>
        <div class="grid" id="grid-soupItems"></div>
    </div>

    <div class="step" id="step-noodle-type">
        <button class="back-btn-top" onclick="goNext('step-food-select')">←</button>
        <div id="noodle-selection-title" class="selection-display">正在處理：魚圓面</div>
        <div id="noodle-count-info" class="multi-info"></div>
        <h2>3. 分配麵種數量</h2>
        <div class="grid" id="grid-noodleType"></div>
        <div class="nav-btns"><button class="btn-blue" onclick="checkNoodleNext()">下一步</button></div>
    </div>

    <div class="step" id="step-sauce-select">
        <button class="back-btn-top" onclick="handleSauceBack()">←</button>
        <div id="sauce-selection-title" class="selection-display"></div>
        <div id="sauce-count-info" class="multi-info"></div>
        <h2 id="sauce-title">5. 選擇醬料與要求</h2>
        <div class="sauce-layout" id="sauce-options"></div>
        <div class="nav-btns"><button class="btn-blue" onclick="checkSauceNext()">下一步</button></div>
    </div>

    <div class="step" id="step-no-extra">
        <button class="back-btn-top" onclick="handleNoExtraBack()">←</button>
        <div id="noextra-count-info" class="multi-info"></div>
        <h2 id="noextra-title">6. 不要什麼配料？</h2>
        <div class="grid" id="grid-noExtra"></div>
        <div class="nav-btns"><button class="btn-blue" onclick="checkNoExtraNext()">下一步</button></div>
    </div>

    <div class="step" id="step-additions">
        <button class="back-btn-top" onclick="goNext('step-no-extra')">←</button>
        <div id="addition-count-info" class="multi-info"></div>
        <h2 id="addition-title">7. 加料區</h2>
        <div class="grid" id="grid-additions"></div>
        <div class="nav-btns"><button class="btn-blue" onclick="checkAdditionNext()">✅ 確認此份</button></div>
    </div>

    <div class="step" id="step-finish">
        <h2>🛒 購物車明細</h2>
        <div id="current-cart"></div>
        <div class="nav-btns">
            <button class="btn-red" onclick="cancelAndClear()">❌ 清空</button>
            <button class="btn-blue" onclick="resetForNewItem()">➕ 繼續點</button>
            <button class="btn-green" onclick="finalizeAndPrint()">🖨️ 列印</button>
        </div>
    </div>
</div>

<script>
    const config = {
        '魚圓面': { p: 4, img: 'https://lh3.googleusercontent.com/pw/AP1GczM1EgErnLz57PZ0ckyDapaXUx27rggwr5VvU49Yo1vpygNeiLiTCVK6nGMT7UewX9jWyWN7Q04y5g8QeGtKBFBtYod8YZd1L42sFsRuRCpY2EvidrI=w2400?source=screenshot.guru' },
        '香菇肉碎面': { p: 5, img: 'https://lh3.googleusercontent.com/pw/AP1GczPRrBESQHr4MjJaDdiXYFda03b72aUrxqrO--coLUrariBXksy0KTPNNaXhzOmmrVhkbChOGKQFqiR8zRRcPZWSd7Hk-inOhSXStOXgC8d0a85lycU=w2400?source=screenshot.guru' },
        '招牌面': { p: 6, img: 'https://lh3.googleusercontent.com/pw/AP1GczOVfyFF0BVjs49utoC4oxktdqpCblSROVp-z7A0aH5pjECVNDmcaKulF2YA7DBUEDZxzEij53427j1LqfZYPzUSFGdUM2_Zt-aYxIYJY40qAfH5wq8=w2400?source=screenshot.guru' },
        '魚圓湯': { p: 5, img: 'https://lh3.googleusercontent.com/pw/AP1GczOoXizYOs7TlJVh_ikXpPT_8uSFOyH2mnDMFvu2CIFXpJVYqNssfvAbgkwksOqIi89J0NAktQdtJStc5KB6YPkxqk0ccWLkjKAGWKILKERYMt_PYsI=w2400?source=screenshot.guru' },
        '大的': { p: 1 }, '小的': { p: 0 },
        'noodleType': { 
            '面薄': 'https://lh3.googleusercontent.com/pw/AP1GczPTdYtkKQVVtu2xC4GqatBEs58tYr0xrU6-P08JGLPXNa9URyrd85OABGJvhRRywZqI_6ILtjozkyDCPJWyfo34-z3KP5EPG56bOb6S73_130W3J00=w2400?source=screenshot.guru', 
            '幼面': 'https://lh3.googleusercontent.com/pw/AP1GczNzHJopdj33Emt-5K2nGrlY8AQRwcGxsmIGUyy2dzSKyFYLHxqH-tz7bIRoqlVFfxfetpW7bKNjWvenQuHQ1oPEWLa8r0Zv98IXzUaIhJlRpdNaMJU=w2400?source=screenshot.guru',
            '粿條': 'https://lh3.googleusercontent.com/pw/AP1GczPwzNH0_FdwO99aeaxK8kWR64JXsBGwj4s5HB13lSvp-sZwggbp8XT8yfDkbp7Cz_ZB-jynkrLK7FFpIQSTf_t4Umd8Eje8i_nWWxFshmGTKkrzCn4=w2400?source=screenshot.guru',
            '米粉': 'https://lh3.googleusercontent.com/pw/AP1GczMCq_h1GaefE-Kpouj1xUx_GoEhsa6BHL7giIsCTbZqtOKJG_8AJIpYSsqpPEiR5Ao00oYTYixHE7KxdZjWSv2LTg-CQ_xWVBv8OfAB98J7Z1wPYG0=w2400?source=screenshot.guru'
        },
        'noExtra': ['蔥', '辣椒', '豬油渣'],
        'additionsList': ['魚圓', '肉圓']
    };

    let cart = [];
    let sessionOrder = { category: '', mainName: '', counts: { '小的': 0, '大的': 0 }, totalQty: 0, noodlePlan: {} };
    let currentProcessIdx = 0;
    let currentSubReq = null;

    function setCategory(v) {
        sessionOrder.category = v;
        if (v === '湯') {
            renderSoupGrid();
            goNext('step-soup-select');
        } else {
            renderFoodGrid();
            goNext('step-food-select');
        }
    }

    function renderSoupGrid() {
        const cont = document.getElementById('grid-soupItems');
        cont.innerHTML = '';
        ['魚圓湯'].forEach(name => {
            const div = document.createElement('div'); div.className = 'opt';
            div.innerHTML = `<div class="img-box"><div class="price-circle">$${config[name].p}</div><img src="${config[name].img}"></div><span>${name}</span>`;
            div.onclick = () => { 
                sessionOrder.mainName = name; sessionOrder.totalQty = 1; 
                sessionOrder.counts = {'小的': 1, '大的': 0}; startSubProcess(); 
            };
            cont.appendChild(div);
        });
    }

    function renderFoodGrid() {
        const list = ['魚圓面', '香菇肉碎面', '招牌面'];
        const cont = document.getElementById('grid-foodItems');
        cont.innerHTML = '';
        list.forEach(name => {
            const div = document.createElement('div'); div.className = 'opt';
            if (sessionOrder.mainName === name) div.classList.add('selected');
            div.innerHTML = `
                <div class="img-box"><div class="price-circle">$${config[name].p}</div><img src="${config[name].img}"></div>
                <span>${name}</span>
                <div class="qty-input-overlay" onclick="event.stopPropagation()">
                    <div class="qty-row">小: <button class="qty-btn" onclick="changeMainQty('${name}','小的',-1)">-</button><span id="q-s-${name}">${sessionOrder.mainName===name?sessionOrder.counts['小的']:0}</span><button class="qty-btn" onclick="changeMainQty('${name}','小的',1)">+</button></div>
                    <div class="qty-row">大: <button class="qty-btn" onclick="changeMainQty('${name}','大的',-1)">-</button><span id="q-l-${name}">${sessionOrder.mainName===name?sessionOrder.counts['大的']:0}</span><button class="qty-btn" onclick="changeMainQty('${name}','大的',1)">+</button></div>
                </div>
            `;
            div.onclick = () => { sessionOrder.mainName = name; document.querySelectorAll('#grid-foodItems .opt').forEach(o=>o.classList.remove('selected')); div.classList.add('selected'); };
            cont.appendChild(div);
        });
    }

    function changeMainQty(name, size, delta) {
        if (sessionOrder.mainName !== name) {
            sessionOrder.mainName = name;
            document.querySelectorAll('#grid-foodItems .opt').forEach(o=>{
                o.classList.remove('selected'); if(o.querySelector('span').innerText === name) o.classList.add('selected');
            });
        }
        sessionOrder.counts[size] = Math.max(0, sessionOrder.counts[size] + delta);
        document.getElementById(size === '小的' ? `q-s-${name}` : `q-l-${name}`).innerText = sessionOrder.counts[size];
    }

    function checkFoodNext() {
        sessionOrder.totalQty = sessionOrder.counts['小的'] + sessionOrder.counts['大的'];
        if (sessionOrder.totalQty === 0) return alert("請先輸入數量");
        
        // 第三頁標題動態更新
        let detail = [];
        if(sessionOrder.counts['小的'] > 0) detail.push(`${sessionOrder.counts['小的']}小`);
        if(sessionOrder.counts['大的'] > 0) detail.push(`${sessionOrder.counts['大的']}大`);
        document.getElementById('noodle-selection-title').innerText = `目前選擇：${sessionOrder.mainName} (${detail.join(', ')})`;
        
        renderNoodlePlanGrid();
        updateNoodleCountInfo();
        goNext('step-noodle-type');
    }

    function renderNoodlePlanGrid() {
        const cont = document.getElementById('grid-noodleType');
        cont.innerHTML = '';
        Object.keys(config.noodleType).forEach(name => {
            const div = document.createElement('div'); div.className = 'opt';
            const qty = sessionOrder.noodlePlan[name] || 0;
            div.innerHTML = `
                <div class="img-box"><img src="${config.noodleType[name]}"></div>
                <span>${name}</span>
                <div class="add-qty-bar">
                    <button class="btn-add-minus" onclick="changeNoodlePlanQty('${name}',-1)">-</button>
                    <span class="add-num" id="plan-qty-${name}">${qty}</span>
                    <button class="btn-add-minus" onclick="changeNoodlePlanQty('${name}',1)">+</button>
                </div>
            `;
            cont.appendChild(div);
        });
    }

    function changeNoodlePlanQty(name, delta) {
        let currentTotal = Object.values(sessionOrder.noodlePlan).reduce((a,b)=>a+b, 0);
        let val = sessionOrder.noodlePlan[name] || 0;
        if (delta > 0 && currentTotal >= sessionOrder.totalQty) return;
        val = Math.max(0, val + delta);
        if (val === 0) delete sessionOrder.noodlePlan[name]; else sessionOrder.noodlePlan[name] = val;
        document.getElementById(`plan-qty-${name}`).innerText = val;
        updateNoodleCountInfo();
    }

    function updateNoodleCountInfo() {
        let currentTotal = Object.values(sessionOrder.noodlePlan).reduce((a,b)=>a+b, 0);
        document.getElementById('noodle-count-info').innerText = `需分配：${sessionOrder.totalQty} 份 | 已分配：${currentTotal} 份`;
    }

    function checkNoodleNext() {
        let currentTotal = Object.values(sessionOrder.noodlePlan).reduce((a,b)=>a+b, 0);
        if (currentTotal !== sessionOrder.totalQty) return alert(`分配數量不符！需要 ${sessionOrder.totalQty} 份`);
        
        sessionOrder.tempNoodles = [];
        Object.entries(sessionOrder.noodlePlan).forEach(([name, count]) => {
            for(let i=0; i<count; i++) sessionOrder.tempNoodles.push(name);
        });
        startSubProcess();
    }

    function startSubProcess() {
        sessionOrder.subItems = [];
        sessionOrder.tempSizes = [];
        for(let i=0; i<sessionOrder.counts['小的']; i++) sessionOrder.tempSizes.push('小的');
        for(let i=0; i<sessionOrder.counts['大的']; i++) sessionOrder.tempSizes.push('大的');
        currentProcessIdx = 0;
        prepareNextSubItem();
    }

    function prepareNextSubItem() {
        const size = sessionOrder.tempSizes[currentProcessIdx];
        const noodle = sessionOrder.category === '面' ? sessionOrder.tempNoodles[currentProcessIdx] : '';
        currentSubReq = { size, noodle, sauces: [], specialReqs: [], noExtras: [], additions: {}, price: config[sessionOrder.mainName].p + config[size].p };
        
        // 更新後續頁面的動態標題
        const subTitle = `${sessionOrder.mainName} - ${size}${noodle ? ' ('+noodle+')' : ''}`;
        document.getElementById('sauce-selection-title').innerText = subTitle;
        
        if (sessionOrder.category === '湯') {
            goNext('step-no-extra');
            renderNoExtraGrid();
        } else {
            renderSauceUI();
            goNext('step-sauce-select');
        }
    }

    function renderSauceUI() {
        const cont = document.getElementById('sauce-options');
        cont.innerHTML = `
            <div class="sauce-row-flex">
                <button class="sauce-btn" onclick="toggleSauce('辣椒')">辣椒</button>
                <button class="sauce-btn" onclick="toggleSauce('黑醬油')">黑醬油</button>
                <button class="sauce-btn" onclick="toggleSauce('湯')">湯麵</button>
            </div>
        `;
    }

    function toggleSauce(v) {
        if(v==='湯') { currentSubReq.sauces = ['湯']; checkSauceNext(); return; }
        if(currentSubReq.sauces.includes(v)) currentSubReq.sauces = currentSubReq.sauces.filter(x=>x!==v);
        else currentSubReq.sauces.push(v);
        document.querySelectorAll('.sauce-btn').forEach(b => b.classList.toggle('selected', currentSubReq.sauces.includes(b.innerText.replace('麵',''))));
    }

    function checkSauceNext() {
        if(currentSubReq.sauces.length === 0) return alert("請選擇醬料");
        goNext('step-no-extra'); renderNoExtraGrid();
    }

    function renderNoExtraGrid() {
        const cont = document.getElementById('grid-noExtra');
        cont.innerHTML = '';
        config.noExtra.forEach(name => {
            const div = document.createElement('div'); div.className = 'opt';
            div.innerHTML = `<span>${name}</span>`;
            div.onclick = () => { div.classList.toggle('selected'); if(currentSubReq.noExtras.includes(name)) currentSubReq.noExtras = currentSubReq.noExtras.filter(x=>x!==name); else currentSubReq.noExtras.push(name); };
            cont.appendChild(div);
        });
    }

    function checkNoExtraNext() { goNext('step-additions'); renderAdditionsGrid(); }

    function renderAdditionsGrid() {
        const cont = document.getElementById('grid-additions');
        cont.innerHTML = '';
        config.additionsList.forEach(name => {
            const div = document.createElement('div'); div.className = 'opt';
            div.innerHTML = `<span>${name}</span>`;
            div.onclick = () => { currentSubReq.additions[name] = 1; checkAdditionNext(); };
            cont.appendChild(div);
        });
    }

    function checkAdditionNext() {
        sessionOrder.subItems.push(JSON.parse(JSON.stringify(currentSubReq)));
        currentProcessIdx++;
        if (currentProcessIdx < sessionOrder.totalQty) prepareNextSubItem();
        else finalizeToCart();
    }

    function finalizeToCart() {
        sessionOrder.subItems.forEach(item => cart.push(item));
        updateCart();
        goNext('step-finish');
    }

    function updateCart() {
        const cont = document.getElementById('current-cart');
        cont.innerHTML = cart.map(i => `<div style="padding:10px; border-bottom:1px solid #eee;">${sessionOrder.mainName} [${i.size}] ${i.noodle||''} - $${i.price}</div>`).join('');
    }

    function goNext(id) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function resetForNewItem() { location.reload(); }
</script>
</body>
</html>
