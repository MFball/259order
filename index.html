<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Million 麵店 - Ver 2.9.9 精準分配版</title>
    <style>
        :root { --primary: #1a73e8; --secondary: #f0f2f5; --success: #34a853; --price-tag: #d93025; --edit: #f39c12; --add: #673ab7; }
        body { font-family: sans-serif; background: var(--secondary); margin: 0; padding: 10px; text-align: center; }
        .container { max-width: 500px; margin: auto; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding-bottom: 110px; min-height: 85vh; position: relative; }
        .step { display: none; animation: fadeIn 0.3s; }
        .step.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        h2 { color: #333; font-size: 1.1rem; margin: 10px 0 5px 0; border-left: 5px solid var(--primary); padding-left: 10px; text-align: left; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .opt { background: #fff; border: 2px solid #eee; border-radius: 12px; cursor: pointer; overflow: hidden; position: relative; display: flex; flex-direction: column; min-height: 140px; }
        .img-box { width: 100%; height: 100px; display: flex; background: #fafafa; overflow: hidden; position: relative; justify-content: center; align-items: center; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .opt span { padding: 8px 5px; font-weight: bold; font-size: 0.9rem; flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        .opt.selected { border-color: var(--primary); background: #e8f0fe; }

        /* Step 2 分配專用 UI */
        .dist-card { background: #fdf2f2; border: 1px dashed var(--price-tag); padding: 15px; border-radius: 15px; margin-bottom: 15px; text-align: left; }
        .dist-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: white; border-radius: 10px; margin-top: 10px; border: 1px solid #eee; }
        .qty-ctrl { display: flex; align-items: center; gap: 12px; }
        .btn-round { width: 32px; height: 32px; border-radius: 50%; border: 1px solid #ccc; background: #fff; font-weight: bold; cursor: pointer; }
        
        /* 底部導航 */
        .nav-btns { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px; display: flex; gap: 8px; max-width: 500px; margin: auto; box-shadow: 0 -5px 10px rgba(0,0,0,0.05); z-index: 1000; }
        button { flex: 1; padding: 12px 5px; border-radius: 10px; border: none; font-size: 1rem; cursor: pointer; font-weight: bold; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-green { background: var(--success); color: white; }
        .btn-gray { background: #eee; color: #777; }
    </style>
</head>
<body>

<div class="container">
    <div class="step active" id="step-1">
        <h2>1. 請選擇麵食與總數 [cite: 214]</h2>
        <div class="grid" id="main-menu">
            <div class="opt" onclick="pickMain('魚圓面')">
                <div class="img-box"><img src="https://lh3.googleusercontent.com/pw/AP1GczM1EgErnLz57PZ0ckyDapaXUx27rggwr5VvU49Yo1vpygNeiLiTCVK6nGMT7UewX9jWyWN7Q04y5g8QeGtKBFBtYod8YZd1L42sFsRuRCpY2EvidrI=w2400?source=screenshot.guru"></div>
                <span>魚圓面</span>
            </div>
            <div class="opt" onclick="pickMain('香菇肉碎面')">
                <div class="img-box"><img src="https://lh3.googleusercontent.com/pw/AP1GczPRrBESQHr4MjJaDdiXYFda03b72aUrxqrO--coLUrariBXksy0KTPNNaXhzOmmrVhkbChOGKQFqiR8zRRcPZWSd7Hk-inOhSXStOXgC8d0a85lycU=w2400?source=screenshot.guru"></div>
                <span>香菇肉碎面</span>
            </div>
        </div>
    </div>

    <div class="step" id="step-2">
        <h2>2. 分配大/小數量 </h2>
        <div class="dist-card">
            <div style="font-weight: bold; font-size: 1.1rem;" id="dist-item-name">麵食名稱</div>
            <div style="margin-top: 5px;">總共點了：<span id="target-qty" style="color:red; font-weight:bold;">0</span> 份</div>
        </div>

        <div class="dist-row">
            <span>大的 (+$1.00) [cite: 230]</span>
            <div class="qty-ctrl">
                <button class="btn-round" onclick="changeDist('large', -1)">-</button>
                <b id="val-large">0</b>
                <button class="btn-round" onclick="changeDist('large', 1)">+</button>
            </div>
        </div>

        <div class="dist-row">
            <span>小的 [cite: 230]</span>
            <div class="qty-ctrl">
                <button class="btn-round" onclick="changeDist('small', -1)">-</button>
                <b id="val-small">0</b>
                <button class="btn-round" onclick="changeDist('small', 1)">+</button>
            </div>
        </div>

        <div style="margin-top: 20px; color: #666; font-size: 0.9rem;" id="dist-status">還需分配 0 份</div>

        <div class="nav-btns">
            <button class="btn-blue" onclick="validateAndGoNext()">確認分配，開始配置</button>
        </div>
    </div>

    <div class="step" id="step-3">
        <h2 id="config-title" style="color: var(--add);">配置第 1 碗</h2>
        
        <h3>選擇麵種 </h3>
        <div class="grid" id="noodle-grid">
            <div class="opt n-opt" onclick="setNoodle('面薄', this)"><span>面薄</span></div>
            <div class="opt n-opt" onclick="setNoodle('幼面', this)"><span>幼面</span></div>
            <div class="opt n-opt" onclick="setNoodle('米粉', this)"><span>米粉</span></div>
            <div class="opt n-opt" onclick="setNoodle('粿條', this)"><span>粿條</span></div>
        </div>

        <h3>選擇醬料 [cite: 219]</h3>
        <div class="grid" style="grid-template-columns: 1fr 1fr 1fr;">
            <button class="btn-gray s-opt" onclick="setSauce('辣椒', this)">辣椒</button>
            <button class="btn-gray s-opt" onclick="setSauce('茄汁', this)">茄汁</button>
            <button class="btn-gray s-opt" onclick="setSauce('湯', this)">湯</button>
        </div>

        <div class="nav-btns">
            <button class="btn-green" id="next-bowl-btn" onclick="saveBowlAndNext()">下一步</button>
        </div>
    </div>
</div>

<script>
    let orderState = {
        currentName: '',
        totalTarget: 0,
        dist: { large: 0, small: 0 },
        bowlQueue: [], 
        completedBowls: [] 
    };

    let currentBowlDraft = { noodle: '', sauce: '' };

    function pickMain(name) {
        orderState.currentName = name;
        let num = prompt(`您要幾份 ${name}?`, "2");
        if (!num || isNaN(num) || num <= 0) return;
        
        orderState.totalTarget = parseInt(num);
        orderState.dist = { large: 0, small: 0 };
        
        document.getElementById('dist-item-name').innerText = name;
        document.getElementById('target-qty').innerText = num;
        updateDistUI();
        showStep('step-2');
    }

    function changeDist(type, delta) {
        let next = orderState.dist[type] + delta;
        if (next < 0) return;
        orderState.dist[type] = next;
        updateDistUI();
    }

    function updateDistUI() {
        document.getElementById('val-large').innerText = orderState.dist.large;
        document.getElementById('val-small').innerText = orderState.dist.small;
        
        let currentTotal = orderState.dist.large + orderState.dist.small;
        let diff = orderState.totalTarget - currentTotal;
        let statusEl = document.getElementById('dist-status');
        
        if (diff > 0) statusEl.innerText = `還需分配 ${diff} 份`;
        else if (diff < 0) statusEl.innerText = `超出分配 ${Math.abs(diff)} 份！`;
        else statusEl.innerText = `✅ 分配完畢`;
    }

    function validateAndGoNext() {
        if (orderState.dist.large + orderState.dist.small !== orderState.totalTarget) {
            alert(`數量分配不均！總數選了 ${orderState.totalTarget}，目前分配了大 ${orderState.dist.large}、小 ${orderState.dist.small}。請調整至完全匹配。`);
            return;
        }
        
        orderState.bowlQueue = [];
        for(let i=0; i<orderState.dist.large; i++) orderState.bowlQueue.push('大的');
        for(let i=0; i<orderState.dist.small; i++) orderState.bowlQueue.push('小的');
        
        orderState.completedBowls = [];
        startNextBowlConfig();
    }

    function startNextBowlConfig() {
        if (orderState.bowlQueue.length === 0) {
            finalizeOrder();
            return;
        }

        let currentSize = orderState.bowlQueue[0];
        let bowlNum = orderState.completedBowls.length + 1;
        
        document.getElementById('config-title').innerText = `配置第 ${bowlNum} 碗 (${currentSize})`;
        document.getElementById('next-bowl-btn').innerText = orderState.bowlQueue.length === 1 ? "完成並加入購物車" : "下一碗";

        currentBowlDraft = { noodle: '', sauce: '' };
        document.querySelectorAll('.opt, .s-opt').forEach(el => el.classList.remove('selected'));
        document.querySelectorAll('.s-opt').forEach(el => { el.style.background = '#eee'; el.style.color = '#777'; });

        showStep('step-3');
    }

    function setNoodle(val, el) {
        currentBowlDraft.noodle = val;
        document.querySelectorAll('.n-opt').forEach(opt => opt.classList.remove('selected'));
        el.classList.add('selected');
    }

    function setSauce(val, el) {
        currentBowlDraft.sauce = val;
        document.querySelectorAll('.s-opt').forEach(opt => { opt.style.background = '#eee'; opt.style.color = '#777'; });
        el.style.background = 'var(--primary)';
        el.style.color = 'white';
    }

    function saveBowlAndNext() {
        if (!currentBowlDraft.noodle || !currentBowlDraft.sauce) {
            alert("請選擇麵種和醬料！");
            return;
        }

        let size = orderState.bowlQueue.shift();
        orderState.completedBowls.push({ size, ...currentBowlDraft });
        startNextBowlConfig();
    }

    function finalizeOrder() {
        let summary = orderState.completedBowls.map((b, i) => 
            `第${i+1}碗 (${b.size}): ${b.noodle} / ${b.sauce}`
        ).join('\n');
        alert(`✅ 已成功加入購物車！\n\n${orderState.currentName} 共 ${orderState.totalTarget} 份\n${summary}`);
        location.reload(); 
    }

    function showStep(id) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>
</body>
</html>
