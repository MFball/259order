<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Million Noodles POS</title>
    <script src="https://unpkg.com/gbk.js/dist/gbk.js"></script>
    <style>
        :root { --primary: #1a73e8; --secondary: #f0f2f5; --success: #34a853; --price-tag: #d93025; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--secondary); margin: 0; padding: 10px; text-align: center; }
        .container { max-width: 500px; margin: auto; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding-bottom: 90px; min-height: 85vh; position: relative; }
        .step { display: none; }
        .step.active { display: block; }
        h2 { color: #333; font-size: 1.1rem; border-left: 5px solid var(--primary); padding-left: 10px; text-align: left; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .opt { background: #fff; border: 2px solid #eee; border-radius: 12px; padding: 15px 5px; font-weight: bold; cursor: pointer; }
        .opt.selected { border-color: var(--primary); background: #e8f0fe; }
        .cart-box { margin-top: 20px; padding: 15px; border: 2px dashed var(--primary); border-radius: 10px; text-align: left; background: #fffbe6; }
        .total-price-bar { font-size: 1.8rem; color: var(--price-tag); font-weight: bold; margin: 20px 0; }
        .nav-btns { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px; display: flex; gap: 10px; max-width: 500px; margin: auto; }
        button { flex: 1; padding: 15px; border-radius: 10px; border: none; font-size: 1.1rem; cursor: pointer; font-weight: bold; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-green { background: var(--success); color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="step active" id="s1">
        <h2>1. 選擇類別</h2>
        <div class="grid">
            <div class="opt" onclick="setCat('湯')">湯品</div>
            <div class="opt" onclick="setCat('面')">麵食</div>
        </div>
    </div>

    <div class="step" id="s2">
        <h2 id="catTitle">2. 選擇品項</h2>
        <div class="grid" id="itemGrid"></div>
        <div class="nav-btns"><button class="btn-blue" onclick="goS3()">下一步</button></div>
    </div>

    <div class="step" id="s3">
        <h2>🛒 購物車明細</h2>
        <div id="cartBox" class="cart-box"></div>
        <div class="total-price-bar">總計: $<span id="totalSum">0</span></div>
        <div class="nav-btns">
            <button class="btn-blue" onclick="location.reload()">重新開始</button>
            <button class="btn-green" onclick="handlePrint()">🖨️ 藍牙出單</button>
        </div>
    </div>
</div>

<script>
    const menu = {
        '湯': ['魚圓湯', '肉圓湯', '魚餃湯', '三寶湯'],
        '面': ['魚圓面', '肉碎面', '招牌面', '餐餐面']
    };
    let cart = [];
    let printChar;

    function setCat(c) {
        const grid = document.getElementById('itemGrid');
        grid.innerHTML = '';
        menu[c].forEach(i => {
            const d = document.createElement('div'); d.className = 'opt'; d.innerText = i;
            d.onclick = () => { d.classList.toggle('selected'); toggleItem(i); };
            grid.appendChild(d);
        });
        goNext('s2');
    }

    function toggleItem(i) {
        const idx = cart.indexOf(i);
        if(idx > -1) cart.splice(idx, 1); else cart.push(i);
    }

    function goS3() {
        if(cart.length === 0) return alert("請先選餐");
        let t = cart.length * 5; // 假設每份5元
        document.getElementById('cartBox').innerHTML = cart.map(i => `<div>- ${i}</div>`).join('');
        document.getElementById('totalSum').innerText = t;
        goNext('s3');
    }

    function goNext(id) { document.querySelectorAll('.step').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

    async function handlePrint() {
        if (!printChar) {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['0000ffe0-0000-1000-8000-00805f9b34fb']
                });
                const server = await device.gatt.connect();
                // 根據自檢頁調整連線邏輯
                const service = await server.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
                printChar = await service.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');
                alert("已連線到 Printer001！請再按一次列印。");
                return;
            } catch (e) {
                alert("連線失敗：" + e.message);
                return;
            }
        }

        try {
            // ESC/POS 指令：初始化 + 進入漢字模式
            const init = [0x1B, 0x40, 0x1C, 0x26];
            let content = "\n  Million Noodles\n\n";
            cart.forEach((item, idx) => { content += `${idx+1}. ${item}\n`; });
            content += "\n----------------\n";
            content += `TOTAL: $${document.getElementById('totalSum').innerText}\n\n\n\n\n`;

            // 使用 GBK 轉碼 (解決簡體字庫顯示繁體變亂碼的問題)
            const gbkBytes = gbk.encode(content);
            const fullData = new Uint8Array([...init, ...gbkBytes]);
            
            await printChar.writeValue(fullData);
            alert("列印成功！");
        } catch (e) {
            alert("列印失敗：" + e.message);
            printChar = null;
        }
    }
</script>
</body>
</html>
