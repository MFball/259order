<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Million 麵店 - ver 3.0.2</title>
    <style>
        :root { --primary: #1a73e8; --secondary: #f0f2f5; --success: #34a853; --price-tag: #d93025; --edit: #f39c12; --add: #673ab7; }
        body { font-family: sans-serif; background: var(--secondary); margin: 0; padding: 10px; text-align: center; }
        .container { max-width: 500px; margin: auto; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding-bottom: 110px; min-height: 85vh; position: relative; }
        .step { display: none; animation: fadeIn 0.3s; }
        .step.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .back-btn-top { position: absolute; right: 0; top: 0; width: 35px; height: 35px; border-radius: 50%; background: #eee; color: #555; border: none; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; }
        h2 { color: #333; font-size: 1.1rem; margin: 10px 0 5px 0; border-left: 5px solid var(--primary); padding-left: 10px; text-align: left; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        /* 麵食選項優化 */
        .opt { background: #fff; border: 2px solid #eee; border-radius: 12px; cursor: pointer; overflow: hidden; position: relative; display: flex; flex-direction: column; min-height: 180px; }
        .img-box { width: 100%; height: 100px; display: flex; background: #fafafa; overflow: hidden; position: relative; justify-content: center; align-items: center; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .price-circle { position: absolute; top: 5px; right: 5px; background: var(--price-tag); color: white; width: 42px; height: 32px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: bold; z-index: 5; border: 2px solid white; }
        .opt span { padding: 5px; font-weight: bold; font-size: 0.9rem; background: #fff; z-index: 2; border-top: 1px solid #f0f0f0; }
        
        /* 大小選擇左右並列 */
        .qty-input-overlay { background: #f8f9fa; display: flex; justify-content: space-between; padding: 5px 8px; border-top: 1px solid #eee; }
        .qty-unit { display: flex; flex-direction: column; align-items: center; gap: 2px; flex: 1; }
        .qty-row-btns { display: flex; align-items: center; gap: 4px; }
        .qty-btn { width: 28px; height: 28px; border-radius: 4px; border: 1px solid #ccc; background: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1rem; }
        .qty-val { font-weight: bold; min-width: 15px; font-size: 0.9rem; }

        .opt.selected { border-color: var(--primary); background: #e8f0fe; }
        .opt.selected span { background: #e8f0fe; }

        .sauce-layout { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        .sauce-row-flex { display: flex; gap: 8px; justify-content: center; }
        .sauce-btn { flex: 1; padding: 15px 5px; border: 2px solid #eee; border-radius: 10px; background: white; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.2s; min-width: 0; }
        .sauce-btn.selected { border-color: var(--primary); background: #e8f0fe; color: var(--primary); }
        
        /* 加料區按鈕修復 */
        .add-qty-bar { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 8px 5px; background: #f9f9f9; border-top: 1px solid #eee; flex-wrap: nowrap; }
        .btn-add-minus { width: 34px; height: 34px; border-radius: 6px; border: 1px solid #ddd; background: white; font-weight: bold; font-size: 1.2rem; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        .add-num { font-size: 1.1rem; font-weight: bold; color: var(--add); min-width: 25px; text-align: center; }
        
        .cart-box { margin-top: 20px; padding: 10px; border: 1px solid #ddd; border-radius: 10px; text-align: left; background: #fff; }
        .cart-item { border-bottom: 1px solid #eee; padding: 12px 0; }
        .total-price-bar { font-size: 1.6rem; color: var(--price-tag); font-weight: bold; margin: 15px 0; }
        .nav-btns { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px; display: flex; gap: 8px; max-width: 500px; margin: auto; box-shadow: 0 -5px 10px rgba(0,0,0,0.05); z-index: 1000; }
        button { flex: 1; padding: 12px 5px; border-radius: 10px; border: none; font-size: 0.95rem; cursor: pointer; font-weight: bold; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-green { background: var(--success); color: white; }
        .btn-red { background: var(--price-tag); color: white; }
        .multi-info { font-size: 0.85rem; color: #1a73e8; margin-bottom: 8px; text-align: left; background: #e8f0fe; padding: 8px 12px; border-radius: 8px; font-weight: bold; line-height: 1.4; }
        .version-tag { position: absolute; bottom: 10px; right: 15px; font-size: 10px; color: #999; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="status" style="font-size: 11px; color: #d93025; font-weight: bold; margin-bottom: 5px;">● 藍牙待機中</div>
    
    <div class="step active" id="step-start">
        <button onclick="showHistory()" style="background: #607d8b; color: white; padding: 5px 12px; border-radius: 15px; font-size: 0.8rem; position: absolute; left: 15px; top: 15px; border: none; cursor: pointer;">📜 歷史紀錄</button>
        <h2 style="margin-top: 40px;">1. 請選擇類別</h2>
        <div class="grid">
            <div class="opt" onclick="setCategory('湯')"><div class="img-box"><img src="https://i.ibb.co/C34m6K2G/Soup-Category.png"></div><span>湯品類</span></div>
            <div class="opt" onclick="setCategory('面')"><div class="img-box"><img src="https://i.ibb.co/Vp6q7Gk8/Noodle-Category.png"></div><span>麵食類</span></div>
        </div>
        <div class="version-tag">ver 3.0.2</div>
    </div>

    <div class="step" id="step-history"><button class="back-btn-top" onclick="goNext('step-start')">←</button><h2>今天訂單歷史</h2><div id="history-container"></div></div>

    <div class="step" id="step-soup-select"><button class="back-btn-top" onclick="goNext('step-start')">←</button><h2>2. 請選擇湯品</h2><div class="grid" id="grid-soupItems"></div></div>

    <div class="step" id="step-food-select">
        <button class="back-btn-top" onclick="goNext('step-start')">←</button>
        <h2>2. 請選擇麵食與數量</h2>
        <div class="grid" id="grid-foodItems"></div>
        <div class="nav-btns"><button class="btn-blue" onclick="checkFoodNext()">下一步</button></div>
    </div>

    <div class="step" id="step-noodle-type">
        <button class="back-btn-top" onclick="goNext('step-food-select')">←</button>
        <div id="noodle-count-info" class="multi-info"></div>
        <h2>3. 分配麵種數量</h2>
        <div class="grid" id="grid-noodleType"></div>
        <div class="nav-btns"><button class="btn-blue" onclick="checkNoodleNext()">下一步</button></div>
    </div>
    
    <div class="step" id="step-sauce-select">
        <button class="back-btn-top" onclick="handleSauceBack()">←</button>
        <div id="sauce-count-info" class="multi-info"></div>
        <h2 id="sauce-title">5. 選擇醬料與要求</h2>
        <div class="sauce-layout">
            <div class="sauce-row-flex"><button class="sauce-btn" onclick="toggleSauce('辣椒')">辣椒</button><button class="sauce-btn" onclick="toggleSauce('少辣')">少辣</button><button class="sauce-btn" onclick="toggleSauce('多辣')">多辣</button></div>
            <div class="sauce-row-flex"><button class="sauce-btn" onclick="toggleSauce('茄汁')">茄汁</button><button class="sauce-btn" onclick="toggleSauce('醋')">醋</button><button class="sauce-btn" onclick="toggleSauce('黑醬油')">黑醬油</button></div>
            <div class="sauce-row-flex"><button class="sauce-btn" onclick="toggleSauce('白醬青')">白醬青</button><button class="sauce-btn" onclick="handleSoupSauce()" style="background: #e3f2fd; border-color: #2196f3; color: #1565c0;">湯麵</button></div>
            <div style="background: #fff8e1; padding: 10px; border-radius: 12px; border: 1px dashed #ffd54f; margin-top: 5px;">
                <div style="font-weight:bold; font-size:0.9rem; color:#f57c00; margin-bottom:8px; text-align:left;">特別要求：</div>
                <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 8px;">
                    <button class="sauce-btn" onclick="toggleSpecial('剪麵')">剪麵</button><button class="sauce-btn" onclick="toggleSpecial('豬油渣')">豬油渣</button><button class="sauce-btn" onclick="toggleSpecial('面要柔軟')">面要柔軟</button><button class="sauce-btn" onclick="toggleSpecial('面要彈性')">面要彈性</button>
                </div>
            </div>
        </div>
        <div class="nav-btns"><button class="btn-blue" onclick="checkSauceNext()">下一步</button></div>
    </div>

    <div class="step" id="step-no-extra">
        <button class="back-btn-top" onclick="handleNoExtraBack()">←</button>
        <div id="noextra-count-info" class="multi-info"></div>
        <h2 id="noextra-title">6. 不要什麼配料？</h2>
        <div class="grid" id="grid-noExtra"></div>
        <div class="nav-btns"><button class="btn-blue" onclick="checkNoExtraNext()">下一步 (加料)</button></div>
    </div>
    
    <div class="step" id="step-additions">
        <button class="back-btn-top" onclick="goNext('step-no-extra')">←</button>
        <div id="addition-count-info" class="multi-info"></div>
        <h2 id="addition-title">7. 加料區</h2>
        <div class="grid" id="grid-additions"></div>
        <div class="nav-btns"><button class="btn-blue" onclick="checkAdditionNext()">✅ 確認此份</button></div>
    </div>
    
    <div class="step" id="step-finish">
        <h2>🛒 購物車明細</h2>
        <div id="preview-order-info" style="background: #fdf2f2; padding: 8px; border-radius: 10px; margin-bottom: 15px; text-align: left; font-size: 0.9rem; border: 1px dashed var(--price-tag);"></div>
        <div class="cart-box" id="current-cart"></div>
        <div class="total-price-bar">總金額: $<span id="total-sum">0</span></div>
        <div class="nav-btns">
            <button class="btn-red" onclick="cancelAndClear()">❌ 清空</button>
            <button class="btn-blue" onclick="resetForNewItem()">➕ 繼續點</button>
            <button class="btn-green" id="printBtn" onclick="finalizeAndPrint()">🖨️ 確認並列印</button>
        </div>
    </div>
</div>

<canvas id="printCanvas" width="384"></canvas>

<script>
    const START_NO = 8238;
    const config = {
        '魚圓湯': { p: 5, img: 'https://i.ibb.co/27v0HPhy/Fishball-soup.png' }, 
        '肉圓湯': { p: 5, img: 'https://i.ibb.co/mVMYyL6k/Meatball-soup.png' }, 
        '魚餃湯': { p: 5, img: 'https://i.ibb.co/nNLMt8jp/Fish-Dumpling-noodle.png' }, 
        '三寶湯': { p: 6, img: 'https://i.ibb.co/RkM4Yd5n/Three-Treasure-Soup.png' },
        '魚圓面': { p: 4, img: 'https://i.ibb.co/p6ZzM7h/Fishball-Noodle.png' }, 
        '香菇肉碎面': { p: 5, img: 'https://i.ibb.co/v4m86L26/Mushroom-minced-meat-noodle.png' },
        '招牌面': { p: 6, img: 'https://i.ibb.co/P73vR31/Signature-noodle.png' }, 
        '餐餐面': { p: 6, img: 'https://i.ibb.co/v40Yf0S7/Everyday-noodle.png' }, 
        '肉圓面': { p: 4, img: 'https://i.ibb.co/rK9pYpZf/Meatball-noodle.png' }, 
        '蝦魚面': { p: 5, img: 'https://i.ibb.co/C3n6S7tV/Prawn-Fish-noodle.png' }, 
        '西刀魚面': { p: 4, img: 'https://i.ibb.co/4Z9YkXgL/Saito-fish-noodle.png' }, 
        '香菇面': { p: 5, img: 'https://i.ibb.co/WvYxK6Y4/Mushroom-noodle.png' }, 
        '魚餃面': { p: 4, img: 'https://i.ibb.co/nNLMt8jp/Fish-Dumpling-noodle.png' },
        '(純)肉碎面': { p: 4, img: 'https://i.ibb.co/p6ZzM7h/Fishball-Noodle.png' },
        '小魚香面': { p: 4, img: 'https://i.ibb.co/Y4X8qGst/Small-fish-fragrant-noodle.png' }, 
        '小的': { p: 0 }, '大的': { p: 1 },
        'noodleType': { 
            '面薄': 'https://i.ibb.co/1G7y8x9/Mee-Pok.png', '幼面': 'https://i.ibb.co/4Z3pjddg/Mee-Kia.png',
            '粿條': 'https://i.ibb.co/Kc4dzrMJ/Kuay-Teow.png', '熟面': 'https://i.ibb.co/GvHqTPM4/Hokkien-Mee.png',
            '米粉': 'https://i.ibb.co/Kc4dzrMJ/Mee-Hoon.png', '米太目': 'https://i.ibb.co/4Z3pjddg/Mee-Kia.png',
            '冬粉': 'https://i.ibb.co/1G7y8x9/Mee-Pok.png',
            '粿條面': 'https://i.ibb.co/4Z3pjddg/Kuay-Teow-Noodle.png', 
            '粿條米粉': 'https://i.ibb.co/Kc4dzrMJ/Kuay-Teow-Mee-Hoon.png', 
            '米粉面': 'https://i.ibb.co/GvHqTPM4/Mee-Hoon-Noodle.png' 
        },
        'noExtra': ['油', '蔥', '香菇', '肉碎', '黑醬油', '肉圓換魚圓'],
        'noExtraImgs': { '肉碎': 'https://i.ibb.co/676LvDVq/Minced-meat.png', '香菇': 'https://i.ibb.co/gM38Xyd2/Mushroom.png', '蔥': 'https://i.ibb.co/VWF95cZS/Spring-onion.png', '油': 'https://i.ibb.co/X6SD0Tg/Oil.png', '黑醬油': 'https://i.ibb.co/b5xFQwFg/Dark-soy-sauce.png' },
        'additionsList': ['魚圓', '肉圓', '魚餃', '香菇', '肉碎', '西刀魚餅', '小魚香', '蝦'],
        'additionsImgs': { '魚圓': 'https://i.ibb.co/27v0HPhy/Fishball.png', '肉圓': 'https://i.ibb.co/mVMYyL6k/Meatball.png', '魚餃': 'https://i.ibb.co/nNLMt8jp/Fish-Dumpling.png', '香菇': 'https://i.ibb.co/WvYxK6Y4/Mushroom.png', '肉碎': 'https://i.ibb.co/TMFvjFRN/Minced.png', '西刀魚餅': 'https://i.ibb.co/4Z9YkXgL/Saito-fish-cake.png', '小魚香': 'https://i.ibb.co/Y4X8qGst/Small-fish.png', '蝦': 'https://i.ibb.co/C3n6S7tV/Prawn.png' },
        'additionsPrices': { '西刀魚餅': 1.5 }
    };

    let cart = [];
    let sessionOrder = { category: '', mainName: '', counts: { '小的': 0, '大的': 0 }, totalQty: 0, subItems: [], noodlePlan: {} };
    let currentProcessIdx = 0, currentSubReq = null, savedDevice = null, savedCharacteristic = null, isFastMode = false;

    function getOrderData() { const today = new Date().toLocaleDateString(); let data = JSON.parse(localStorage.getItem('million_order_data')) || { date: today, num: START_NO, history: [] }; if (data.date !== today) { data.date = today; data.num = START_NO; data.history = []; } return data; }
    function saveOrderData(data) { localStorage.setItem('million_order_data', JSON.stringify(data)); }
    
    function init() {
        renderGrid(['魚圓湯','肉圓湯','魚餃湯','三寶湯'], 'grid-soupItems', (val) => { 
            sessionOrder.mainName = val; sessionOrder.totalQty = 1; sessionOrder.counts = {'小的': 1, '大的': 0}; startSubProcess();
        });
        renderFoodGrid();
    }

    function renderFoodGrid() {
        const list = ['魚圓面', '香菇肉碎面', '招牌面', '餐餐面', '肉圓面', '蝦魚面', '西刀魚面', '香菇面', '魚餃面', '(純)肉碎面', '小魚香面'];
        const cont = document.getElementById('grid-foodItems'); cont.innerHTML = '';
        list.forEach(name => {
            const div = document.createElement('div'); div.className = 'opt';
            if (sessionOrder.mainName === name) div.classList.add('selected');
            div.innerHTML = `
                <div class="img-box"><div class="price-circle">$${config[name].p}</div><img src="${config[name].img}"></div>
                <span>${name}</span>
                <div class="qty-input-overlay" onclick="event.stopPropagation()">
                    <div class="qty-unit">
                        <div style="font-size:0.7rem; color:#666;">小的</div>
                        <div class="qty-row-btns">
                            <button class="qty-btn" onclick="changeMainQty('${name}','小的',-1)">-</button>
                            <span class="qty-val" id="q-s-${name}">${sessionOrder.mainName===name?sessionOrder.counts['小的']:0}</span>
                            <button class="qty-btn" onclick="changeMainQty('${name}','小的',1)">+</button>
                        </div>
                    </div>
                    <div style="width:1px; background:#eee; margin:0 5px;"></div>
                    <div class="qty-unit">
                        <div style="font-size:0.7rem; color:#666;">大的</div>
                        <div class="qty-row-btns">
                            <button class="qty-btn" onclick="changeMainQty('${name}','大的',-1)">-</button>
                            <span class="qty-val" id="q-l-${name}">${sessionOrder.mainName===name?sessionOrder.counts['大的']:0}</span>
                            <button class="qty-btn" onclick="changeMainQty('${name}','大的',1)">+</button>
                        </div>
                    </div>
                </div>
            `;
            div.onclick = () => { sessionOrder.mainName = name; document.querySelectorAll('#grid-foodItems .opt').forEach(o=>o.classList.remove('selected')); div.classList.add('selected'); };
            cont.appendChild(div);
        });
    }

    function changeMainQty(name, size, delta) {
        if (sessionOrder.mainName !== name) {
            sessionOrder.mainName = name;
            document.querySelectorAll('#grid-foodItems .opt').forEach(o=>{ o.classList.remove('selected'); if(o.querySelector('span').innerText === name) o.classList.add('selected'); });
        }
        sessionOrder.counts[size] = Math.max(0, sessionOrder.counts[size] + delta);
        document.getElementById(size === '小的' ? `q-s-${name}` : `q-l-${name}`).innerText = sessionOrder.counts[size];
    }

    function checkFoodNext() {
        sessionOrder.totalQty = sessionOrder.counts['小的'] + sessionOrder.counts['大的'];
        if (sessionOrder.totalQty === 0) return alert("請至少選擇一個數量");
        startSubProcess();
    }

    function startSubProcess() {
        sessionOrder.subItems = []; sessionOrder.tempSizes = [];
        for(let i=0; i<sessionOrder.counts['小的']; i++) sessionOrder.tempSizes.push('小的');
        for(let i=0; i<sessionOrder.counts['大的']; i++) sessionOrder.tempSizes.push('大的');
        
        if (sessionOrder.category === '湯') { currentProcessIdx = 0; prepareNextSubItem(); } 
        else { sessionOrder.noodlePlan = {}; renderNoodlePlanGrid(); updateNoodleCountInfo(); goNext('step-noodle-type'); }
    }

    function renderNoodlePlanGrid() {
        const cont = document.getElementById('grid-noodleType'); cont.innerHTML = '';
        Object.keys(config.noodleType).forEach(name => {
            const div = document.createElement('div'); div.className = 'opt';
            const qty = sessionOrder.noodlePlan[name] || 0;
            div.innerHTML = `<div class="img-box"><img src="${config.noodleType[name]}"></div><span>${name}</span><div class="add-qty-bar" onclick="event.stopPropagation()"><button class="btn-add-minus" onclick="changeNoodlePlanQty('${name}',-1)">-</button><span class="add-num" id="plan-qty-${name}">${qty}</span><button class="btn-add-minus" onclick="changeNoodlePlanQty('${name}',1)">+</button></div>`;
            cont.appendChild(div);
        });
    }

    function changeNoodlePlanQty(name, delta) {
        let currentTotal = Object.values(sessionOrder.noodlePlan).reduce((a,b)=>a+b, 0);
        let val = sessionOrder.noodlePlan[name] || 0;
        if (delta > 0 && currentTotal >= sessionOrder.totalQty) return;
        val = Math.max(0, val + delta);
        if (val === 0) delete sessionOrder.noodlePlan[name]; else sessionOrder.noodlePlan[name] = val;
        document.getElementById(`plan-qty-${name}`).innerText = val;
        updateNoodleCountInfo();
    }

    function updateNoodleCountInfo() {
        let currentTotal = Object.values(sessionOrder.noodlePlan).reduce((a,b)=>a+b, 0);
        document.getElementById('noodle-count-info').innerHTML = `📍 目前選擇：${sessionOrder.mainName} (小:${sessionOrder.counts['小的']} 大:${sessionOrder.counts['大的']})<br>需分配：${sessionOrder.totalQty} 份 | 已分配：${currentTotal} (剩餘：${sessionOrder.totalQty - currentTotal})`;
    }

    function checkNoodleNext() {
        let currentTotal = Object.values(sessionOrder.noodlePlan).reduce((a,b)=>a+b, 0);
        if (currentTotal !== sessionOrder.totalQty) return alert(`分配數量不符！需分配 ${sessionOrder.totalQty} 份。`);
        sessionOrder.tempNoodles = [];
        Object.entries(sessionOrder.noodlePlan).forEach(([name, count]) => { for(let i=0; i<count; i++) sessionOrder.tempNoodles.push(name); });
        currentProcessIdx = 0; prepareNextSubItem();
    }

    function prepareNextSubItem() {
        const size = sessionOrder.tempSizes[currentProcessIdx], noodle = sessionOrder.category === '面' ? sessionOrder.tempNoodles[currentProcessIdx] : '';
        currentSubReq = { size: size, noodle: noodle, sauces: [], specialReqs: [], noExtras: [], additions: {}, price: config[sessionOrder.mainName].p + config[size].p };
        if (sessionOrder.category === '湯') { goNext('step-no-extra'); updateMultiHeader(); renderNoExtraGrid(); } 
        else { goNext('step-sauce-select'); updateMultiHeader(); refreshSauceUI(); }
    }

    function updateMultiHeader() {
        const info = `📍 正在設定：${sessionOrder.mainName}<br>第 ${currentProcessIdx + 1} / ${sessionOrder.totalQty} 份 [${currentSubReq.size}${currentSubReq.noodle?' - '+currentSubReq.noodle:''}]`;
        ['sauce-count-info', 'noextra-count-info', 'addition-count-info'].forEach(id => { const el = document.getElementById(id); if(el) el.innerHTML = info; });
    }

    function toggleSauce(val) {
        if (currentSubReq.sauces.includes('湯')) currentSubReq.sauces = [];
        if (currentSubReq.sauces.includes(val)) currentSubReq.sauces = currentSubReq.sauces.filter(s => s !== val);
        else { if (currentSubReq.sauces.length >= 3) return alert("最多選3種醬料"); currentSubReq.sauces.push(val); }
        refreshSauceUI();
    }

    function toggleSpecial(val) {
        if (currentSubReq.specialReqs.includes(val)) currentSubReq.specialReqs = currentSubReq.specialReqs.filter(s => s !== val);
        else currentSubReq.specialReqs.push(val);
        refreshSauceUI();
    }

    function handleSoupSauce() { currentSubReq.sauces = ['湯']; refreshSauceUI(); checkSauceNext(); }
    function handleSauceBack() { if(sessionOrder.category==='湯') goNext('step-soup-select'); else goNext('step-noodle-type'); }

    function refreshSauceUI() {
        document.querySelectorAll('#step-sauce-select .sauce-btn').forEach(btn => {
            const txt = btn.innerText, logicV = (txt === '湯麵') ? '湯' : txt;
            if (['剪麵', '豬油渣', '面要柔軟', '面要彈性'].includes(txt)) btn.classList.toggle('selected', currentSubReq.specialReqs.includes(txt));
            else btn.classList.toggle('selected', currentSubReq.sauces.includes(logicV));
        });
    }

    function checkSauceNext() { if (currentSubReq.sauces.length === 0) return alert("請選擇醬料"); goNext('step-no-extra'); renderNoExtraGrid(); }
    function renderNoExtraGrid() { renderGrid(config.noExtra, 'grid-noExtra', (val, el) => { if(currentSubReq.noExtras.includes(val)) { currentSubReq.noExtras = currentSubReq.noExtras.filter(x => x !== val); el.classList.remove('selected'); } else { currentSubReq.noExtras.push(val); el.classList.add('selected'); } }, true); }
    function checkNoExtraNext() { goNext('step-additions'); renderAdditionsGrid(); }

    function renderAdditionsGrid() {
        const cont = document.getElementById('grid-additions'); cont.innerHTML = '';
        config.additionsList.forEach(name => {
            const div = document.createElement('div'); div.className = 'opt'; const qty = currentSubReq.additions[name] || 0;
            div.innerHTML = `<div class="img-box"><div class="price-circle">$${config.additionsPrices[name]||1}</div><img src="${config.additionsImgs[name]}"></div><span>${name}</span><div class="add-qty-bar" onclick="event.stopPropagation()"><button class="btn-add-minus" onclick="changeAddQty('${name}', -1, event)">-</button><span class="add-num" id="add-val-${name}">${qty}</span><button class="btn-add-minus" onclick="changeAddQty('${name}', 1, event)">+</button></div>`;
            cont.appendChild(div);
        });
    }

    function changeAddQty(name, delta, event) {
        event.stopPropagation(); let val = (currentSubReq.additions[name] || 0) + delta;
        if (val >= 0 && val <= 9) { if (val === 0) delete currentSubReq.additions[name]; else currentSubReq.additions[name] = val; document.getElementById(`add-val-${name}`).innerText = val; }
    }

    function checkAdditionNext() {
        let addPrice = 0; Object.entries(currentSubReq.additions).forEach(([name, qty]) => addPrice += (config.additionsPrices[name] || 1) * qty);
        currentSubReq.price += addPrice; sessionOrder.subItems.push(JSON.parse(JSON.stringify(currentSubReq))); currentProcessIdx++;
        if (currentProcessIdx < sessionOrder.totalQty) prepareNextSubItem(); else finalizeSessionToCart();
    }

    function finalizeSessionToCart() {
        sessionOrder.subItems.forEach(sub => cart.push({ category: sessionOrder.category, names: [sessionOrder.mainName], size: sub.size, noodle: sub.noodle, sauces: sub.sauces, specialReqs: sub.specialReqs, noExtras: sub.noExtras, additions: sub.additions, price: sub.price, qty: 1 }));
        updateCartDisplay(); const data = getOrderData(); document.getElementById('preview-order-info').innerHTML = `<b>單號: No.${data.num}</b><br>時間: ${new Date().toLocaleString()}`;
        goNext('step-finish');
    }

    function updateCartDisplay() {
        let t = 0; const cartCont = document.getElementById('current-cart');
        cartCont.innerHTML = cart.map((item, i) => { 
            let lineTotal = item.price * item.qty; t += lineTotal;
            return `<div class="cart-item"><div style="display:flex; justify-content:space-between; align-items:center;"><div><b>${item.names.join('+')}</b> [${item.size.replace('的','')}]<br><small>${item.noodle||''} ${item.sauces.join(',')}</small><br><small style="color:var(--price-tag); font-weight:bold;">$${lineTotal.toFixed(2)}</small></div><div style="display:flex; align-items:center; gap:5px;"><button class="qty-btn" onclick="changeQty(${i},-1)">-</button><b>${item.qty}</b><button class="qty-btn" onclick="changeQty(${i},1)">+</button></div></div></div>`;
        }).join('');
        document.getElementById('total-sum').innerText = t.toFixed(2);
    }

    function changeQty(index, delta) { let item = cart[index]; if (item.qty + delta < 1) { if (confirm("移除此項？")) cart.splice(index, 1); } else item.qty += delta; updateCartDisplay(); }
    function setCategory(v) { sessionOrder.category = v; resetInputValues(); goNext(v === '湯' ? 'step-soup-select' : 'step-food-select'); }
    function goNext(id) { document.querySelectorAll('.step').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    function handleNoExtraBack() { if (sessionOrder.category === '湯') goNext('step-soup-select'); else goNext('step-sauce-select'); }
    
    function resetInputValues() {
        sessionOrder.mainName = ''; sessionOrder.counts = {'小的': 0, '大的': 0}; sessionOrder.totalQty = 0; sessionOrder.noodlePlan = {};
        renderFoodGrid();
    }

    function cancelAndClear() { 
        if(confirm("確定要清空所有內容嗎？")) { 
            cart = []; updateCartDisplay(); resetInputValues(); resetForNewItem(); 
        } 
    }

    function resetForNewItem() { sessionOrder = { category: '', mainName: '', counts: { '小的': 0, '大的': 0 }, totalQty: 0, subItems: [], noodlePlan: {} }; currentProcessIdx = 0; goNext('step-start'); }

    function renderGrid(list, id, clickFn, multi = false) {
        const cont = document.getElementById(id); if(!cont) return; cont.innerHTML = '';
        list.forEach(name => {
            const div = document.createElement('div'); div.className = 'opt';
            let imgSrc = (id === 'grid-noodleType') ? config.noodleType[name] : (id === 'grid-noExtra' ? config.noExtraImgs[name] : config[name]?.img);
            div.innerHTML = `<div class="img-box">${config[name]?.p>0?`<div class="price-circle">$${config[name].p}</div>`:''}<img src="${imgSrc}"></div><span>${name}</span>`;
            div.onclick = () => { if(!multi) Array.from(cont.children).forEach(c=>c.classList.remove('selected')); div.classList.toggle('selected'); clickFn(name, div); };
            cont.appendChild(div);
        });
    }

    // 列印相關函數省略 (保持原有 ver 3.0.1 邏輯不變)
    init();
</script>
</body>
</html>
