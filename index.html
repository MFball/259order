<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Million 麵店 - ver 3.0.0</title>
    <style>
        :root { --primary: #1a73e8; --secondary: #f0f2f5; --success: #34a853; --price-tag: #d93025; --edit: #f39c12; --add: #673ab7; }
        body { font-family: sans-serif; background: var(--secondary); margin: 0; padding: 10px; text-align: center; }
        .container { max-width: 500px; margin: auto; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding-bottom: 110px; min-height: 85vh; position: relative; }
        .step { display: none; animation: fadeIn 0.3s; }
        .step.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .back-btn-top { position: absolute; right: 0; top: 0; width: 35px; height: 35px; border-radius: 50%; background: #eee; color: #555; border: none; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; }
        h2 { color: #333; font-size: 1.1rem; margin: 10px 0 5px 0; border-left: 5px solid var(--primary); padding-left: 10px; text-align: left; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .opt { background: #fff; border: 2px solid #eee; border-radius: 12px; cursor: pointer; overflow: hidden; position: relative; display: flex; flex-direction: column; min-height: 140px; }
        .img-box { width: 100%; height: 100px; display: flex; background: #fafafa; overflow: hidden; position: relative; justify-content: center; align-items: center; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .price-circle { position: absolute; top: 5px; right: 5px; background: var(--price-tag); color: white; width: 42px; height: 32px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 5; border: 2px solid white; }
        .opt span { padding: 8px 5px; font-weight: bold; font-size: 0.9rem; flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        .opt.selected { border-color: var(--primary); background: #e8f0fe; }
        
        /* 新增：麵食選擇頁面的大小按鈕樣式 */
        .size-ctrl-area { display: flex; flex-direction: column; gap: 5px; padding: 5px; background: #f1f3f4; }
        .size-row { display: flex; align-items: center; justify-content: space-between; padding: 2px 5px; }
        .size-label { font-size: 0.8rem; font-weight: bold; }
        .qty-btn-group { display: flex; align-items: center; gap: 8px; }
        .btn-s { width: 24px; height: 24px; border-radius: 4px; border: 1px solid #ccc; background: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .val-s { min-width: 15px; font-size: 0.9rem; font-weight: bold; color: var(--primary); }

        .sauce-layout { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        .sauce-row-flex { display: flex; gap: 8px; justify-content: center; }
        .sauce-btn { flex: 1; padding: 15px 5px; border: 2px solid #eee; border-radius: 10px; background: white; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.2s; min-width: 0; }
        .sauce-btn.selected { border-color: var(--primary); background: #e8f0fe; color: var(--primary); }
        .special-box { background: #fff8e1; padding: 10px; border-radius: 12px; border: 1px dashed #ffd54f; margin-top: 5px; }
        .special-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .add-qty-bar { display: flex; align-items: center; justify-content: center; gap: 5px; padding: 8px 5px; background: #f9f9f9; border-top: 1px solid #eee; white-space: nowrap; }
        .btn-add-minus { width: 32px; height: 32px; border-radius: 5px; border: 1px solid #ddd; background: white; font-weight: bold; font-size: 1.1rem; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        .add-num { font-size: 1.1rem; font-weight: bold; color: var(--add); min-width: 25px; text-align: center; }
        .cart-box { margin-top: 20px; padding: 10px; border: 1px solid #ddd; border-radius: 10px; text-align: left; background: #fff; }
        .cart-item { border-bottom: 1px solid #eee; padding: 12px 0; }
        .item-row { display: flex; justify-content: space-between; align-items: center; }
        .item-info { flex: 1; padding-right: 10px; }
        .item-actions { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; min-width: 110px; }
        .qty-controls { display: flex; align-items: center; gap: 5px; white-space: nowrap; }
        .btn-qty { width: 28px; height: 28px; border-radius: 50%; border: 1px solid #ccc; background: #f8f9fa; font-weight: bold; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .qty-num { font-size: 1.1rem; font-weight: bold; min-width: 20px; text-align: center; }
        .btn-edit { background: var(--edit); color: white; border: none; padding: 4px 8px; border-radius: 5px; font-size: 0.75rem; cursor: pointer; }
        .total-price-bar { font-size: 1.6rem; color: var(--price-tag); font-weight: bold; margin: 15px 0; }
        .nav-btns { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px; display: flex; gap: 8px; max-width: 500px; margin: auto; box-shadow: 0 -5px 10px rgba(0,0,0,0.05); z-index: 1000; }
        button { flex: 1; padding: 12px 5px; border-radius: 10px; border: none; font-size: 0.95rem; cursor: pointer; font-weight: bold; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-green { background: var(--success); color: white; }
        .btn-red { background: var(--price-tag); color: white; }
        #status { font-size: 11px; color: #d93025; font-weight: bold; margin-bottom: 5px; }
        .version-tag { position: absolute; bottom: 10px; right: 15px; font-size: 10px; color: #999; }
        .current-item-indicator { background: #e3f2fd; color: #0d47a1; padding: 5px; border-radius: 8px; font-size: 0.85rem; margin-bottom: 10px; font-weight: bold; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="status">● 藍牙待機中</div>
    
    <div class="step active" id="step-start">
        <button onclick="showHistory()" style="background: #607d8b; color: white; padding: 5px 12px; border-radius: 15px; font-size: 0.8rem; position: absolute; left: 15px; top: 15px; border: none; cursor: pointer;">📜 歷史紀錄</button>
        <h2 style="margin-top: 40px;">1. 請選擇類別</h2>
        <div class="grid">
            <div class="opt" onclick="setCategory('湯')"><div class="img-box"><img src="https://lh3.googleusercontent.com/pw/AP1GczPcUu3GOW3xZtOFVh7le33bCNVW4F1tyBvv5cJ2V7meVDPq0zf1ZGjITf5IZdLkRv1icKIZPDvvAphvYNS6T0ZNbId2RSHGREkuS7uzTiz8boh3Fo8=w2400?source=screenshot.guru"></div><span>湯品類</span></div>
            <div class="opt" onclick="setCategory('面')"><div class="img-box"><img src="https://lh3.googleusercontent.com/pw/AP1GczM1EgErnLz57PZ0ckyDapaXUx27rggwr5VvU49Yo1vpygNeiLiTCVK6nGMT7UewX9jWyWN7Q04y5g8QeGtKBFBtYod8YZd1L42sFsRuRCpY2EvidrI=w2400?source=screenshot.guru"></div><span>麵食類</span></div>
        </div>
        <div class="version-tag">ver 3.0.0</div>
    </div>

    <div class="step" id="step-history"><button class="back-btn-top" onclick="goNext('step-start')">←</button><h2>今天訂單歷史</h2><div id="history-container"></div></div>

    <div class="step" id="step-soup-select"><button class="back-btn-top" onclick="goNext('step-start')">←</button><h2>2. 請選擇湯品</h2><div class="grid" id="grid-soupItems"></div></div>

    <div class="step" id="step-food-select">
        <button class="back-btn-top" onclick="goNext('step-start')">←</button>
        <h2>2. 請選擇麵食 (可選多款)</h2>
        <div class="grid" id="grid-foodItems"></div>
        <div class="nav-btns"><button class="btn-blue" onclick="validateFoodItems()">下一步</button></div>
    </div>

    <div class="step" id="step-noodle-type">
        <button class="back-btn-top" onclick="goNext('step-food-select')">←</button>
        <h2>3. 請分配麵種數量</h2>
        <div id="noodle-summary" class="current-item-indicator"></div>
        <div class="grid" id="grid-noodleType"></div>
        <div class="nav-btns"><button class="btn-blue" onclick="checkNoodleNext()">下一步</button></div>
    </div>
    
    <div class="step" id="step-sauce-select">
        <button class="back-btn-top" onclick="handleSauceBack()">←</button>
        <h2 id="sauce-title">5. 選擇醬料與要求</h2>
        <div id="sauce-indicator" class="current-item-indicator"></div>
        <div class="sauce-layout">
            <div class="sauce-row-flex">
                <button class="sauce-btn" onclick="toggleSauce('辣椒', this)">辣椒</button>
                <button class="sauce-btn" onclick="toggleSauce('少辣', this)">少辣</button>
                <button class="sauce-btn" onclick="toggleSauce('多辣', this)">多辣</button>
            </div>
            <div class="sauce-row-flex">
                <button class="sauce-btn" onclick="toggleSauce('茄汁', this)">茄汁</button>
                <button class="sauce-btn" onclick="toggleSauce('醋', this)">醋</button>
                <button class="sauce-btn" onclick="toggleSauce('黑醬油', this)">黑醬油</button>
            </div>
            <div class="sauce-row-flex">
                <button class="sauce-btn" onclick="toggleSauce('白醬青', this)">白醬青</button>
                <button class="sauce-btn" id="soup-sauce-btn" onclick="handleSoupSauce(this)" style="background: #e3f2fd; border-color: #2196f3; color: #1565c0;">湯麵</button>
            </div>
            <div class="special-box">
                <div style="font-weight:bold; font-size:0.9rem; color:#f57c00; margin-bottom:8px; text-align:left;">特別要求：</div>
                <div class="special-grid">
                    <button class="sauce-btn" onclick="toggleSpecial('剪麵', this)">剪麵</button>
                    <button class="sauce-btn" onclick="toggleSpecial('豬油渣', this)">豬油渣</button>
                    <button class="sauce-btn" onclick="toggleSpecial('面要柔軟', this)">面要柔軟</button>
                    <button class="sauce-btn" onclick="toggleSpecial('面要彈性', this)">面要彈性</button>
                </div>
            </div>
        </div>
        <div class="nav-btns"><button class="btn-blue" onclick="checkSauceNext()">下一步</button></div>
    </div>

    <div class="step" id="step-no-extra">
        <button class="back-btn-top" onclick="goNext('step-sauce-select')">←</button>
        <h2 id="noextra-title">6. 不要什麼配料？</h2>
        <div id="noextra-indicator" class="current-item-indicator"></div>
        <div class="grid" id="grid-noExtra"></div>
        <div class="nav-btns"><button class="btn-blue" onclick="checkNoExtraNext()">下一步 (加料)</button></div>
    </div>
    
    <div class="step" id="step-additions">
        <button class="back-btn-top" onclick="goNext('step-no-extra')">←</button>
        <h2 id="add-title">7. 加料區</h2>
        <div id="add-indicator" class="current-item-indicator"></div>
        <div class="grid" id="grid-additions"></div>
        <div class="nav-btns">
            <button class="btn-blue" onclick="checkAdditionsNext()">✅ 確認此份</button>
        </div>
    </div>
    
    <div class="step" id="step-finish">
        <h2>🛒 購物車明細</h2>
        <div class="order-info-bar" id="preview-order-info" style="background: #fdf2f2; padding: 8px; border-radius: 10px; margin-bottom: 15px; text-align: left; font-size: 0.9rem; border: 1px dashed var(--price-tag);"></div>
        <div class="cart-box" id="current-cart"></div>
        <div class="total-price-bar">總金額: $<span id="total-sum">0</span></div>
        <div class="nav-btns">
            <button class="btn-red" onclick="cancelAndClear()">❌ 清空</button>
            <button class="btn-blue" onclick="resetForNewItem()">➕ 繼續點</button>
            <button class="btn-green" id="printBtn" onclick="finalizeAndPrint()">🖨️ 確認並列印</button>
        </div>
    </div>
</div>

<canvas id="printCanvas" width="384"></canvas>

    let cart = [];
    // 新結構：batchData 用於存儲麵食類點單的臨時資料
    let batchData = {
        category: '',
        selectedFoods: [], // [{name: '魚圓面', small: 1, big: 0}, ...]
        totalSmall: 0,
        totalBig: 0,
        noodleAllocation: {}, // { '面薄': {small: 1, big: 0}, ... }
        configPerBowl: [] // 存儲每一碗的最終詳細設定
    };
    
    // 目前正在設定的碗索引
    let currentBowlIdx = 0;
    // 單碗臨時設定
    let tempBowl = { name: '', size: '', noodle: '', sauces: [], specialReqs: [], noExtras: [], additions: {}, price: 0 };

    let editIndex = -1, savedDevice = null, savedCharacteristic = null, isFastMode = false;

    function getOrderData() { const today = new Date().toLocaleDateString(); let data = JSON.parse(localStorage.getItem('million_order_data')) || { date: today, num: START_NO, history: [] }; if (data.date !== today) { data.date = today; data.num = START_NO; data.history = []; } return data; }
    function saveOrderData(data) { localStorage.setItem('million_order_data', JSON.stringify(data)); }
    
    function init() {
        renderGrid(['魚圓湯','肉圓湯','魚餃湯','三寶湯'], 'grid-soupItems', (val) => { 
            // 湯品類邏輯維持簡單化
            batchData.selectedFoods = [{name: val, small: 1, big: 0}];
            batchData.totalSmall = 1; batchData.totalBig = 0;
            currentBowlIdx = 0;
            startConfiguringBowl();
        });
        
        renderFoodGrid();
        renderNoodleTypeGrid();
        renderGrid(config.noExtra, 'grid-noExtra', (val, el) => { toggleMulti(val, el, tempBowl.noExtras, 10); }, true);
        renderAdditionsGrid();
    }

    // 2.0 新增：麵食選擇網格與加減邏輯
    function renderFoodGrid() {
        const cont = document.getElementById('grid-foodItems');
        const foods = ['魚圓面', '香菇肉碎面', '招牌面', '餐餐面', '肉圓面', '蝦魚面', '西刀魚面', '香菇面', '魚餃面', '(純)肉碎面', '小魚香面'];
        cont.innerHTML = '';
        foods.forEach(name => {
            const foodObj = batchData.selectedFoods.find(f => f.name === name) || {name, small: 0, big: 0};
            const div = document.createElement('div'); div.className = 'opt';
            if(foodObj.small > 0 || foodObj.big > 0) div.classList.add('selected');
            div.innerHTML = `
                <div class="img-box"><div class="price-circle">$${config[name].p}</div><img src="${config[name].img}"></div>
                <span>${name}</span>
                <div class="size-ctrl-area">
                    <div class="size-row">
                        <span class="size-label">小</span>
                        <div class="qty-btn-group">
                            <button class="btn-s" onclick="changeFoodQty('${name}', 'small', -1, event)">-</button>
                            <span class="val-s" id="val-${name}-small">${foodObj.small}</span>
                            <button class="btn-s" onclick="changeFoodQty('${name}', 'small', 1, event)">+</button>
                        </div>
                    </div>
                    <div class="size-row">
                        <span class="size-label">大</span>
                        <div class="qty-btn-group">
                            <button class="btn-s" onclick="changeFoodQty('${name}', 'big', -1, event)">-</button>
                            <span class="val-s" id="val-${name}-big">${foodObj.big}</span>
                            <button class="btn-s" onclick="changeFoodQty('${name}', 'big', 1, event)">+</button>
                        </div>
                    </div>
                </div>
            `;
            cont.appendChild(div);
        });
    }

    function changeFoodQty(name, size, delta, event) {
        event.stopPropagation();
        let food = batchData.selectedFoods.find(f => f.name === name);
        if (!food) {
            food = {name, small: 0, big: 0};
            batchData.selectedFoods.push(food);
        }
        food[size] = Math.max(0, food[size] + delta);
        document.getElementById(`val-${name}-${size}`).innerText = food[size];
        
        const parent = document.getElementById(`val-${name}-${size}`).closest('.opt');
        if (food.small > 0 || food.big > 0) parent.classList.add('selected');
        else parent.classList.remove('selected');
    }

    function validateFoodItems() {
        batchData.totalSmall = 0; batchData.totalBig = 0;
        batchData.selectedFoods.forEach(f => { batchData.totalSmall += f.small; batchData.totalBig += f.big; });
        if (batchData.totalSmall + batchData.totalBig === 0) return alert("請至少選擇一份麵食");
        
        // 初始化麵種分配
        batchData.noodleAllocation = {};
        Object.keys(config.noodleType).forEach(nt => { batchData.noodleAllocation[nt] = {small: 0, big: 0}; });
        
        renderNoodleTypeGrid();
        goNext('step-noodle-type');
    }

    // 3.0：麵種分配網格
    function renderNoodleTypeGrid() {
        const cont = document.getElementById('grid-noodleType');
        cont.innerHTML = '';
        const summary = document.getElementById('noodle-summary');
        summary.innerText = `需要分配：小 (${batchData.totalSmall}) / 大 (${batchData.totalBig})`;

        Object.keys(config.noodleType).forEach(name => {
            const alloc = batchData.noodleAllocation[name];
            const div = document.createElement('div'); div.className = 'opt';
            div.innerHTML = `
                <div class="img-box"><img src="${config.noodleType[name]}"></div>
                <span>${name}</span>
                <div class="size-ctrl-area">
                    <div class="size-row">
                        <span class="size-label">小</span>
                        <div class="qty-btn-group">
                            <button class="btn-s" onclick="changeNoodleAlloc('${name}', 'small', -1, event)">-</button>
                            <span class="val-s" id="alloc-${name}-small">${alloc.small}</span>
                            <button class="btn-s" onclick="changeNoodleAlloc('${name}', 'small', 1, event)">+</button>
                        </div>
                    </div>
                    <div class="size-row">
                        <span class="size-label">大</span>
                        <div class="qty-btn-group">
                            <button class="btn-s" onclick="changeNoodleAlloc('${name}', 'big', -1, event)">-</button>
                            <span class="val-s" id="alloc-${name}-big">${alloc.big}</span>
                            <button class="btn-s" onclick="changeNoodleAlloc('${name}', 'big', 1, event)">+</button>
                        </div>
                    </div>
                </div>
            `;
            cont.appendChild(div);
        });
    }

    function changeNoodleAlloc(name, size, delta, event) {
        event.stopPropagation();
        const currentAlloc = batchData.noodleAllocation[name][size];
        const nextAlloc = currentAlloc + delta;
        if (nextAlloc < 0) return;

        // 檢查是否超過總數
        let currentTotal = 0;
        Object.values(batchData.noodleAllocation).forEach(a => currentTotal += a[size]);
        const max = size === 'small' ? batchData.totalSmall : batchData.totalBig;
        
        if (delta > 0 && currentTotal >= max) return alert(`${size === 'small' ? '小' : '大'}份麵種數量已達上限`);
        
        batchData.noodleAllocation[name][size] = nextAlloc;
        document.getElementById(`alloc-${name}-${size}`).innerText = nextAlloc;
    }

    function checkNoodleNext() {
        let sCount = 0, bCount = 0;
        Object.values(batchData.noodleAllocation).forEach(a => { sCount += a.small; bCount += a.big; });
        if (sCount !== batchData.totalSmall || bCount !== batchData.totalBig) {
            return alert(`麵種分配不正確！\n還需分配：小 (${batchData.totalSmall - sCount}) / 大 (${batchData.totalBig - bCount})`);
        }
        
        // 準備進入逐份設定
        prepareConfigList();
        currentBowlIdx = 0;
        startConfiguringBowl();
    }

    // 將所有選擇的麵食攤平成一份一份的清單
    function prepareConfigList() {
        batchData.configPerBowl = [];
        // 1. 先攤平麵食名與大小
        let flatFoods = [];
        batchData.selectedFoods.forEach(f => {
            for(let i=0; i<f.small; i++) flatFoods.push({name: f.name, size: '小的'});
            for(let i=0; i<f.big; i++) flatFoods.push({name: f.name, size: '大的'});
        });
        // 2. 先攤平麵種
        let flatNoodles = [];
        Object.entries(batchData.noodleAllocation).forEach(([nType, counts]) => {
            for(let i=0; i<counts.small; i++) flatNoodles.push({noodle: nType, size: '小的'});
            for(let i=0; i<counts.big; i++) flatNoodles.push({noodle: nType, size: '大的'});
        });

        // 3. 組合 (根據大小匹配)
        let sNoodles = flatNoodles.filter(n => n.size === '小的');
        let bNoodles = flatNoodles.filter(n => n.size === '大的');
        
        flatFoods.forEach(f => {
            let nInfo;
            if (f.size === '小的') nInfo = sNoodles.pop();
            else nInfo = bNoodles.pop();
            batchData.configPerBowl.push({
                name: f.name,
                size: f.size,
                noodle: nInfo.noodle,
                sauces: [],
                specialReqs: [],
                noExtras: [],
                additions: {},
                price: config[f.name].p + config[f.size].p
            });
        });
    }

    function startConfiguringBowl() {
        if (currentBowlIdx >= batchData.configPerBowl.length) {
            // 全部設定完成，進入結算頁
            updateCartDisplay();
            const data = getOrderData(); const now = new Date();
            document.getElementById('preview-order-info').innerHTML = `<b>單號: No.${data.num}</b><br>時間: ${now.toLocaleString()}`;
            goNext('step-finish');
            return;
        }

        const bowl = batchData.configPerBowl[currentBowlIdx];
        tempBowl = JSON.parse(JSON.stringify(bowl)); // 複製到暫存
        
        // 更新 UI 提示
        const infoStr = `正在設定第 (${currentBowlIdx + 1}/${batchData.configPerBowl.length}) 份：${tempBowl.name} [${tempBowl.size}] (${tempBowl.noodle || '湯'})`;
        document.getElementById('sauce-indicator').innerText = infoStr;
        document.getElementById('noextra-indicator').innerText = infoStr;
        document.getElementById('add-indicator').innerText = infoStr;

        // 如果是湯品類（無麵種），隱藏湯麵按鈕或直接跳過醬料
        if (batchData.category === '湯') {
            tempBowl.sauces = ['湯'];
            renderGrid(config.noExtra, 'grid-noExtra', (val, el) => { toggleMulti(val, el, tempBowl.noExtras, 10); }, true);
            renderAdditionsGrid();
            goNext('step-no-extra');
        } else {
            refreshSauceUI();
            renderGrid(config.noExtra, 'grid-noExtra', (val, el) => { toggleMulti(val, el, tempBowl.noExtras, 10); }, true);
            renderAdditionsGrid();
            goNext('step-sauce-select');
        }
    }

    // 醬料與加料邏輯 (改為操作 tempBowl)
    function toggleSauce(val, el) {
        if (tempBowl.sauces.includes('湯')) tempBowl.sauces = [];
        if (tempBowl.sauces.includes(val)) { tempBowl.sauces = tempBowl.sauces.filter(s => s !== val); } 
        else { if (tempBowl.sauces.length >= 3) return alert("最多選3種醬料"); tempBowl.sauces.push(val); }
        refreshSauceUI();
    }
    function toggleSpecial(val, el) {
        if (tempBowl.specialReqs.includes(val)) { tempBowl.specialReqs = tempBowl.specialReqs.filter(s => s !== val); } 
        else { tempBowl.specialReqs.push(val); }
        refreshSauceUI();
    }
    function handleSoupSauce(el) { tempBowl.sauces = ['湯']; refreshSauceUI(); checkSauceNext(); }
    function refreshSauceUI() {
        document.querySelectorAll('.sauce-btn').forEach(btn => {
            const txt = btn.innerText;
            if (['剪麵', '豬油渣', '面要柔軟', '面要彈性'].includes(txt)) {
                btn.classList.toggle('selected', tempBowl.specialReqs.includes(txt));
            } else {
                const logicV = (txt === '湯麵') ? '湯' : txt;
                btn.classList.toggle('selected', tempBowl.sauces.includes(logicV));
            }
        });
    }

    function checkSauceNext() { 
        if(tempBowl.sauces.length >= 1) goNext('step-no-extra'); 
        else alert("請最少選擇一個醬料"); 
    }
    
    function checkNoExtraNext() { goNext('step-additions'); }

    function checkAdditionsNext() {
        // 計算該碗加料價格
        let addPrice = 0;
        Object.entries(tempBowl.additions).forEach(([name, qty]) => {
            addPrice += ((config.additionsPrices[name] || 1) * qty);
        });
        tempBowl.price += addPrice;

        // 存回 batch 清單
        batchData.configPerBowl[currentBowlIdx] = JSON.parse(JSON.stringify(tempBowl));
        
        // 檢查是否還有下一碗
        currentBowlIdx++;
        if (currentBowlIdx < batchData.configPerBowl.length) {
            startConfiguringBowl();
        } else {
            // 全部完成，併入購物車
            batchData.configPerBowl.forEach(b => {
                cart.push({
                    category: batchData.category,
                    names: [b.name],
                    size: b.size,
                    noodle: b.noodle,
                    sauces: b.sauces,
                    specialReqs: b.specialReqs,
                    noExtras: b.noExtras,
                    additions: b.additions,
                    price: b.price,
                    qty: 1
                });
            });
            updateCartDisplay();
            const data = getOrderData(); const now = new Date();
            document.getElementById('preview-order-info').innerHTML = `<b>單號: No.${data.num}</b><br>時間: ${now.toLocaleString()}`;
            goNext('step-finish');
        }
    }

    function handleSauceBack() {
        if (currentBowlIdx > 0) {
            currentBowlIdx--;
            startConfiguringBowl();
        } else {
            goNext(batchData.category === '湯' ? 'step-soup-select' : 'step-noodle-type');
        }
    }

    function renderGrid(list, id, clickFn, multi = false) {
        const cont = document.getElementById(id);
        if(!cont) return;
        cont.innerHTML = '';
        list.forEach(name => {
            const div = document.createElement('div'); div.className = 'opt';
            let imgSrc, price = config[name]?.p || 0;
            if (id === 'grid-noExtra') imgSrc = config.noExtraImgs[name]; 
            else { imgSrc = config[name]?.img; }
            const priceTag = (price > 0) ? `<div class="price-circle">$${price}</div>` : '';
            div.innerHTML = `<div class="img-box">${priceTag}<img src="${imgSrc}"></div><span>${name}</span>`;
            div.onclick = () => { if(!multi) Array.from(cont.children).forEach(c=>c.classList.remove('selected')); div.classList.toggle('selected'); clickFn(name, div); };
            if (multi) { if (id === 'grid-noExtra' && tempBowl.noExtras.includes(name)) div.classList.add('selected'); }
            cont.appendChild(div);
        });
    }

    function renderAdditionsGrid() {
        const cont = document.getElementById('grid-additions');
        cont.innerHTML = '';
        config.additionsList.forEach(name => {
            const div = document.createElement('div'); div.className = 'opt';
            const qty = tempBowl.additions[name] || 0;
            const price = config.additionsPrices[name] || 1;
            div.innerHTML = `
                <div class="img-box"><div class="price-circle">$${price}</div><img src="${config.additionsImgs[name]}"></div>
                <span>${name}</span>
                <div class="add-qty-bar">
                    <button class="btn-add-minus" onclick="changeAddQty('${name}', -1, event)">-</button>
                    <span class="add-num" id="add-val-${name}">${qty}</span>
                    <button class="btn-add-minus" onclick="changeAddQty('${name}', 1, event)">+</button>
                </div>
            `;
            cont.appendChild(div);
        });
    }

    function changeAddQty(name, delta, event) {
        event.stopPropagation();
        let current = tempBowl.additions[name] || 0;
        let next = current + delta;
        if (next >= 0 && next <= 9) {
            if (next === 0) delete tempBowl.additions[name];
            else tempBowl.additions[name] = next;
            document.getElementById(`add-val-${name}`).innerText = next;
        }
    }

    function setCategory(v) { 
        batchData = { category: v, selectedFoods: [], totalSmall: 0, totalBig: 0, noodleAllocation: {}, configPerBowl: [] };
        if (v === '湯') {
            renderGrid(['魚圓湯','肉圓湯','魚餃湯','三寶湯'], 'grid-soupItems', (val) => { 
                batchData.selectedFoods = [{name: val, small: 1, big: 0}];
                batchData.totalSmall = 1; batchData.totalBig = 0;
                currentBowlIdx = 0;
                prepareConfigList();
                startConfiguringBowl();
            });
            goNext('step-soup-select');
        } else {
            renderFoodGrid();
            goNext('step-food-select'); 
        }
    }

    function toggleMulti(v, el, list, max) { if(list.includes(v)) { list.splice(list.indexOf(v), 1); el.classList.remove('selected'); } else { if(list.length >= max) return; list.push(v); el.classList.add('selected'); } }
    function goNext(id) { document.querySelectorAll('.step').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

    function updateCartDisplay() {
        let t = 0;
        const cartCont = document.getElementById('current-cart');
        cartCont.innerHTML = cart.map((item, i) => { 
            let lineTotal = item.price * item.qty; t += lineTotal; 
            const shortSize = item.size.replace('的', '');
            let sauceStr = item.sauces.join(',');
            if (item.specialReqs.length > 0) sauceStr += ` | <small>${item.specialReqs.join(',')}</small>`;
            let noExStr = item.noExtras.length > 0 ? `<br><small style="color:red;">[不要: ${item.noExtras.join(',')}]</small>` : ''; 
            let adds = Object.entries(item.additions).map(([name, q]) => `${name}(${getDisplayQty(name, q)})`).join(', ');
            let addStr = adds ? `<br><small style="color:var(--add);">+加料: ${adds}</small>` : '';
            return `<div class="cart-item"><div class="item-row"><div class="item-info"><b>${item.names.join('+')}</b> [${shortSize}]<br><small>${item.noodle||''} ${sauceStr}</small>${noExStr}${addStr}<div style="font-weight:bold; color:var(--price-tag); margin-top:5px;">$${lineTotal.toFixed(2)}</div></div><div class="item-actions"><div class="qty-controls"><button class="btn-qty" onclick="changeQty(${i}, -1)">-</button><span class="qty-num">${item.qty}</span><button class="btn-qty" onclick="changeQty(${i}, 1)">+</button></div></div></div></div>`; 
        }).join('');
        document.getElementById('total-sum').innerText = t.toFixed(2);
    }

    function changeQty(index, delta) { let item = cart[index]; if (item.qty + delta < 1) { if (confirm("取消訂單？")) cart.splice(index, 1); } else if (item.qty + delta <= 99) item.qty += delta; updateCartDisplay(); }

    function finalizeAndPrint() {
        if (cart.length === 0) return alert("購物車為空");
        const data = getOrderData();
        const now = new Date();
        const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
        const orderRecord = { num: data.num, time: timeStr, fullTime: `${now.toLocaleDateString()} ${timeStr}`, items: JSON.parse(JSON.stringify(cart)), total: document.getElementById('total-sum').innerText };
        data.history.push(orderRecord); data.num++; saveOrderData(data);
        drawPrintCanvas(orderRecord); handleImagePrint();
    }

    function drawPrintCanvas(record) {
        const canvas = document.getElementById('printCanvas'), ctx = canvas.getContext('2d');
        const dynamicHeight = 250 + (record.items.length * 200) + (record.items.reduce((acc,item)=>acc+(item.noExtras.length>0?45:0)+(Object.keys(item.additions).length>0?45:0)+(item.specialReqs.length>0?45:0),0)) + 120;
        canvas.height = dynamicHeight;
        ctx.fillStyle = "white"; ctx.fillRect(0, 0, 384, canvas.height);
        ctx.textBaseline = "top"; ctx.fillStyle = "black"; ctx.textAlign = "center"; 
        ctx.font = "bold 26px sans-serif"; ctx.fillText("Million FishBall Noodle 259", 192, 15);
        ctx.font = "18px sans-serif"; ctx.fillText(record.fullTime, 192, 50);
        ctx.font = "bold 44px sans-serif"; ctx.fillText(`No. ${record.num}`, 192, 75);
        ctx.font = "bold 20px sans-serif"; ctx.fillText("------------------------------------------", 192, 125);
        ctx.textAlign = "right";
        let y = 145;
        record.items.forEach((item, i) => {
            const shortSize = item.size.replace('的', '');
            ctx.font = "bold 42px sans-serif"; ctx.fillText(`${item.names.join('+')} (x${item.qty})`, 374, y); y += 52;
            ctx.font = "bold 32px sans-serif"; ctx.fillText(`[${shortSize}] ${item.noodle||''} ${item.sauces.join(',')}`, 374, y); y += 45;
            if(item.specialReqs && item.specialReqs.length > 0) { ctx.font = "bold 32px sans-serif"; ctx.fillText(`★${item.specialReqs.join(',')}`, 374, y); y += 45; }
            let adds = Object.entries(item.additions).map(([name, q]) => `${name}(${getDisplayQty(name, q)})`).join(',');
            if(adds) { ctx.font = "bold 30px sans-serif"; ctx.fillText(` +加料: ${adds}`, 374, y); y += 45; }
            if(item.noExtras.length > 0) { ctx.font = "bold 30px sans-serif"; ctx.fillText(` [不要: ${item.noExtras.join(',')}]`, 374, y); y += 45; }
            if (i < record.items.length - 1) { y += 20; ctx.textAlign = "center"; ctx.font = "bold 24px sans-serif"; ctx.fillText("******************************************", 192, y); y += 40; ctx.textAlign = "right"; } else { y += 25; }
        });
        ctx.textAlign = "center"; ctx.font = "bold 20px sans-serif"; ctx.fillText("------------------------------------------", 192, y); y += 30;
        ctx.font = "bold 42px sans-serif"; ctx.fillText("TOTAL: $" + record.total, 192, y);
    }

    function showHistory() {
        const data = getOrderData(); const cont = document.getElementById('history-container');
        cont.innerHTML = data.history.length === 0 ? '<p>無紀錄</p>' : '';
        data.history.slice().reverse().forEach(ord => {
            const div = document.createElement('div');
            div.innerHTML = `<div><b>No.${ord.num}</b> <small>(${ord.time})</small><br><span style="font-size:0.8rem">${ord.items[0].names[0]}等...</span></div><div>$${ord.total} <button class="btn-blue" style="padding:4px 8px; margin-left:10px; border-radius:5px; border:none; color:white;" onclick='reprintHistory(${ord.num})'>補印</button></div>`;
            div.style = "display:flex; justify-content:space-between; align-items:center; padding:10px; border-bottom:1px solid #eee; text-align:left;";
            cont.appendChild(div);
        });
        goNext('step-history');
    }
    function reprintHistory(num) { const data = getOrderData(); const ord = data.history.find(o => o.num === num); if (ord) { drawPrintCanvas(ord); handleImagePrint(); } }
    function cancelAndClear() { if(confirm("清空？")) { cart = []; updateCartDisplay(); resetForNewItem(); } }
    function resetForNewItem() { batchData = { category: '', selectedFoods: [], totalSmall: 0, totalBig: 0, noodleAllocation: {}, configPerBowl: [] }; currentBowlIdx = 0; document.querySelectorAll('.opt, .sauce-btn').forEach(o => o.classList.remove('selected')); goNext('step-start'); }

    async function getPrinter() {
        if (savedDevice && savedDevice.gatt.connected && savedCharacteristic) return savedCharacteristic;
        document.getElementById('status').innerText = "🔍 搜尋印表機...";
        savedDevice = await navigator.bluetooth.requestDevice({ acceptAllDevices: true, optionalServices: ['0000ffe0-0000-1000-8000-00805f9b34fb'] });
        const server = await savedDevice.gatt.connect();
        const services = await server.getPrimaryServices();
        for (const s of services) {
            const chars = await s.getCharacteristics();
            savedCharacteristic = chars.find(c => c.properties.writeWithoutResponse) || chars.find(c => c.properties.write);
            if (savedCharacteristic) { isFastMode = !!chars.find(c => c.properties.writeWithoutResponse); break; }
        }
        return savedCharacteristic;
    }

    async function handleImagePrint() {
        const btn = document.getElementById('printBtn'), canvas = document.getElementById('printCanvas'), ctx = canvas.getContext('2d');
        try {
            btn.disabled = true; const targetChar = await getPrinter();
            document.getElementById('status').innerText = "📤 列印中...";
            const pixels = ctx.getImageData(0, 0, 384, canvas.height).data;
            await targetChar.writeValue(new Uint8Array([0x1B, 0x40]));
            const widthBytes = 48;
            for (let y = 0; y < canvas.height; y++) {
                let row = new Uint8Array(8 + widthBytes);
                row.set([0x1D, 0x76, 0x30, 0, widthBytes, 0, 1, 0]);
                for (let x = 0; x < widthBytes; x++) {
                    let b = 0; for (let bit = 0; bit < 8; bit++) {
                        let idx = ((y * 384) + (x * 8 + bit)) * 4;
                        if (pixels[idx] * 0.3 + pixels[idx+1] * 0.59 + pixels[idx+2] * 0.11 < 135) b |= (1 << (7 - bit));
                    }
                    row[8 + x] = b;
                }
                if (isFastMode) await targetChar.writeValueWithoutResponse(row); else await targetChar.writeValue(row);
                if (y % 25 === 0) await new Promise(r => setTimeout(r, 60));
            }
            await targetChar.writeValue(new Uint8Array([0x1B, 0x64, 0x06, 0x1D, 0x56, 0x00]));
            document.getElementById('status').innerText = "✅ 完成";
            cart = []; updateCartDisplay(); btn.disabled = false; resetForNewItem();
        } catch (e) { alert(e.message); btn.disabled = false; }
    }
    init();
</script>
