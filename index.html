<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Million 麵店 - 兼容修正版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/encoding-japanese/2.0.0/encoding.min.js"></script>
    <style>
        :root { --primary: #1a73e8; }
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; text-align: center; }
        .setup-card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        .btn { width: 100%; padding: 18px; margin: 10px 0; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; color: white; }
        .btn-blue { background: var(--primary); }
        .btn-dark { background: #333; }
        .status { font-size: 12px; color: #888; margin-top: 10px; }
        #app-body { display: none; }
    </style>
</head>
<body>

<div id="selector" class="setup-card">
    <h2>🚚 選擇出單裝置</h2>
    <button class="btn btn-dark" onclick="startApp('PC')">💻 我是用電腦 (USB)</button>
    <button class="btn btn-blue" onclick="startApp('MOBILE')">📱 我是用手機 (藍牙)</button>
    <div class="status">提示：這台列印機僅支援簡體字庫，程式將自動轉換</div>
</div>

<div id="app-body" class="setup-card">
    <div id="info" style="color:green; font-weight:bold; margin-bottom:10px;"></div>
    <div style="text-align:left; border:1px solid #ddd; padding:10px; font-family:monospace; font-size:14px; background:#fafafa;">
      Million Noodles (測試內容)
--------------------------------
#1 招牌面 [大的]
   面薄 / 辣椒,黑醋
                   $6
--------------------------------
TOTAL:            $6
    </div>
    <button class="btn btn-blue" id="action-btn" onclick="executePrint()">立即列印</button>
    <button style="background:none; border:none; color:grey; text-decoration:underline;" onclick="location.reload()">重新選擇</button>
</div>

<script>
    let mode = '';
    let port = null; // PC
    let char = null; // Mobile

    // --- 繁簡轉換字典 (關鍵！) ---
    const t2s = {"麵":"面","魚":"鱼","餃":"饺","圓":"圆","湯":"汤","雜":"杂","招":"招","牌":"牌","碎":"碎","菇":"菇","西":"西","刀":"刀","蝦":"虾","小":"小","香":"香","大的":"大的","小的":"小的","辣椒":"辣椒","茄汁":"茄汁","黑":"黑","醬":"酱","油":"油","醋":"醋","薄":"薄","幼":"幼","粿":"粿","條":"条","熟":"熟","粉":"粉","冬":"冬"};

    function toSimplified(text) {
        return text.split('').map(c => t2s[c] || c).join('');
    }

    function startApp(selectedMode) {
        mode = selectedMode;
        document.getElementById('selector').style.display = 'none';
        document.getElementById('app-body').style.display = 'block';
        document.getElementById('info').innerText = `已選模式：${mode === 'PC' ? '電腦' : '手機'}`;
    }

    async function executePrint() {
        const rawText = "      Million Noodles\n--------------------------------\n#1 招牌面 [大的]\n   面薄 / 辣椒,黑醋\n                   $6\n--------------------------------\nTOTAL:            $6\n\n      Thank You!\n\n\n\n";
        const cleanText = toSimplified(rawText);

        if (mode === 'PC') {
            try {
                if (!port) port = await navigator.serial.requestPort();
                await port.open({ baudRate: 9600 });
                const writer = port.writable.getWriter();
                // 初始化指令 (簡體模式)
                await writer.write(new Uint8Array([0x1B, 0x40, 0x1C, 0x26]));
                // 轉碼 GBK (簡體)
                const charCodes = Array.from(cleanText).map(c => c.charCodeAt(0));
                const gbkData = Encoding.convert(charCodes, { to: 'GBK', from: 'UNICODE' });
                await writer.write(new Uint8Array(gbkData));
                writer.releaseLock();
                alert("電腦列印成功！");
            } catch (e) { alert("電腦錯誤: " + e.message); }
        } else {
            try {
                if (!char) {
                    const dev = await navigator.bluetooth.requestDevice({
                        acceptAllDevices: true,
                        optionalServices: ['0000ffe0-0000-1000-8000-00805f9b34fb']
                    });
                    const srv = await dev.gatt.connect();
                    const svcs = await srv.getPrimaryServices();
                    for (let s of svcs) {
                        let cs = await s.getCharacteristics();
                        char = cs.find(c => c.properties.write || c.properties.writeWithoutResponse);
                        if (char) break;
                    }
                }
                // 初始化
                await char.writeValue(new Uint8Array([0x1B, 0x40, 0x1C, 0x26]));
                // 轉碼 GBK
                const charCodes = Array.from(cleanText).map(c => c.charCodeAt(0));
                const gbkData = Encoding.convert(charCodes, { to: 'GBK', from: 'UNICODE' });
                const data = new Uint8Array(gbkData);
                // 分段發送
                for (let i = 0; i < data.length; i += 20) {
                    await char.writeValue(data.slice(i, i + 20));
                    await new Promise(r => setTimeout(r, 70));
                }
                alert("手機藍牙列印成功！");
            } catch (e) { alert("手機錯誤: " + e.message); }
        }
    }
</script>
</body>
</html>
