<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Million 麵店 - 終極調試版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/encoding-japanese/2.0.0/encoding.min.js"></script>
    <style>
        :root { --primary: #1a73e8; --success: #34a853; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f0f2f5; margin: 0; padding: 20px; text-align: center; }
        .setup-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        .mode-btn { width: 100%; padding: 20px; margin: 10px 0; border: none; border-radius: 12px; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-pc { background: #333; color: white; }
        .btn-mobile { background: var(--primary); color: white; }
        #main-app { display: none; margin-top: 20px; }
        .preview-box { background: white; padding: 15px; border: 1px solid #ccc; text-align: left; white-space: pre-wrap; font-family: monospace; margin: 20px 0; }
        .status { font-size: 12px; color: #666; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="setup-screen" class="setup-card">
    <h2>🚚 選擇出單模式</h2>
    <p>請選擇你目前的連接方式：</p>
    <button class="mode-btn btn-pc" onclick="selectMode('PC')">💻 我是用電腦 (USB)</button>
    <button class="mode-btn btn-mobile" onclick="selectMode('MOBILE')">📱 我是用手機 (藍牙)</button>
</div>

<div id="main-app" class="setup-card">
    <div id="print-status" class="status">等待連接裝置...</div>
    <h3>測試列印內容</h3>
    <div class="preview-box">
      Million Noodles
--------------------------------
#1 招牌面 [大的]
   面薄 / 辣椒,黑醋
                   $6
--------------------------------
TOTAL:            $6

      Thank You!
    </div>
    <button class="mode-btn btn-pc" id="action-btn" onclick="startPrint()">🚀 立即列印測試 (繁體)</button>
    <button style="margin-top:10px; border:none; background:none; color:blue; text-decoration:underline;" onclick="location.reload()">返回重選</button>
</div>

<script>
    let currentMode = '';
    let serialPort = null; // 電腦用
    let printCharacteristic = null; // 手機用

    function selectMode(mode) {
        currentMode = mode;
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        document.getElementById('print-status').innerText = `目前模式：${mode === 'PC' ? '電腦 USB' : '手機藍牙'}`;
        document.getElementById('action-btn').innerText = mode === 'PC' ? '🔌 連接 USB 並列印' : '🖨️ 手機藍牙列印';
    }

    // 通用 Big5 轉碼函數
    function getBig5Data(text) {
        const charArray = Array.from(text).map(c => c.charCodeAt(0));
        const big5Array = Encoding.convert(charArray, { to: 'BIG5', from: 'UNICODE' });
        return new Uint8Array(big5Array);
    }

    const testContent = "      Million Noodles\n--------------------------------\n#1 招牌面 [大的]\n   面薄 / 辣椒,黑醋\n                   $6\n--------------------------------\nTOTAL:            $6\n\n      Thank You!\n\n\n\n";

    async function startPrint() {
        if (currentMode === 'PC') {
            await printViaUSB();
        } else {
            await printViaBluetooth();
        }
    }

    // --- 電腦 USB 邏輯 ---
    async function printViaUSB() {
        try {
            if (!serialPort) {
                // 請求用戶選擇串列埠 (USB 列印機通常會模擬成 COM 或 Serial)
                serialPort = await navigator.serial.requestPort();
                await serialPort.open({ baudRate: 9600 }); // 大多數列印機是 9600 或 115200
            }

            const writer = serialPort.writable.getWriter();
            
            // 初始化指令
            const initCmd = new Uint8Array([0x1B, 0x40, 0x1C, 0x26]);
            await writer.write(initCmd);

            // 轉碼並發送
            const data = getBig5Data(testContent);
            await writer.write(data);
            
            writer.releaseLock();
            alert("電腦 USB 數據已發送！");
        } catch (err) {
            alert("電腦連接失敗: " + err.message + "\n(請確保使用 Chrome 瀏覽器)");
        }
    }

    // --- 手機藍牙邏輯 ---
    async function printViaBluetooth() {
        const statusEl = document.getElementById('print-status');
        try {
            if (!printCharacteristic) {
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['0000ffe0-0000-1000-8000-00805f9b34fb', '000018f0-0000-1000-8000-00805f9b34fb']
                });
                const server = await device.gatt.connect();
                const services = await server.getPrimaryServices();
                for (const service of services) {
                    const chars = await service.getCharacteristics();
                    printCharacteristic = chars.find(c => c.properties.write || c.properties.writeWithoutResponse);
                    if (printCharacteristic) break;
                }
            }

            // 初始化
            await printCharacteristic.writeValue(new Uint8Array([0x1B, 0x40, 0x1C, 0x26]));

            // 轉碼
            const data = getBig5Data(testContent);

            // 分段發送 (iPhone 穩定版)
            const CHUNK = 20;
            for (let i = 0; i < data.length; i += CHUNK) {
                await printCharacteristic.writeValue(data.slice(i, i + CHUNK));
                await new Promise(r => setTimeout(r, 70));
            }
            alert("手機藍牙數據已發送！");
        } catch (err) {
            alert("手機藍牙連線失敗: " + err.message);
        }
    }
</script>
</body>
</html>
