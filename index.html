<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打印機中文指令測試</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f0f2f5; }
        button { 
            padding: 20px 40px; font-size: 1.5rem; background: #1a73e8; 
            color: white; border: none; border-radius: 10px; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        button:active { background: #1557b0; }
        .info { margin-top: 20px; color: #666; font-size: 0.9rem; }
    </style>
</head>
<body>

    <h2>Million Noodles 測試工具</h2>
    <p>點擊下方按鈕，嘗試激活打印機內置中文字庫</p>
    
    <button onclick="testChinese()">測試：中文列印成功</button>

    <div class="info">
        此按鈕會嘗試發送：<br>
        1. 初始化指令 (ESC @)<br>
        2. 進入漢字模式 (FS &)<br>
        3. 設定字符集 (ESC t 0)<br>
        4. 文字內容
    </div>

<script>
    let deviceChar;

    async function testChinese() {
        if (!deviceChar) {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['0000ffe0-0000-1000-8000-00805f9b34fb']
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
                deviceChar = await service.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');
                alert("藍牙已連上！請再按一次按鈕進行測試。");
                return;
            } catch (e) {
                alert("連線失敗：" + e.message);
                return;
            }
        }

        try {
            // 構建測試指令包 (Uint8Array 確保數據不被瀏覽器二次編碼)
            const data = new Uint8Array([
                0x1B, 0x40,              // ESC @ : 初始化
                0x1C, 0x26,              // FS &  : 進入漢字模式 (核心)
                0x1B, 0x74, 0x00,        // ESC t 0 : 選擇代碼頁 0
                0x1B, 0x61, 0x01,        // ESC a 1 : 居中
                
                // 「中文列印成功」的 GBK 編碼 (手動寫入，不依賴庫)
                0xD6, 0xD0, 0xCE, 0xC4,  // 中文
                0xC1, 0xD0, 0xD3, 0xA1,  // 列印 (簡體編碼，多數打印機內置簡體庫)
                0xB3, 0x11, 0xB9, 0xA6,  // 成功
                
                0x0A, 0x0A, 0x0A, 0x0A   // 走紙
            ]);

            await deviceChar.writeValue(data);
            alert("指令已發送，請查看打印結果。");
        } catch (e) {
            alert("列印失敗：" + e.message);
            deviceChar = null;
        }
    }
</script>
</body>
</html>
