<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Million 麵店點餐系統</title>
    <style>
        :root { --primary: #1a73e8; --secondary: #f0f2f5; --success: #34a853; --price-tag: #d93025; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--secondary); margin: 0; padding: 10px; text-align: center; }
        .container { max-width: 500px; margin: auto; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding-bottom: 90px; min-height: 85vh; position: relative; }
        .step { display: none; animation: fadeIn 0.3s; position: relative; }
        .step.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .back-btn-top { position: absolute; right: 0; top: 0; width: 35px; height: 35px; border-radius: 50%; background: #eee; color: #555; border: none; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; }
        h2 { color: #333; font-size: 1.1rem; margin: 10px 0 20px 0; border-left: 5px solid var(--primary); padding-left: 10px; text-align: left; padding-right: 40px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .opt { background: #fff; border: 2px solid #eee; border-radius: 12px; cursor: pointer; overflow: hidden; position: relative; display: flex; flex-direction: column; }
        
        .img-box { width: 100%; height: 100px; display: flex; background: #fafafa; overflow: hidden; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; flex: 1; }
        .img-box.double img { width: 50%; border-right: 1px solid white; }
        .img-box.double img:last-child { border-right: none; }

        .price-label { position: absolute; bottom: 35px; right: 5px; background: var(--price-tag); color: white; padding: 2px 8px; border-radius: 5px; font-size: 12px; font-weight: bold; }
        .opt span { padding: 8px 5px; font-weight: bold; font-size: 0.9rem; }
        .opt.selected { border-color: var(--primary); background: #e8f0fe; }
        .opt.selected::after { content: '✅'; position: absolute; top: 5px; right: 5px; background: white; border-radius: 50%; padding: 2px; font-size: 12px; }
        .cart-box { margin-top: 20px; padding: 10px; border: 1px dashed var(--primary); border-radius: 10px; text-align: left; background: #fffbe6; }
        .cart-item { border-bottom: 1px solid #ddd; padding: 10px 0; display: flex; justify-content: space-between; align-items: center; }
        .total-price-bar { font-size: 1.6rem; color: var(--price-tag); font-weight: bold; margin: 20px 0; }
        .nav-btns { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px; display: flex; gap: 10px; max-width: 500px; margin: auto; box-shadow: 0 -5px 10px rgba(0,0,0,0.05); z-index: 1000; }
        button { flex: 1; padding: 15px; border-radius: 10px; border: none; font-size: 1rem; cursor: pointer; font-weight: bold; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-green { background: var(--success); color: white; }

        /* --- 重要：針對商米 58mm 打印機優化 --- */
        @media print {
            @page {
                size: 58mm auto; /* 指定紙張寬度為 58 毫米 */
                margin: 0;       /* 消除邊距以免超出紙張 */
            }
            body { 
                background: white !important; 
                width: 58mm !important; /* 限制內容寬度 */
                margin: 0 auto !important; 
                padding: 2mm !important; 
            }
            .container { 
                box-shadow: none !important; 
                width: 100% !important; 
                padding-bottom: 0 !important; 
                margin: 0 !important; 
                border: none !important; 
            }
            .nav-btns, .back-btn-top, h2:not(.cart-title), .img-box { display: none !important; } 
            .step { display: none !important; }
            .step#step-finish { display: block !important; }
            .cart-box { 
                border: none !important; 
                background: white !important; 
                font-size: 10pt !important; 
                padding: 0 !important;
            }
            .cart-item { 
                border-bottom: 1px dashed black !important; 
                color: black !important; 
                margin-bottom: 5px;
            }
            .total-price-bar { 
                color: black !important; 
                font-size: 12pt !important; 
                text-align: right; 
                margin-top: 10px;
            }
            /* 強制文字黑白渲染，防止商米轉成灰度圖片 */
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; color-adjust: exact !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="step active" id="step-start">
        <h2>1. 請選擇類別</h2>
        <div class="grid">
            <div class="opt" onclick="setCategory('湯')">
                <div class="img-box"><img src="https://lh3.googleusercontent.com/pw/AP1GczOoXizYOs7TlJVh_ikXpPT_8uSFOyH2mnDMFvu2CIFXpJVYqNssfvAbgkwksOqIi89J0NAktQdtJStc5KB6YPkxqk0ccWLkjKAGWKILKERYMt_PYsI=w2400?source=screenshot.guru"></div>
                <span>湯品類</span>
            </div>
            <div class="opt" onclick="setCategory('面')">
                <div class="img-box"><img src="https://lh3.googleusercontent.com/pw/AP1GczM1EgErnLz57PZ0ckyDapaXUx27rggwr5VvU49Yo1vpygNeiLiTCVK6nGMT7UewX9jWyWN7Q04y5g8QeGtKBFBtYod8YZd1L42sFsRuRCpY2EvidrI=w2400?source=screenshot.guru"></div>
            </div>
        </div>
    </div>
    <div class="step" id="step-soup-select">
        <button class="back-btn-top" onclick="goNext('step-start')">←</button>
        <h2>2. 選擇湯品 (最多2個)</h2>
        <div class="grid" id="grid-soupItems"></div>
        <div class="nav-btns"><button class="btn-blue" onclick="checkSoupNext()">下一步</button></div>
    </div>
    <div class="step" id="step-food-select">
        <button class="back-btn-top" onclick="goNext('step-start')">←</button>
        <h2>2. 選擇主食</h2>
        <div class="grid" id="grid-foodItems"></div>
    </div>
    <div class="step" id="step-size">
        <button class="back-btn-top" onclick="handleSizeBack()">←</button>
        <h2>3. 選擇大小</h2>
        <div class="grid" id="grid-size"></div>
    </div>
    <div class="step" id="step-noodle-type">
        <button class="back-btn-top" onclick="goNext('step-size')">←</button>
        <h2>4. 選擇麵類</h2>
        <div class="grid" id="grid-noodleType"></div>
    </div>
    <div class="step" id="step-sauce-select">
        <button class="back-btn-top" onclick="goNext('step-noodle-type')">←</button>
        <h2>5. 選擇醬料/湯 (1-3個)</h2>
        <div class="grid" id="grid-sauce"></div>
        <div class="nav-btns"><button class="btn-blue" onclick="addToCart()">✅ 加入購物車</button></div>
    </div>

    <div class="step" id="step-finish">
        <h2 class="cart-title">Million Fishball Noodle</h2>
        <div class="cart-box" id="current-cart"></div>
        <div class="total-price-bar">Total: $<span id="total-sum">0</span></div>
        <div class="nav-btns">
            <button class="btn-blue" onclick="resetForNewItem()">➕ 繼續點餐</button>
            <button class="btn-green" onclick="handlePrintAndFinish()">🖨️ 列印收據</button>
        </div>
    </div>
</div>

    let cart = [];
    let tempItem = { category: '', names: [], size: '', noodle: '', sauces: [], price: 0 };

    function init() {
        renderGrid(['魚圓湯','肉圓湯','魚餃湯','三寶湯'], 'grid-soupItems', (val, el) => toggleMulti(val, el, tempItem.names, 2), true);
        const foodOrder = ['魚圓面', '香菇肉碎面', '招牌面', '餐餐面', '肉圓面', '蝦魚面', '西刀魚面', '香菇面', '魚餃面', '(純)肉碎面', '小魚香面'];
        renderGrid(foodOrder, 'grid-foodItems', (val) => { tempItem.names = [val]; goNext('step-size'); });
        renderGrid(['小的', '大的'], 'grid-size', (val) => { 
            tempItem.size = val; 
            if(tempItem.category === '湯') addToCart(); 
            else goNext('step-noodle-type'); 
        });
        renderGrid(Object.keys(config.noodleType), 'grid-noodleType', (val) => { tempItem.noodle = val; goNext('step-sauce-select'); });
        renderGrid(Object.keys(config.sauce), 'grid-sauce', (val, el) => toggleMulti(val, el, tempItem.sauces, 3), true);
    }

    function renderGrid(list, containerId, clickFn, isMulti = false) {
        const cont = document.getElementById(containerId);
        if(!cont) return;
        cont.innerHTML = ''; 
        list.forEach(name => {
            const div = document.createElement('div');
            div.className = 'opt';
            let imgSrc = (containerId === 'grid-noodleType') ? config.noodleType[name] : (config.sauce[name] || config[name]?.img || '');
            let imgHtml = Array.isArray(imgSrc) ? `<div class="img-box double"><img src="${imgSrc[0]}"><img src="${imgSrc[1]}"></div>` : `<div class="img-box"><img src="${imgSrc || 'https://placehold.co/200x150?text='+encodeURIComponent(name)}"></div>`;
            const priceHtml = (config[name] && config[name].p > 0) ? `<div class="price-label">+$${config[name].p}</div>` : '';
            div.innerHTML = `${imgHtml}${priceHtml}<span>${name}</span>`;
            div.onclick = function() {
                if(!isMulti) { cont.querySelectorAll('.opt').forEach(o => o.classList.remove('selected')); div.classList.add('selected'); }
                clickFn(name, div);
            };
            cont.appendChild(div);
        });
    }

    function setCategory(val) { tempItem.category = val; goNext(val === '湯' ? 'step-soup-select' : 'step-food-select'); }
    function toggleMulti(val, el, list, max) {
        if(list.includes(val)) { list.splice(list.indexOf(val), 1); el.classList.remove('selected'); } 
        else { if(list.length >= max) return alert("最多選"+max+"個"); list.push(val); el.classList.add('selected'); }
    }
    function goNext(id) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        const target = document.getElementById(id);
        if(target) target.classList.add('active');
        window.scrollTo(0,0);
    }
    function checkSoupNext() { if(tempItem.names.length === 0) return alert("請至少選一個湯品"); goNext('step-size'); }
    function handleSizeBack() { goNext(tempItem.category === '湯' ? 'step-soup-select' : 'step-food-select'); }

    function addToCart() {
        if (tempItem.category === '面' && tempItem.sauces.length === 0) { alert("請至少選擇一個醬料或(湯)！"); return; }
        let price = 0;
        tempItem.names.forEach(n => price += (config[n]?.p || 0));
        price += (config[tempItem.size]?.p || 0);
        tempItem.price = price;
        cart.push(JSON.parse(JSON.stringify(tempItem)));
        updateCartDisplay();
        goNext('step-finish');
    }

    function updateCartDisplay() {
        let total = 0;
        document.getElementById('current-cart').innerHTML = cart.map((item, i) => {
            total += item.price;
            return `<div class="cart-item"><div><b>#${i+1} ${item.names.join('+')}</b><br><small>${item.size} / ${item.noodle || ''}<br>${item.sauces.join(',')}</small></div><div style="font-weight:bold;">$${item.price}</div></div>`;
        }).join('');
        document.getElementById('total-sum').innerText = total;
    }

    function resetForNewItem() {
        tempItem = { category: '', names: [], size: '', noodle: '', sauces: [], price: 0 };
        document.querySelectorAll('.opt').forEach(o => o.classList.remove('selected'));
        goNext('step-start');
    }

    // 針對商米機器的列印處理函數
    function handlePrintAndFinish() {
        window.print(); // 這會觸發商米系統的列印代理
        
        setTimeout(() => {
            cart = [];
            resetForNewItem();
            updateCartDisplay();
        }, 1000); // 延長到1秒，讓商米系統有時間反應
    }

    init();
</script>
</body>
</html>
