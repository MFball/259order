<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Million Golden Bowl - v3.0.1</title>
    <style>
        :root { --primary: #1a73e8; --secondary: #f0f2f5; --success: #34a853; --price-tag: #d93025; --warning: #f39c12; }
        body { font-family: sans-serif; background: var(--secondary); margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding-bottom: 140px; min-height: 92vh; position: relative; }
        .step { display: none; animation: fadeIn 0.3s; }
        .step.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        h2 { color: #333; font-size: 1.1rem; border-left: 5px solid var(--primary); padding-left: 10px; margin: 15px 0; text-align: left; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        /* 麵食卡片 */
        .food-card { background: #fff; border: 2px solid #eee; border-radius: 15px; overflow: hidden; display: flex; flex-direction: column; position: relative; }
        .food-card.active { border-color: var(--primary); background: #f8fbff; }
        .img-box { width: 100%; height: 90px; background: #fafafa; position: relative; display: flex; justify-content: center; align-items: center; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .price-circle { position: absolute; top: 5px; right: 5px; background: var(--price-tag); color: white; width: 40px; height: 30px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: bold; border: 2px solid white; }
        .food-name { padding: 5px; font-weight: bold; font-size: 0.85rem; text-align: center; min-height: 35px; display: flex; align-items: center; justify-content: center; }

        /* 大/小計數器 */
        .counter-area { padding: 8px 5px; background: #f1f3f4; border-top: 1px solid #ddd; }
        .counter-row { display: flex; align-items: center; justify-content: space-around; margin: 5px 0; }
        .counter-row span { font-size: 0.85rem; font-weight: bold; color: #444; width: 40px; }
        .btn-s { width: 32px; height: 32px; border-radius: 8px; border: 1px solid #bbb; background: white; font-weight: bold; cursor: pointer; font-size: 1.2rem; }
        .val-s { font-weight: bold; color: var(--primary); min-width: 20px; text-align: center; font-size: 1.1rem; }

        /* 選項按鈕 */
        .opt-btn { padding: 12px 5px; border: 2px solid #eee; border-radius: 10px; background: white; font-weight: bold; cursor: pointer; font-size: 0.9rem; text-align: center; }
        .opt-btn.selected { border-color: var(--primary); background: #e8f0fe; color: var(--primary); }
        .special-box { background: #fff8e1; padding: 10px; border-radius: 12px; border: 1px dashed #ffd54f; margin-top: 10px; }

        /* 導覽按鈕 */
        .nav-btns { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px; display: flex; flex-direction: column; gap: 8px; max-width: 500px; margin: auto; box-shadow: 0 -5px 10px rgba(0,0,0,0.05); z-index: 1000; }
        .btn-group { display: flex; gap: 8px; width: 100%; }
        button.main-btn { flex: 1; padding: 14px; border-radius: 12px; border: none; font-size: 1rem; cursor: pointer; font-weight: bold; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-green { background: var(--success); color: white; }
        .btn-red { background: var(--price-tag); color: white; }
        .btn-gray { background: #666; color: white; }
        
        .version-tag { font-size: 10px; color: #bbb; margin-top: 15px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="step active" id="step-1">
        <h2 style="margin-top:20px;">1. 選擇類別</h2>
        <div class="grid">
            <div class="food-card" onclick="startOrder('湯')" style="padding:15px; cursor:pointer;">
                <img src="https://lh3.googleusercontent.com/pw/AP1GczPcUu3GOW3xZtOFVh7le33bCNVW4F1tyBvv5cJ2V7meVDPq0zf1ZGjITf5IZdLkRv1icKIZPDvvAphvYNS6T0ZNbId2RSHGREkuS7uzTiz8boh3Fo8=w2400?source=screenshot.guru" style="width:100%; border-radius:10px;">
                <div class="food-name">湯品類 (Soup)</div>
            </div>
            <div class="food-card" onclick="startOrder('面')" style="padding:15px; cursor:pointer;">
                <img src="https://lh3.googleusercontent.com/pw/AP1GczM1EgErnLz57PZ0ckyDapaXUx27rggwr5VvU49Yo1vpygNeiLiTCVK6nGMT7UewX9jWyWN7Q04y5g8QeGtKBFBtYod8YZd1L42sFsRuRCpY2EvidrI=w2400?source=screenshot.guru" style="width:100%; border-radius:10px;">
                <div class="food-name">麵食類 (Noodle)</div>
            </div>
        </div>
        <div class="version-tag">百萬金碗 Million Golden Bowl | System Version 3.0.1</div>
    </div>

    <div class="step" id="step-2">
        <h2 id="food-list-title">2. 選擇麵食數量</h2>
        <div class="grid" id="grid-food-items"></div>
        <div class="nav-btns">
            <button class="main-btn btn-blue" onclick="processToConfig()">下一步 (設定口味)</button>
            <button class="main-btn btn-gray" onclick="goStep(1)">返回上一頁</button>
        </div>
    </div>

    <div class="step" id="step-3">
        <h2 id="config-title">3. 設定口味</h2>
        <div style="background:#e3f2fd; padding:10px; border-radius:10px; margin-bottom:10px; font-weight:bold; color:#1565c0;" id="config-bowl-info"></div>
        
        <h3>選擇麵種：</h3>
        <div class="grid" id="grid-noodle-opts"></div>

        <h3>選擇醬料：</h3>
        <div class="grid" id="grid-sauce-opts" style="grid-template-columns: 1fr 1fr 1fr;"></div>

        <h3>不要什麼？</h3>
        <div class="grid" id="grid-no-extras" style="grid-template-columns: 1fr 1fr 1fr;"></div>

        <div class="special-box">
            <h3>加料/特別要求：</h3>
            <div class="grid" id="grid-add-ons" style="grid-template-columns: 1fr 1fr;"></div>
        </div>

        <div class="nav-btns">
            <button class="main-btn btn-blue" onclick="saveBowlConfig()">確認這碗 (OK)</button>
            <button class="main-btn btn-gray" onclick="goStep(2)">返回上一頁</button>
        </div>
    </div>

    <div class="step" id="step-4">
        <h2>🛒 訂單清單</h2>
        <div id="final-cart-display" style="background:#f9f9f9; padding:10px; border-radius:10px; border:1px solid #ddd; text-align:left;"></div>
        <div style="font-size: 1.8rem; color: var(--price-tag); font-weight: bold; margin: 20px 0;">總計: $<span id="total-price-sum">0</span></div>
        <div class="nav-btns">
            <div class="btn-group">
                <button class="main-btn btn-blue" onclick="goStep(1)">＋ 繼續點餐</button>
                <button class="main-btn btn-green" onclick="printReceipt()">🖨️ 確認列印</button>
            </div>
            <button class="main-btn btn-gray" onclick="goStep(3)">返回上一頁</button>
        </div>
    </div>
</div>

<script>
    const config = {
        '湯品': ['魚圓湯','肉圓湯','魚餃湯','三寶湯'],
        '麵食': ['魚圓面', '香菇肉碎面', '招牌面', '餐餐面', '肉圓面', '蝦魚面', '西刀魚面', '香菇面', '魚餃面', '(純)肉碎面', '小魚香面'],
        'imgs': {
            '魚圓湯':'https://lh3.googleusercontent.com/pw/AP1GczOoXizYOs7TlJVh_ikXpPT_8uSFOyH2mnDMFvu2CIFXpJVYqNssfvAbgkwksOqIi89J0NAktQdtJStc5KB6YPkxqk0ccWLkjKAGWKILKERYMt_PYsI=w2400?source=screenshot.guru', '肉圓湯':'https://lh3.googleusercontent.com/pw/AP1GczO53IM8P6okuoqH4lpXGLStyLy4PSLp2LEAXBolANcUA0dm0WBHCGxJ965cGrMP9F72cF24Uln8JbdwG9pt910rs1pG-dnU-CrwKWKcOhZoPnNbR6Q=w2400?source=screenshot.guru',
            '魚餃湯':'https://lh3.googleusercontent.com/pw/AP1GczN3UWnlef_F80kDzpyJtDbUke-trWR_2HA4zVAnHG8PlM1N9FoBkIAThTpdOffxXiIKGYn9gNQV9Defs8T8CC7ChbKQGKCLctVtW-G84qTu6qGcuvM=w2400?source=screenshot.guru', '三寶湯':'https://lh3.googleusercontent.com/pw/AP1GczOGkSr6douVYw5ED49ONXDbTqp9tX92Syg3QnRHG43a8zZebTgtjWEUXgLieeqYOw-7CQdLF9Tm_1aVhak1HCxrCdPKf6lwtrrL9GopjkdCwX9FUtM=w2400?source=screenshot.guru',
            '魚圓面':'https://lh3.googleusercontent.com/pw/AP1GczM1EgErnLz57PZ0ckyDapaXUx27rggwr5VvU49Yo1vpygNeiLiTCVK6nGMT7UewX9jWyWN7Q04y5g8QeGtKBFBtYod8YZd1L42sFsRuRCpY2EvidrI=w2400?source=screenshot.guru', '香菇肉碎面':'https://lh3.googleusercontent.com/pw/AP1GczPRrBESQHr4MjJaDdiXYFda03b72aUrxqrO--coLUrariBXksy0KTPNNaXhzOmmrVhkbChOGKQFqiR8zRRcPZWSd7Hk-inOhSXStOXgC8d0a85lycU=w2400?source=screenshot.guru',
            '招牌面':'https://lh3.googleusercontent.com/pw/AP1GczOVfyFF0BVjs49utoC4oxktdqpCblSROVp-z7A0aH5pjECVNDmcaKulF2YA7DBUEDZxzEij53427j1LqfZYPzUSFGdUM2_Zt-aYxIYJY40qAfH5wq8=w2400?source=screenshot.guru', '餐餐面':'https://lh3.googleusercontent.com/pw/AP1GczPI477AgneL3f4pcuLKg25GQlwB9XCNdxRaABOxwTvciSuYeGzbEu1cez6OIb25ZSS6RMchPIuuTEFHKttxXRnvYboZ5PQh-0HJH1MtI49AWBL1GDA=w2400?source=screenshot.guru',
            '肉圓面':'https://lh3.googleusercontent.com/pw/AP1GczO2J-xP5sDqsYL-5nFYQgmYldq26dabn-ezwb-vCUGDZ-S5nq_i7dsnWNmsswG5ippV0aBSwxf3zx6lfCHrhVOehydel1JSOBnr0aXMXmInJ1_9gnM=w2400?source=screenshot.guru', '蝦魚面':'https://lh3.googleusercontent.com/pw/AP1GczPzLY41C33tAb9NV8EUJrRpiZGqc1WqVhSNhr9K5H41JKgfnEG4CqFIDluEUqs4wRf67VHhOcvgN_9z1J6UrQAQWtj-SvpBk8V7RoiRxNjsTE-NfVE=w2400?source=screenshot.guru',
            '西刀魚面':'https://lh3.googleusercontent.com/pw/AP1GczP8Id6j5IYXzYS9x0xyNmfZWXGzQHCdfQBNbC34EmSqOTaA8rw5DGfhdsijfjfb_EnoCdl4nbXlowqkys6NnbQok762CxfDYno4mODYOp4oEp4EqAM=w2400?source=screenshot.guru', '香菇面':'https://lh3.googleusercontent.com/pw/AP1GczOMJvr-1snMcDEsJsBV_QX2oISkKXtVZQGiajhBRNCUkTEpzev8LTJzjQ4jzeziLq4inDVPgROLRQ9NXxT3tnZGxJAgPNtPg3lgC-Cs582xH1jRiho=w2400?source=screenshot.guru',
            '魚餃面':'https://i.ibb.co/nNLMt8jp/Fish-Dumpling-noodle.png', '(純)肉碎面':'https://lh3.googleusercontent.com/pw/AP1GczM1EgErnLz57PZ0ckyDapaXUx27rggwr5VvU49Yo1vpygNeiLiTCVK6nGMT7UewX9jWyWN7Q04y5g8QeGtKBFBtYod8YZd1L42sFsRuRCpY2EvidrI=w2400?source=screenshot.guru',
            '小魚香面':'https://lh3.googleusercontent.com/pw/AP1GczMOea7U-V10ztFr3Yim6w3K_-waMrZWgn9f5VdLk6JeObgOJpJu47IZGZ_N2Ok0WW57U0oCvjQ8Cd1llJYnEiMKw5BSLetmhF5BBxFnnGQwFCqmUjE=w2400?source=screenshot.guru',
            '面薄':'https://lh3.googleusercontent.com/pw/AP1GczPTdYtkKQVVtu2xC4GqatBEs58tYr0xrU6-P08JGLPXNa9URyrd85OABGJvhRRywZqI_6ILtjozkyDCPJWyfo34-z3KP5EPG56bOb6S73_130W3J00=w2400?source=screenshot.guru', '幼面':'https://lh3.googleusercontent.com/pw/AP1GczNzHJopdj33Emt-5K2nGrlY8AQRwcGxsmIGUyy2dzSKyFYLHxqH-tz7bIRoqlVFfxfetpW7bKNjWvenQuHQ1oPEWLa8r0Zv98IXzUaIhJlRpdNaMJU=w2400?source=screenshot.guru',
            '粿條':'https://lh3.googleusercontent.com/pw/AP1GczPwzNH0_FdwO99aeaxK8kWR64JXsBGwj4s5HB13lSvp-sZwggbp8XT8yfDkbp7Cz_ZB-jynkrLK7FFpIQSTf_t4Umd8Eje8i_nWWxFshmGTKkrzCn4=w2400?source=screenshot.guru', '熟面':'https://lh3.googleusercontent.com/pw/AP1GczO5hHYBkxDeOygQ1hWxWYtPlMOGUWWImLcvrXSe9dYeWIPukbqHY5O9qq6IrM9Q88jSG6EE8HmeIM9jOg081VP1KcW7uXlnaMCsWb56wt3dRd9WJJw=w2400?source=screenshot.guru',
            '米粉':'https://lh3.googleusercontent.com/pw/AP1GczMCq_h1GaefE-Kpouj1xUx_GoEhsa6BHL7giIsCTbZqtOKJG_8AJIpYSsqpPEiR5Ao00oYTYixHE7KxdZjWSv2LTg-CQ_xWVBv8OfAB98J7Z1wPYG0=w2400?source=screenshot.guru', '米太目':'https://lh3.googleusercontent.com/pw/AP1GczNPdhdHay7KR_IB303jyQY9PkJv14r8_ctsIwsnIGVdX5m0e4mAQjGoW6kMCuWfZEzoGn0PfIS4YbYsam7ncI1eDn9rYAbQ53qUsbpt4BHxE2Gur3k=w600-h315-p-k',
            '冬粉':'https://lh3.googleusercontent.com/pw/AP1GczMjjBg1W6WSV-nXO1fI3_rZXHO1u53fhIyPuY8F5PfDsGsSNuMqbrcoNbcIYTISpCvg-YzHA3xOyUmD1SUOQQvXXoAsXW9wTiEt9IswwswNBTCsoCc=w2400?source=screenshot.guru', '粿條面':'https://i.ibb.co/4Z3pjddg/Kuay-Teow-Noodle.png',
            '粿條米粉':'https://i.ibb.co/Kc4dzrMJ/Kuay-Teow-Mee-Hoon.png', '米粉面':'https://i.ibb.co/GvHqTPM4/Mee-Hoon-Noodle.png'
        },
        'prices': { '魚圓湯':5, '肉圓湯':5, '魚餃湯':5, '三寶湯':6, '魚圓面':4, '香菇肉碎面':5, '招牌面':6, '餐餐面':6, '肉圓面':4, '蝦魚面':5, '西刀魚面':4, '香菇面':5, '魚餃面':4, '(純)肉碎面':4, '小魚香面':4, '大的':1, '小的':0 },
        'noodles': ['面薄', '幼面', '粿條', '熟面', '米粉', '米太目', '冬粉', '粿條面', '米粉面'],
        'sauces': ['辣椒', '少辣', '多辣', '茄汁', '醋', '黑醬油', '白醬青', '湯'],
        'noExtras': ['油', '蔥', '香菇', '肉碎', '黑醬油'],
        'addOns': ['魚圓', '肉圓', '魚餃', '香菇', '肉碎', '蝦', '剪麵', '豬油渣']
    };

    let cart = []; 
    let currentSelection = {}; 
    let bowlQueue = []; 
    let queueIdx = 0;
    let tempConfig = { noodle: '', sauce: '', no: [], add: {} };

    function startOrder(cat) {
        currentSelection = {};
        const list = (cat === '湯' ? config.湯品 : config.麵食);
        const grid = document.getElementById('grid-food-items');
        grid.innerHTML = '';
        list.forEach(name => {
            currentSelection[name] = { l: 0, s: 0 };
            const card = document.createElement('div');
            card.className = 'food-card';
            card.id = `card-${name}`;
            card.innerHTML = `
                <div class="img-box"><div class="price-circle">$${config.prices[name] || 4}</div><img src="${config.imgs[name] || ''}"></div>
                <div class="food-name">${name}</div>
                <div class="counter-area">
                    <div class="counter-row"><span>大碗</span><button class="btn-s" onclick="update('${name}','l',-1)">-</button><b class="val-s" id="l-${name}">0</b><button class="btn-s" onclick="update('${name}','l',1)">+</button></div>
                    <div class="counter-row"><span>小碗</span><button class="btn-s" onclick="update('${name}','s',-1)">-</button><b class="val-s" id="s-${name}">0</b><button class="btn-s" onclick="update('${name}','s',1)">+</button></div>
                </div>
            `;
            grid.appendChild(card);
        });
        goStep(2);
    }

    function update(name, field, delta) {
        let val = currentSelection[name][field] + delta;
        if (val < 0) return;
        currentSelection[name][field] = val;
        document.getElementById(`${field}-${name}`).innerText = val;
        const total = currentSelection[name].l + currentSelection[name].s;
        document.getElementById(`card-${name}`).classList.toggle('active', total > 0);
    }

    function processToConfig() {
        bowlQueue = [];
        for (let name in currentSelection) {
            let item = currentSelection[name];
            for(let i=0; i<item.l; i++) bowlQueue.push({ name, size: '大的' });
            for(let i=0; i<item.s; i++) bowlQueue.push({ name, size: '小的' });
        }
        if (bowlQueue.length === 0) return alert("請先點餐！");
        queueIdx = 0;
        renderBowlStep();
        goStep(3);
    }

    function renderBowlStep() {
        const bowl = bowlQueue[queueIdx];
        document.getElementById('config-title').innerText = `3. 設定口味 (${queueIdx + 1} / ${bowlQueue.length})`;
        document.getElementById('config-bowl-info').innerText = `目前設定：${bowl.name} [${bowl.size}]`;
        
        tempConfig = { noodle: '', sauce: '', no: [], add: {} };

        // 麵種
        const nGrid = document.getElementById('grid-noodle-opts');
        nGrid.innerHTML = '';
        config.noodles.forEach(n => {
            const btn = document.createElement('div');
            btn.className = 'opt-btn';
            btn.innerHTML = `<img src="${config.imgs[n]}" style="width:100%; height:35px; object-fit:cover; border-radius:4px;"><br>${n}`;
            btn.onclick = () => {
                tempConfig.noodle = n;
                Array.from(nGrid.children).forEach(c => c.classList.remove('selected'));
                btn.classList.add('selected');
            };
            nGrid.appendChild(btn);
        });

        // 醬料
        const sGrid = document.getElementById('grid-sauce-opts');
        sGrid.innerHTML = '';
        config.sauces.forEach(s => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = s;
            btn.onclick = () => {
                tempConfig.sauce = s;
                Array.from(sGrid.children).forEach(c => c.classList.remove('selected'));
                btn.classList.add('selected');
            };
            sGrid.appendChild(btn);
        });

        // 不要
        const noGrid = document.getElementById('grid-no-extras');
        noGrid.innerHTML = '';
        config.noExtras.forEach(x => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = `不要${x}`;
            btn.onclick = () => {
                if (tempConfig.no.includes(x)) tempConfig.no = tempConfig.no.filter(i => i !== x);
                else tempConfig.no.push(x);
                btn.classList.toggle('selected');
            };
            noGrid.appendChild(btn);
        });

        // 加料
        const addGrid = document.getElementById('grid-add-ons');
        addGrid.innerHTML = '';
        config.addOns.forEach(a => {
            const div = document.createElement('div');
            div.className = 'counter-row';
            div.style.background = '#fff'; div.style.padding = '5px'; div.style.borderRadius = '8px';
            div.innerHTML = `
                <span style="width:50px">${a}</span>
                <button class="btn-s" onclick="updateAdd('${a}', -1, this)">-</button>
                <b class="val-s" id="add-${a}">0</b>
                <button class="btn-s" onclick="updateAdd('${a}', 1, this)">+</button>
            `;
            addGrid.appendChild(div);
        });
    }

    function updateAdd(name, delta, btn) {
        let cur = tempConfig.add[name] || 0;
        let next = cur + delta;
        if (next < 0) return;
        tempConfig.add[name] = next;
        btn.parentElement.querySelector('.val-s').innerText = next;
    }

    function saveBowlConfig() {
        if (!tempConfig.noodle || !tempConfig.sauce) return alert("請選好麵種和醬料");
        const bowl = bowlQueue[queueIdx];
        let price = config.prices[bowl.name] + (bowl.size === '大的' ? 1 : 0);
        cart.push({ ...bowl, ...tempConfig, totalPrice: price });
        queueIdx++;
        if (queueIdx < bowlQueue.length) renderBowlStep();
        else showFinalCart();
    }

    function showFinalCart() {
        const cont = document.getElementById('final-cart-display');
        cont.innerHTML = '';
        let total = 0;
        cart.forEach((item, i) => {
            total += item.totalPrice;
            let extras = item.no.length ? ` (不:${item.no.join(',')})` : '';
            let adds = Object.entries(item.add).filter(e => e[1] > 0).map(e => `${e[0]}x${e[1]}`).join(',');
            cont.innerHTML += `
                <div style="border-bottom:1px solid #eee; padding:10px 0;">
                    <b>${i+1}. ${item.name} (${item.size}) - $${item.totalPrice}</b><br>
                    <small>${item.noodle} / ${item.sauce}${extras} ${adds ? '/ 加:'+adds : ''}</small>
                </div>
            `;
        });
        document.getElementById('total-price-sum').innerText = total;
        goStep(4);
    }

    function goStep(n) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById(`step-${n}`).classList.add('active');
        window.scrollTo(0,0);
    }

    function printReceipt() {
        alert("打印中... 祝 Million Golden Bowl 生意興隆！");
        cart = [];
        goStep(1);
    }
</script>
</body>
