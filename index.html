<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Million 麵店 - v3.0.5 佈局修正版</title>
    <style>
        :root { --primary: #1a73e8; --secondary: #f0f2f5; --success: #34a853; --price-tag: #d93025; }
        body { font-family: sans-serif; background: var(--secondary); margin: 0; padding: 10px; text-align: center; }
        .container { max-width: 500px; margin: auto; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding-bottom: 120px; min-height: 90vh; position: relative; }
        .step { display: none; } .step.active { display: block; }
        .back-btn-top { position: absolute; right: 0; top: 0; width: 35px; height: 35px; border-radius: 50%; background: #eee; border: none; font-size: 20px; z-index: 10; }
        h2 { color: #333; font-size: 1.1rem; margin: 10px 0; border-left: 5px solid var(--primary); padding-left: 10px; text-align: left; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        /* 選項卡片 */
        .opt { background: #fff; border: 2px solid #eee; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; min-height: 150px; }
        .img-box { width: 100%; height: 90px; background: #fafafa; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .opt span { padding: 5px; font-weight: bold; font-size: 0.85rem; line-height: 1.2; flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        .opt.selected { border-color: var(--primary); background: #f0f7ff; }

        /* 數量控制器：左右並排 (修正重點) */
        .counter-container { display: flex; border-top: 1px solid #eee; background: #f9f9f9; }
        .qty-side { flex: 1; padding: 5px 0; display: flex; flex-direction: column; align-items: center; gap: 3px; border-right: 1px solid #eee; }
        .qty-side:last-child { border-right: none; }
        .qty-label { font-size: 0.7rem; color: #666; font-weight: bold; }
        .qty-controls { display: flex; align-items: center; gap: 5px; }
        .btn-mini { width: 24px; height: 24px; border-radius: 5px; border: 1px solid #ccc; background: white; font-weight: bold; cursor: pointer; }
        .num-val { font-weight: bold; font-size: 0.9rem; color: var(--primary); min-width: 15px; }

        /* 醬料與配料按鈕 */
        .btn-flavor { border: 1px solid #ddd; padding: 10px 5px; border-radius: 8px; font-size: 0.85rem; font-weight: bold; cursor: pointer; background: white; display: flex; align-items: center; justify-content: center; min-height: 50px; }
        .btn-flavor.selected { background: var(--primary); color: white; border-color: var(--primary); }

        /* 底部按鈕 */
        .nav-btns { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px; display: flex; gap: 8px; max-width: 500px; margin: auto; box-shadow: 0 -5px 10px rgba(0,0,0,0.05); z-index: 1000; }
        button.main-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; font-size: 1rem; cursor: pointer; font-weight: bold; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-green { background: var(--success); color: white; }
        #status { font-size: 11px; color: #d93025; font-weight: bold; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div id="status">● 藍牙待機中</div>
    
    <div class="step active" id="step-start">
        <h2 style="margin-top: 20px;">1. 請選擇類別</h2>
        <div class="grid">
            <div class="opt" onclick="setCategory('湯')">
                <div class="img-box"><img src="https://i.ibb.co/nNLMt8jp/Fish-Dumpling-noodle.png"></div>
                <span>湯品 (Soup)</span>
            </div>
            <div class="opt" onclick="setCategory('面')">
                <div class="img-box"><img src="https://i.ibb.co/60pL5kRj/Fishball-Noodle.png"></div>
                <span>麵食 (Noodle)</span>
            </div>
        </div>
    </div>

    <div class="step" id="step-item-select">
        <button class="back-btn-top" onclick="goNext('step-start')">←</button>
        <h2 id="select-title">2. 請選擇品項與數量</h2>
        <div class="grid" id="grid-items"></div>
        <div class="nav-btns">
            <button class="main-btn btn-blue" onclick="startConfigQueue()">下一步 (設定口味)</button>
        </div>
    </div>

    <div class="step" id="step-noodle-type">
        <button class="back-btn-top" onclick="goNext('step-item-select')">←</button>
        <h2 class="config-header">3. 請選擇麵種</h2>
        <div class="grid" id="grid-noodleType"></div>
    </div>

    <div class="step" id="step-sauce-select">
        <button class="back-btn-top" onclick="goNext('step-noodle-type')">←</button>
        <h2 class="config-header">4. 請選擇醬料</h2>
        <div id="sauce-ui-container" style="display: flex; flex-direction: column; gap: 15px;">
            </div>
        <div class="nav-btns"><button class="main-btn btn-blue" onclick="checkSauceNext()">下一步</button></div>
    </div>

    <div class="step" id="step-no-extra">
        <h2 class="config-header">5. 不要什麼？</h2>
        <div class="grid" id="grid-noExtra"></div>
        <div class="nav-btns"><button class="main-btn btn-blue" onclick="goNext('step-add-extra')">下一步</button></div>
    </div>
    <div class="step" id="step-add-extra">
        <h2 class="config-header">6. 增加什麼？($1)</h2>
        <div class="grid" id="grid-addExtra"></div>
        <div class="nav-btns"><button class="main-btn btn-blue" onclick="confirmOneBowl()">確認這碗</button></div>
    </div>

    <div class="step" id="step-finish">
        <h2>🛒 購物車明細</h2>
        <div id="current-cart" style="text-align:left; border:1px solid #eee; padding:10px; border-radius:10px;"></div>
        <div class="nav-btns">
            <button class="main-btn btn-green" onclick="finalizeAndPrint()">🖨️ 列印收據</button>
        </div>
    </div>
</div>

<script>
    const config = {
        '湯品': ['魚圓湯','肉圓湯','魚餃湯','三寶湯'],
        '麵食': ['魚圓面', '香菇肉碎面', '招牌面', '餐餐面', '肉圓面', '蝦魚面', '西刀魚面', '香菇面', '魚餃面', '(純)肉碎面', '小魚香面'],
        'imgs': {
            '魚圓湯':'https://i.ibb.co/nNLMt8jp/Fish-Dumpling-noodle.png', '肉圓湯':'https://i.ibb.co/nNLMt8jp/Fish-Dumpling-noodle.png',
            '魚圓面':'https://i.ibb.co/60pL5kRj/Fishball-Noodle.png', '香菇肉碎面':'https://i.ibb.co/60pL5kRj/Fishball-Noodle.png',
            '招牌面':'https://i.ibb.co/60pL5kRj/Fishball-Noodle.png', '餐餐面':'https://i.ibb.co/60pL5kRj/Fishball-Noodle.png',
            '面薄':'https://i.ibb.co/60pL5kRj/Fishball-Noodle.png', '幼面':'https://i.ibb.co/60pL5kRj/Fishball-Noodle.png'
        },
        'prices': { '魚圓湯': 5, '肉圓湯': 5, '魚餃湯': 5, '三寶湯': 6, '魚圓面': 4, '香菇肉碎面': 5, '招牌面': 6, '餐餐面': 6, '大的': 1, '小的': 0 },
        'noodleType': ['面薄', '幼面', '粿條', '熟面', '米粉', '米太目', '冬粉', '粿條面', '米粉面'],
        'sauceGroups': [
            { label: '辣椒', options: ['少辣', '正常辣', '多辣'] },
            { label: '茄汁', options: ['少茄', '正常茄', '多茄'] },
            { label: '醋', options: ['少醋', '正常醋', '多醋'] },
            { label: '其他', options: ['黑醬油', '白醬青', '三味 (辣,茄,醋)', '湯'] }
        ],
        'noExtra': ['油', '蔥', '香菇', '肉碎', '肉圓換魚圓'],
        'addExtra': ['魚圓', '肉圓', '魚餃', '香菇', '肉碎', '蝦']
    };

    let cart = [], currentCat = '', itemSelections = {}, bowlQueue = [], qIdx = 0, tempBowl = {};

    function setCategory(cat) {
        currentCat = cat;
        const list = config[cat === '湯' ? '湯品' : '麵食'];
        const grid = document.getElementById('grid-items');
        grid.innerHTML = '';
        list.forEach(name => {
            itemSelections[name] = { l: 0, s: 0 };
            const div = document.createElement('div');
            div.className = 'opt';
            div.id = `opt-${name}`;
            div.innerHTML = `
                <div class="img-box"><img src="${config.imgs[name] || 'https://i.ibb.co/60pL5kRj/Fishball-Noodle.png'}"></div>
                <span>${name}</span>
                <div class="counter-container">
                    <div class="qty-side">
                        <span class="qty-label">大</span>
                        <div class="qty-controls">
                            <button class="btn-mini" onclick="updateQty('${name}','l',-1)">-</button>
                            <span class="num-val" id="qty-l-${name}">0</span>
                            <button class="btn-mini" onclick="updateQty('${name}','l',1)">+</button>
                        </div>
                    </div>
                    <div class="qty-side">
                        <span class="qty-label">小</span>
                        <div class="qty-controls">
                            <button class="btn-mini" onclick="updateQty('${name}','s',-1)">-</button>
                            <span class="num-val" id="qty-s-${name}">0</span>
                            <button class="btn-mini" onclick="updateQty('${name}','s',1)">+</button>
                        </div>
                    </div>
                </div>`;
            grid.appendChild(div);
        });
        goNext('step-item-select');
    }

    function updateQty(name, sz, delta) {
        let v = itemSelections[name][sz] + delta;
        if (v < 0) return;
        itemSelections[name][sz] = v;
        document.getElementById(`qty-${sz}-${name}`).innerText = v;
        document.getElementById(`opt-${name}`).classList.toggle('selected', (itemSelections[name].l + itemSelections[name].s) > 0);
    }

    // 醬料生成邏輯
    function renderSauceUI() {
        const cont = document.getElementById('sauce-ui-container');
        cont.innerHTML = '';
        config.sauceGroups.forEach(group => {
            const row = document.createElement('div');
            row.className = 'grid';
            group.options.forEach(opt => {
                const btn = document.createElement('div');
                btn.className = 'btn-flavor';
                btn.innerText = opt;
                btn.onclick = () => {
                    if (opt === '湯') { tempBowl.sauces = ['湯']; }
                    else if (opt === '三味 (辣,茄,醋)') { tempBowl.sauces = ['辣','茄','醋']; }
                    else {
                        tempBowl.sauces = tempBowl.sauces.filter(s => !group.options.includes(s) && s!=='湯');
                        tempBowl.sauces.push(opt);
                    }
                    updateSauceSelectionUI();
                };
                row.appendChild(btn);
            });
            cont.appendChild(row);
        });
    }

    function updateSauceSelectionUI() {
        document.querySelectorAll('#sauce-ui-container .btn-flavor').forEach(btn => {
            btn.classList.toggle('selected', tempBowl.sauces.includes(btn.innerText) || (btn.innerText.includes('三味') && tempBowl.sauces.includes('辣')));
        });
    }

    function startConfigQueue() {
        bowlQueue = [];
        for (let name in itemSelections) {
            for (let i = 0; i < itemSelections[name].l; i++) bowlQueue.push({ name, size: '大的' });
            for (let i = 0; i < itemSelections[name].s; i++) bowlQueue.push({ name, size: '小的' });
        }
        if (bowlQueue.length === 0) return alert("請先選擇數量！");
        qIdx = 0;
        prepareBowlConfig();
    }

    function prepareBowlConfig() {
        const bowl = bowlQueue[qIdx];
        tempBowl = { ...bowl, noodle: '', sauces: [], noExtras: [], addExtras: {}, price: 0 };
        document.querySelectorAll('.config-header').forEach(h => h.innerText = `${h.innerText.split(' ')[0]} (${qIdx + 1}/${bowlQueue.length}) - ${bowl.name}[${bowl.size}]`);
        renderSauceUI();
        goNext(currentCat === '湯' ? 'step-no-extra' : 'step-noodle-type');
    }

    function goNext(id) { document.querySelectorAll('.step').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); window.scrollTo(0,0); }
    function checkSauceNext() { if(tempBowl.sauces.length > 0) goNext('step-no-extra'); else alert("請選擇醬料"); }
    
    // (其餘初始化與列印邏輯與 3.0.4 相同)
    function init() {
        const nGrid = document.getElementById('grid-noodleType');
        config.noodleType.forEach(n => {
            const d = document.createElement('div'); d.className='opt'; d.style.minHeight='120px';
            d.innerHTML = `<div class="img-box"><img src="${config.imgs[n] || ''}"></div><span>${n}</span>`;
            d.onclick = () => { tempBowl.noodle = n; goNext('step-sauce-select'); };
            nGrid.appendChild(d);
        });
    }
    
    function confirmOneBowl() {
        cart.push(JSON.parse(JSON.stringify(tempBowl)));
        qIdx++;
        if (qIdx < bowlQueue.length) prepareBowlConfig();
        else { goNext('step-finish'); updateCartDisplay(); }
    }

    function updateCartDisplay() {
        document.getElementById('current-cart').innerHTML = cart.map((it, i) => `<div>${i+1}. ${it.name} (${it.size}) - ${it.noodle} [${it.sauces.join('/')}]</div>`).join('');
    }

    init();
</script>
</body>
</html>
