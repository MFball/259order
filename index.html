<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Million 麵店 - v3.0.6 全功能還原</title>
    <style>
        :root { --primary: #1a73e8; --secondary: #f0f2f5; --success: #34a853; --price-tag: #d93025; }
        body { font-family: sans-serif; background: var(--secondary); margin: 0; padding: 10px; text-align: center; }
        .container { max-width: 500px; margin: auto; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding-bottom: 120px; min-height: 90vh; position: relative; }
        .step { display: none; } .step.active { display: block; }
        .back-btn-top { position: absolute; right: 0; top: 0; width: 35px; height: 35px; border-radius: 50%; background: #eee; border: none; font-size: 20px; z-index: 10; cursor: pointer; }
        h2 { color: #333; font-size: 1.1rem; margin: 10px 0; border-left: 5px solid var(--primary); padding-left: 10px; text-align: left; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        
        /* 選項卡片 */
        .opt { background: #fff; border: 2px solid #eee; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; min-height: 150px; cursor: pointer; }
        .img-box { width: 100%; height: 95px; background: #fafafa; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .opt span { padding: 5px; font-weight: bold; font-size: 0.85rem; line-height: 1.2; flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        .opt.selected { border-color: var(--primary); background: #f0f7ff; }

        /* 大小按鈕左右佈局 */
        .counter-container { display: flex; border-top: 1px solid #eee; background: #f9f9f9; }
        .qty-side { flex: 1; padding: 6px 0; display: flex; flex-direction: column; align-items: center; gap: 3px; border-right: 1px solid #eee; }
        .qty-side:last-child { border-right: none; }
        .qty-label { font-size: 0.75rem; color: #666; font-weight: bold; }
        .qty-controls { display: flex; align-items: center; gap: 6px; }
        .btn-mini { width: 26px; height: 26px; border-radius: 6px; border: 1px solid #ccc; background: white; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .num-val { font-weight: bold; font-size: 1rem; color: var(--primary); min-width: 15px; }

        /* 底部導航 */
        .nav-btns { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px; display: flex; gap: 8px; max-width: 500px; margin: auto; box-shadow: 0 -5px 10px rgba(0,0,0,0.05); z-index: 1000; }
        button.main-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; font-size: 1rem; cursor: pointer; font-weight: bold; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-green { background: var(--success); color: white; }
        .btn-red { background: var(--price-tag); color: white; }
        
        /* 歷史與狀態 */
        #status { font-size: 11px; color: #d93025; font-weight: bold; margin-bottom: 5px; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="status">● 藍牙待機中</div>
    
    <div class="step active" id="step-start">
        <h2 style="margin-top: 20px;">1. 請選擇類別</h2>
        <div class="grid">
            <div class="opt" onclick="setCategory('湯')">
                <div class="img-box"><img src="https://i.ibb.co/nNLMt8jp/Fish-Dumpling-noodle.png"></div>
                <span>湯品 (Soup)</span>
            </div>
            <div class="opt" onclick="setCategory('面')">
                <div class="img-box"><img src="https://i.ibb.co/60pL5kRj/Fishball-Noodle.png"></div>
                <span>麵食 (Noodle)</span>
            </div>
        </div>
    </div>

    <div class="step" id="step-item-select">
        <button class="back-btn-top" onclick="goNext('step-start')">←</button>
        <h2 id="select-title">2. 請選擇品項與數量</h2>
        <div class="grid" id="grid-items"></div>
        <div class="nav-btns">
            <button class="main-btn btn-blue" onclick="startConfigQueue()">下一步 (設定口味)</button>
        </div>
    </div>

    <div class="step" id="step-noodle-type">
        <button class="back-btn-top" onclick="goNext('step-item-select')">←</button>
        <h2 class="config-header">3. 請選擇麵種</h2>
        <div class="grid" id="grid-noodleType"></div>
    </div>

    <div class="step" id="step-sauce-select">
        <button class="back-btn-top" onclick="goNext('step-noodle-type')">←</button>
        <h2 class="config-header">4. 請選擇醬料</h2>
        <div class="grid" id="grid-sauce"></div>
        <div class="nav-btns"><button class="main-btn btn-blue" onclick="checkSauceNext()">下一步</button></div>
    </div>

    <div class="step" id="step-no-extra">
        <button class="back-btn-top" onclick="goNext('step-sauce-select')">←</button>
        <h2 class="config-header">5. 不要什麼？</h2>
        <div class="grid" id="grid-noExtra"></div>
        <div class="nav-btns"><button class="main-btn btn-blue" onclick="goNext('step-add-extra')">下一步</button></div>
    </div>

    <div class="step" id="step-add-extra">
        <button class="back-btn-top" onclick="goNext('step-no-extra')">←</button>
        <h2 class="config-header">6. 增加什麼？($1)</h2>
        <div class="grid" id="grid-addExtra"></div>
        <div class="nav-btns"><button class="main-btn btn-blue" onclick="confirmOneBowl()">確認這碗</button></div>
    </div>

    <div class="step" id="step-finish">
        <h2>🛒 購物車明細</h2>
        <div id="current-cart" style="text-align:left; border:1px solid #eee; padding:10px; border-radius:10px; min-height:100px;"></div>
        <div style="font-size: 1.5rem; color: var(--price-tag); font-weight: bold; margin: 15px 0;">總金額: $<span id="total-sum">0</span></div>
        <div class="nav-btns">
            <button class="main-btn btn-red" onclick="cancelAndClear()">❌ 清空</button>
            <button class="main-btn btn-blue" onclick="resetForNewItem()">➕ 繼續點</button>
            <button class="main-btn btn-green" id="printBtn" onclick="finalizeAndPrint()">🖨️ 確認並列印</button>
        </div>
    </div>
</div>

<canvas id="printCanvas" width="384"></canvas>

<script>
    const START_NO = 8238;
    const config = {
        '湯品': ['魚圓湯','肉圓湯','魚餃湯','三寶湯'],
        '麵食': ['魚圓面', '香菇肉碎面', '招牌面', '餐餐面', '肉圓面', '蝦魚面', '西刀魚面', '香菇面', '魚餃面', '(純)肉碎面', '小魚香面'],
        'imgs': {
            '魚圓湯':'https://i.ibb.co/nNLMt8jp/Fish-Dumpling-noodle.png', '肉圓湯':'https://i.ibb.co/nNLMt8jp/Fish-Dumpling-noodle.png',
            '魚餃湯':'https://i.ibb.co/nNLMt8jp/Fish-Dumpling-noodle.png', '三寶湯':'https://i.ibb.co/nNLMt8jp/Fish-Dumpling-noodle.png',
            '魚圓面':'https://i.ibb.co/60pL5kRj/Fishball-Noodle.png', '香菇肉碎面':'https://i.ibb.co/60pL5kRj/Fishball-Noodle.png',
            '招牌面':'https://i.ibb.co/60pL5kRj/Fishball-Noodle.png', '餐餐面':'https://i.ibb.co/60pL5kRj/Fishball-Noodle.png',
            '面薄':'https://i.ibb.co/60pL5kRj/Fishball-Noodle.png', '幼面':'https://i.ibb.co/60pL5kRj/Fishball-Noodle.png',
            '粿條':'https://i.ibb.co/4Z3pjddg/Kuay-Teow-Noodle.png'
        },
        'prices': { '魚圓湯': 5, '肉圓湯': 5, '魚餃湯': 5, '三寶湯': 6, '魚圓面': 4, '香菇肉碎面': 5, '招牌面': 6, '餐餐面': 6, '大的': 1, '小的': 0 },
        'noodleType': ['面薄', '幼面', '粿條', '熟面', '米粉', '米太目', '冬粉', '粿條面', '米粉面'],
        'sauce': ['辣椒', '茄汁', '黑醬油', '白醬青', '黑醋', '湯'],
        'noExtra': ['油', '蔥', '香菇', '肉碎', '黑醬油', '肉圓換魚圓'],
        'addExtra': ['魚圓', '肉圓', '魚餃', '香菇', '肉碎', '蝦']
    };

    let cart = [], currentCat = '', itemSelections = {}, bowlQueue = [], qIdx = 0, tempBowl = {};

    function init() {
        renderGrid('grid-noodleType', config.noodleType, (n) => { tempBowl.noodle = n; goNext('step-sauce-select'); }, true);
        renderGrid('grid-sauce', config.sauce, (s, div) => { toggleSelection(tempBowl.sauces, s, div); }, false);
        renderGrid('grid-noExtra', config.noExtra, (x, div) => { toggleSelection(tempBowl.noExtras, x, div); }, false);
        renderAddExtraGrid();
    }

    function renderGrid(id, list, onClick, hasImg) {
        const grid = document.getElementById(id);
        grid.innerHTML = '';
        list.forEach(item => {
            const div = document.createElement('div');
            div.className = 'opt';
            div.style.minHeight = hasImg ? '140px' : '60px';
            div.innerHTML = hasImg ? `<div class="img-box"><img src="${config.imgs[item] || ''}"></div><span>${item}</span>` : `<span>${item}</span>`;
            div.onclick = () => onClick(item, div);
            grid.appendChild(div);
        });
    }

    function toggleSelection(arr, val, div) {
        const idx = arr.indexOf(val);
        if (idx > -1) { arr.splice(idx, 1); div.classList.remove('selected'); }
        else { arr.push(val); div.classList.add('selected'); }
    }

    function setCategory(cat) {
        currentCat = cat;
        const list = config[cat === '湯' ? '湯品' : '麵食'];
        const grid = document.getElementById('grid-items');
        grid.innerHTML = '';
        list.forEach(name => {
            itemSelections[name] = { l: 0, s: 0 };
            const div = document.createElement('div');
            div.className = 'opt';
            div.id = `opt-${name}`;
            div.innerHTML = `
                <div class="img-box"><img src="${config.imgs[name] || ''}"></div>
                <span>${name}</span>
                <div class="counter-container" onclick="event.stopPropagation()">
                    <div class="qty-side">
                        <span class="qty-label">大</span>
                        <div class="qty-controls">
                            <button class="btn-mini" onclick="updateQty('${name}','l',-1)">-</button>
                            <span class="num-val" id="qty-l-${name}">0</span>
                            <button class="btn-mini" onclick="updateQty('${name}','l',1)">+</button>
                        </div>
                    </div>
                    <div class="qty-side">
                        <span class="qty-label">小</span>
                        <div class="qty-controls">
                            <button class="btn-mini" onclick="updateQty('${name}','s',-1)">-</button>
                            <span class="num-val" id="qty-s-${name}">0</span>
                            <button class="btn-mini" onclick="updateQty('${name}','s',1)">+</button>
                        </div>
                    </div>
                </div>`;
            grid.appendChild(div);
        });
        goNext('step-item-select');
    }

    function updateQty(name, sz, delta) {
        let v = itemSelections[name][sz] + delta;
        if (v < 0) return;
        itemSelections[name][sz] = v;
        document.getElementById(`qty-${sz}-${name}`).innerText = v;
        document.getElementById(`opt-${name}`).classList.toggle('selected', (itemSelections[name].l + itemSelections[name].s) > 0);
    }

    function renderAddExtraGrid() {
        const cont = document.getElementById('grid-addExtra');
        cont.innerHTML = '';
        config.addExtra.forEach(x => {
            const div = document.createElement('div'); div.className = 'opt'; div.style.minHeight='100px';
            div.innerHTML = `<span>${x} ($1)</span>
                <div class="counter-container" style="justify-content:center; padding:10px 0;">
                    <button class="btn-mini" onclick="updateBowlExtra('${x}',-1,this)">-</button>
                    <span class="num-val" style="margin:0 15px">0</span>
                    <button class="btn-mini" onclick="updateBowlExtra('${x}',1,this)">+</button>
                </div>`;
            cont.appendChild(div);
        });
    }

    function updateBowlExtra(name, delta, btn) {
        let cur = tempBowl.addExtras[name] || 0;
        let next = cur + delta; if (next < 0) return;
        tempBowl.addExtras[name] = next;
        btn.parentElement.querySelector('.num-val').innerText = next;
    }

    function startConfigQueue() {
        bowlQueue = [];
        for (let name in itemSelections) {
            for (let i = 0; i < itemSelections[name].l; i++) bowlQueue.push({ name, size: '大的' });
            for (let i = 0; i < itemSelections[name].s; i++) bowlQueue.push({ name, size: '小的' });
        }
        if (bowlQueue.length === 0) return alert("請先點選數量！");
        qIdx = 0; prepareBowlConfig();
    }

    function prepareBowlConfig() {
        const b = bowlQueue[qIdx];
        tempBowl = { ...b, noodle: currentCat==='湯'?'湯品':'', sauces:[], noExtras:[], addExtras:{}, price:0 };
        document.querySelectorAll('.config-header').forEach(h => h.innerText = `${h.innerText.split('(')[0]} (${qIdx+1}/${bowlQueue.length}) - ${b.name}[${b.size}]`);
        document.querySelectorAll('.opt').forEach(el => el.classList.remove('selected'));
        document.querySelectorAll('.num-val').forEach(el => { if(el.id.indexOf('qty') === -1) el.innerText = '0'; });
        goNext(currentCat === '湯' ? 'step-no-extra' : 'step-noodle-type');
    }

    function confirmOneBowl() {
        let p = (config.prices[tempBowl.name]||0) + (config.prices[tempBowl.size]||0);
        for(let k in tempBowl.addExtras) p += tempBowl.addExtras[k];
        tempBowl.price = p;
        cart.push(JSON.parse(JSON.stringify(tempBowl)));
        qIdx++;
        if (qIdx < bowlQueue.length) prepareBowlConfig();
        else { updateCartDisplay(); goNext('step-finish'); }
    }

    function updateCartDisplay() {
        let total = 0;
        document.getElementById('current-cart').innerHTML = cart.map((it, i) => {
            total += it.price;
            let extras = []; for(let k in it.addExtras) if(it.addExtras[k]>0) extras.push(`${k}x${it.addExtras[k]}`);
            return `<div style="border-bottom:1px solid #eee; padding:5px 0;">
                <b>${i+1}. ${it.name} (${it.size})</b> - $${it.price}<br>
                <small>${it.noodle} / ${it.sauces.join(',')} ${it.noExtras.length?'[不要:'+it.noExtras.join(',')+']':''} ${extras.length?'[加:'+extras.join(',')+']':''}</small>
            </div>`;
        }).join('');
        document.getElementById('total-sum').innerText = total;
    }

    function goNext(id) { document.querySelectorAll('.step').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); window.scrollTo(0,0); }
    function checkSauceNext() { if(tempBowl.sauces.length > 0) goNext('step-no-extra'); else alert("請選擇醬料"); }
    function resetForNewItem() { cart = []; goNext('step-start'); }
    function cancelAndClear() { if(confirm("確定清空？")) { cart = []; goNext('step-start'); } }

    // 列印相關
    function drawPrintCanvas(record) {
        const canvas = document.getElementById('printCanvas'), ctx = canvas.getContext('2d');
        canvas.height = 250 + (record.items.length * 160);
        ctx.fillStyle = "white"; ctx.fillRect(0,0,384,canvas.height);
        ctx.fillStyle = "black"; ctx.textAlign = "center";
        ctx.font = "bold 28px sans-serif"; ctx.fillText("Million Golden Bowl", 192, 20);
        ctx.font = "bold 44px sans-serif"; ctx.fillText(`No. ${record.num}`, 192, 75);
        ctx.textAlign = "right"; let y = 140;
        record.items.forEach(it => {
            ctx.font = "bold 36px sans-serif"; ctx.fillText(`${it.name} (${it.size.replace('的','')})`, 374, y); y+=45;
            ctx.font = "bold 26px sans-serif"; ctx.fillText(`${it.noodle} ${it.sauces.join(',')}`, 374, y); y+=35;
            let adds = []; for(let k in it.addExtras) if(it.addExtras[k]>0) adds.push(`+${k}x${it.addExtras[k]}`);
            let detail = (it.noExtras.length ? "❌"+it.noExtras.join(',') : "") + (adds.length ? " ✅"+adds.join(',') : "");
            if(detail) { ctx.font = "bold 22px sans-serif"; ctx.fillText(detail, 374, y); y+=35; }
            y+=15;
        });
        ctx.textAlign="center"; ctx.font="bold 40px sans-serif"; ctx.fillText("TOTAL: $" + record.total, 192, y);
    }

    async function finalizeAndPrint() {
        const total = document.getElementById('total-sum').innerText;
        const record = { num: START_NO + Math.floor(Math.random()*100), items: cart, total };
        drawPrintCanvas(record);
        // 此處接回您原本的藍牙列印邏輯...
        alert("正在列印 No." + record.num);
        cart = []; goNext('step-start');
    }

    init();
</script>
</body>
</html>
