<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xprinter 中文列印測試</title>
    <!-- 引入轉碼庫 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/encoding-japanese/2.0.0/encoding.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        button { 
            width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 8px; 
            font-size: 16px; font-weight: bold; cursor: pointer; color: white;
        }
        .btn-primary { background-color: #007bff; }
        .btn-secondary { background-color: #28a745; }
        #status { color: #666; font-size: 14px; margin-top: 10px; border: 1px solid #ddd; padding: 10px; border-radius: 5px; min-height: 40px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Xprinter 測試工具</h2>
    <p>請輸入要列印的文字：</p>
    <textarea id="printText" style="width:100%; height:80px; padding:5px; box-sizing:border-box;">
測試成功！
1234567890
繁體中文測試
Million 麵店點單
    </textarea>

    <div id="status">狀態：等待操作...</div>

    <button class="btn-primary" onclick="startPrint('BIG5')">1. 連接並列印 (Big5 繁體)</button>
    <button class="btn-secondary" onclick="startPrint('GB18030')">2. 備用模式 (GB18030 簡繁)</button>
    
    <p style="font-size: 12px; color: #999; text-align: left;">
        * 如果方案 1 是亂碼，請嘗試方案 2。<br>
        * 確保手機藍牙已開啟。<br>
        * 必須在 HTTPS 環境下執行。
    </p>
</div>

<script>
    let device, server, characteristic;

    async function startPrint(encodingMode) {
        const statusEl = document.getElementById('status');
        const textToPrint = document.getElementById('printText').value;

        try {
            if (!characteristic) {
                statusEl.innerText = "正在搜尋藍牙設備...";
                device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: [
                        '0000ffe0-0000-1000-8000-00805f9b34fb', 
                        '000018f0-0000-1000-8000-00805f9b34fb',
                        'e7e11000-49f1-b3a2-991d-7199629b8e36'
                    ]
                });

                statusEl.innerText = "正在連接...";
                server = await device.gatt.connect();
                const services = await server.getPrimaryServices();
                
                for (const service of services) {
                    const chars = await service.getCharacteristics();
                    characteristic = chars.find(c => c.properties.write || c.properties.writeWithoutResponse);
                    if (characteristic) break;
                }
            }

            if (!characteristic) throw new Error("找不到可寫入的列印特徵值");

            statusEl.innerText = `正在使用 ${encodingMode} 編碼...`;

            // --- 1. ESC/POS 初始化指令 ---
            // [0x1B, 0x40] 初始化
            // [0x1C, 0x26] 進入漢字模式 (FS &)
            const initCmd = new Uint8Array([0x1B, 0x40, 0x1C, 0x26]);
            await characteristic.writeValue(initCmd);

            // --- 2. 轉碼內容 ---
            const fullContent = textToPrint + "\n\n\n\n"; // 多留幾行出紙
            const charArray = Array.from(fullContent).map(c => c.charCodeAt(0));
            const encodedArray = Encoding.convert(charArray, {
                to: encodingMode,
                from: 'UNICODE'
            });
            const data = new Uint8Array(encodedArray);

            // --- 3. 分段發送 (重要：解決 iPhone 亂碼或漏字) ---
            const CHUNK_SIZE = 20;
            for (let i = 0; i < data.length; i += CHUNK_SIZE) {
                const chunk = data.slice(i, i + CHUNK_SIZE);
                await characteristic.writeValue(chunk);
                // 停頓 50 毫秒讓印表機處理緩衝
                await new Promise(r => setTimeout(r, 50));
            }

            statusEl.innerText = "✅ 列印指令已發送！";

        } catch (error) {
            console.error(error);
            statusEl.innerText = "❌ 錯誤: " + error.message;
            characteristic = null; // 出錯時重置連線
        }
    }
</script>

</body>
</html>
