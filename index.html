<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Million 麵店 - 圖片列印版</title>
    <style>
        :root { --primary: #1a73e8; --secondary: #f0f2f5; --success: #34a853; --price-tag: #d93025; }
        body { font-family: sans-serif; background: var(--secondary); margin: 0; padding: 10px; text-align: center; }
        .container { max-width: 500px; margin: auto; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding-bottom: 90px; min-height: 85vh; position: relative; }
        .step { display: none; animation: fadeIn 0.3s; }
        .step.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .opt { background: #fff; border: 2px solid #eee; border-radius: 12px; cursor: pointer; overflow: hidden; position: relative; display: flex; flex-direction: column; }
        .img-box { width: 100%; height: 100px; display: flex; background: #fafafa; overflow: hidden; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; flex: 1; }
        .opt span { padding: 8px 5px; font-weight: bold; font-size: 0.9rem; }
        .opt.selected { border-color: var(--primary); background: #e8f0fe; }
        .cart-box { margin-top: 20px; padding: 15px; border: 2px dashed var(--primary); border-radius: 10px; text-align: left; background: #fffbe6; }
        .total-price-bar { font-size: 1.6rem; color: var(--price-tag); font-weight: bold; margin: 20px 0; }
        .nav-btns { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px; display: flex; gap: 10px; max-width: 500px; margin: auto; box-shadow: 0 -5px 10px rgba(0,0,0,0.05); z-index: 1000; }
        button { flex: 1; padding: 15px; border-radius: 10px; border: none; font-size: 1rem; cursor: pointer; font-weight: bold; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-green { background: var(--success); color: white; }
        #status { font-size: 11px; color: #666; font-weight: bold; margin-bottom: 5px; }
        /* 隱藏繪圖板 */
        #printCanvas { display: none; background: white; }
    </style>
</head>
<body>

<div class="container">
    <div id="status">[ 圖片列印模式已就緒 ]</div>
    
    <div class="step active" id="step-start">
        <h2>點餐系統 (圖片化測試版)</h2>
        <p>請先點餐，最後按「圖片列印」</p>
        <button class="btn-blue" onclick="setCategory('面')">開始點餐</button>
    </div>

    <div class="step" id="step-finish">
        <h2>🛒 購物車明細</h2>
        <div class="cart-box" id="current-cart"></div>
        <div class="total-price-bar">總計: $<span id="total-sum">0</span></div>
        <div class="nav-btns">
            <button class="btn-blue" onclick="location.reload()">重新開始</button>
            <button class="btn-green" onclick="handleImagePrint()">🖨️ 圖片化列印 (解決亂碼)</button>
        </div>
    </div>
</div>

<canvas id="printCanvas" width="384"></canvas>

<script>
    // ... 之前嘅 config, cart 數據 (略) ...
    // 為咗方便測試，我直接寫列印邏輯
    
    async function handleImagePrint() {
        const status = document.getElementById('status');
        const canvas = document.getElementById('printCanvas');
        const ctx = canvas.getContext('2d');
        
        try {
            status.innerText = "⏳ 正在生成收據影像...";
            
            // 1. 設定收據高度 (根據餐點數量動態調整)
            canvas.height = 200 + (cart.length * 100);
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 2. 畫文字落塊板度 (呢度係畫圖，所以印出嚟一定係繁體)
            ctx.fillStyle = "black";
            ctx.textAlign = "center";
            ctx.font = "bold 32px Arial";
            ctx.fillText("Million Noodles", 192, 50);
            
            ctx.textAlign = "left";
            ctx.font = "24px Arial";
            let y = 100;
            cart.forEach((item, i) => {
                ctx.fillText(`#${i+1} ${item.names.join('+')} [${item.size}]`, 10, y);
                y += 35;
                ctx.font = "20px Arial";
                ctx.fillText(`   ${item.noodle} ${item.sauces.join(',')}`, 10, y);
                y += 45;
                ctx.font = "24px Arial";
            });
            
            ctx.fillText("--------------------------------", 10, y);
            y += 40;
            ctx.font = "bold 28px Arial";
            ctx.fillText("TOTAL: $" + document.getElementById('total-sum').innerText, 10, y);

            // 3. 藍牙連線
            status.innerText = "⏳ 正在連線印表機...";
            const dev = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: ['0000ffe0-0000-1000-8000-00805f9b34fb']
            });
            const srv = await dev.gatt.connect();
            const services = await srv.getPrimaryServices();
            let targetChar = null;
            for (const s of services) {
                const chars = await s.getCharacteristics();
                targetChar = chars.find(c => c.properties.write || c.properties.writeWithoutResponse);
                if (targetChar) break;
            }

            // 4. 將 Canvas 轉成位圖數據 (ESC/POS 格式)
            status.innerText = "📤 傳送影像數據 (請稍候)...";
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const pixels = imgData.data;
            
            // ESC/POS 初始化
            await targetChar.writeValue(new Uint8Array([0x1B, 0x40]));

            // 簡單圖片列印演算法 (GS v 0 模式)
            const widthBytes = canvas.width / 8;
            for (let y = 0; y < canvas.height; y++) {
                let row = [0x1D, 0x76, 0x30, 0, widthBytes, 0, 1, 0]; // 每行印一次
                let bytes = new Uint8Array(8 + widthBytes);
                bytes.set([0x1D, 0x76, 0x30, 0, widthBytes, 0, 1, 0]);
                
                for (let x = 0; x < widthBytes; x++) {
                    let b = 0;
                    for (let bit = 0; bit < 8; bit++) {
                        let idx = ((y * canvas.width) + (x * 8 + bit)) * 4;
                        let gray = pixels[idx] * 0.3 + pixels[idx+1] * 0.59 + pixels[idx+2] * 0.11;
                        if (gray < 128) b |= (1 << (7 - bit));
                    }
                    bytes[8 + x] = b;
                }
                await targetChar.writeValue(bytes);
                // 圖片傳輸慢，每行加少少 delay 費事 iPhone 斷線
                if (y % 10 === 0) await new Promise(r => setTimeout(r, 20));
            }

            // 走紙
            await targetChar.writeValue(new Uint8Array([0x1B, 0x64, 0x05]));
            status.innerText = "✅ 圖片化列印完成！";

        } catch (e) {
            alert("圖片列印出錯: " + e.message);
            status.innerText = "❌ 失敗";
        }
    }
    // ... 剩餘 init 邏輯 ...
</script>
</body>
</html>
