<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Million 麵店 - 衝刺穩定版</title>
    <style>
        :root { --primary: #1a73e8; --secondary: #f0f2f5; --success: #34a853; --price-tag: #d93025; }
        body { font-family: sans-serif; background: var(--secondary); margin: 0; padding: 10px; text-align: center; }
        .container { max-width: 500px; margin: auto; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding-bottom: 90px; min-height: 85vh; position: relative; }
        .step { display: none; animation: fadeIn 0.3s; }
        .step.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .back-btn-top { position: absolute; right: 0; top: 0; width: 35px; height: 35px; border-radius: 50%; background: #eee; color: #555; border: none; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; }
        h2 { color: #333; font-size: 1.1rem; margin: 10px 0 20px 0; border-left: 5px solid var(--primary); padding-left: 10px; text-align: left; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .opt { background: #fff; border: 2px solid #eee; border-radius: 12px; cursor: pointer; overflow: hidden; position: relative; display: flex; flex-direction: column; }
        .img-box { width: 100%; height: 100px; display: flex; background: #fafafa; overflow: hidden; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; flex: 1; }
        .opt span { padding: 8px 5px; font-weight: bold; font-size: 0.9rem; }
        .opt.selected { border-color: var(--primary); background: #e8f0fe; }
        .cart-box { margin-top: 20px; padding: 10px; border: 1px solid #ddd; border-radius: 10px; text-align: left; background: #fff; }
        .cart-item { border-bottom: 1px solid #eee; padding: 8px 0; display: flex; justify-content: space-between; align-items: center; }
        .total-price-bar { font-size: 1.4rem; color: var(--price-tag); font-weight: bold; margin: 15px 0; }
        
        #preview-area { margin-top: 15px; border: 2px solid #333; padding: 5px; background: #666; display: none; }
        #preview-area p { margin: 2px; font-size: 12px; color: white; font-weight: bold; }
        #printPreviewImg { background: white; width: 100%; height: auto; display: block; image-rendering: pixelated; border: 1px solid #000; }

        .nav-btns { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px; display: flex; gap: 10px; max-width: 500px; margin: auto; box-shadow: 0 -5px 10px rgba(0,0,0,0.05); z-index: 1000; }
        button { flex: 1; padding: 15px; border-radius: 10px; border: none; font-size: 1rem; cursor: pointer; font-weight: bold; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-green { background: var(--success); color: white; }
        #status { font-size: 11px; color: #d93025; font-weight: bold; margin-bottom: 5px; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="status">● 藍牙待機中</div>
    
    <div class="step active" id="step-start">
        <h2>1. 請選擇類別</h2>
        <div class="grid">
            <div class="opt" onclick="setCategory('湯')"><div class="img-box"><img src="https://lh3.googleusercontent.com/pw/AP1GczOoXizYOs7TlJVh_ikXpPT_8uSFOyH2mnDMFvu2CIFXpJVYqNssfvAbgkwksOqIi89J0NAktQdtJStc5KB6YPkxqk0ccWLkjKAGWKILKERYMt_PYsI=w2400?source=screenshot.guru"></div><span>湯品類</span></div>
            <div class="opt" onclick="setCategory('面')"><div class="img-box"><img src="https://lh3.googleusercontent.com/pw/AP1GczM1EgErnLz57PZ0ckyDapaXUx27rggwr5VvU49Yo1vpygNeiLiTCVK6nGMT7UewX9jWyWN7Q04y5g8QeGtKBFBtYod8YZd1L42sFsRuRCpY2EvidrI=w2400?source=screenshot.guru"></div><span>麵食類</span></div>
        </div>
    </div>

    <div class="step" id="step-soup-select"><button class="back-btn-top" onclick="goNext('step-start')">←</button><div class="grid" id="grid-soupItems"></div><div class="nav-btns"><button class="btn-blue" onclick="checkSoupNext()">下一步</button></div></div>
    <div class="step" id="step-food-select"><button class="back-btn-top" onclick="goNext('step-start')">←</button><div class="grid" id="grid-foodItems"></div></div>
    <div class="step" id="step-size"><button class="back-btn-top" onclick="handleSizeBack()">←</button><div class="grid" id="grid-size"></div></div>
    <div class="step" id="step-noodle-type"><button class="back-btn-top" onclick="goNext('step-size')">←</button><div class="grid" id="grid-noodleType"></div></div>
    <div class="step" id="step-sauce-select"><button class="back-btn-top" onclick="goNext('step-noodle-type')">←</button><div class="grid" id="grid-sauce"></div><div class="nav-btns"><button class="btn-blue" onclick="generatePreviewAndGo()">✅ 加入購物車</button></div></div>

    <div class="step" id="step-finish">
        <h2>🛒 購物車明細</h2>
        <div class="cart-box" id="current-cart"></div>
        <div class="total-price-bar">總計: $<span id="total-sum">0</span></div>
        
        <div id="preview-area">
            <p>【列印預覽】</p>
            <img id="printPreviewImg" src="" alt="列印預覽">
        </div>

        <div class="nav-btns">
            <button class="btn-blue" onclick="resetForNewItem()">➕ 繼續點餐</button>
            <button class="btn-green" id="printBtn" onclick="handleImagePrint()">🖨️ 衝刺列印</button>
        </div>
    </div>
</div>

<canvas id="printCanvas" width="384"></canvas>

<script>
    const config = {
        '魚圓湯': { p: 5, img: '0' }, '肉圓湯': { p: 5, img: '2' }, '魚餃湯': { p: 5, img: '3' }, '三寶湯': { p: 6, img: '4' },
        '魚圓面': { p: 4, img: '1' }, '香菇肉碎面': { p: 5, img: '5' }, '招牌面': { p: 6, img: '6' }, '餐餐面': { p: 6, img: '7' },
        '肉圓面': { p: 4, img: '8' }, '蝦魚面': { p: 5, img: '9' }, '西刀魚面': { p: 4, img: '10' }, '香菇面': { p: 5, img: '11' },
        '魚餃面': { p: 4, img: '12' }, '(純)肉碎面': { p: 4, img: '1' }, '小魚香面': { p: 4, img: '12' },
        '小的': { p: 0, img: '13' }, '大的': { p: 1, img: '14' },
        'noodleType': { '面薄':'15','幼面':'16','粿條':'17','熟面':'18','米粉':'19','米太目':'20','冬粉':'21','粿條面':'17','粿條米粉':'17','米粉面':'19' },
        'sauce': { '辣椒':'22','茄汁':'23','黑醬油':'24','白醬青':'25','黑醋':'26','(湯)':'27' }
    };

    let cart = [];
    let tempItem = { category: '', names: [], size: '', noodle: '', sauces: [], price: 0 };

    function init() {
        renderGrid(['魚圓湯','肉圓湯','魚餃湯','三寶湯'], 'grid-soupItems', (val, el) => toggleMulti(val, el, tempItem.names, 2), true);
        renderGrid(['魚圓面', '香菇肉碎面', '招牌面', '餐餐面', '肉圓面', '蝦魚面', '西刀魚面', '香菇面', '魚餃面', '(純)肉碎面', '小魚香面'], 'grid-foodItems', (val) => { tempItem.names = [val]; goNext('step-size'); });
        renderGrid(['小的', '大的'], 'grid-size', (val) => { tempItem.size = val; if(tempItem.category === '湯') generatePreviewAndGo(); else goNext('step-noodle-type'); });
        renderGrid(Object.keys(config.noodleType), 'grid-noodleType', (val) => { tempItem.noodle = val; goNext('step-sauce-select'); });
        renderGrid(Object.keys(config.sauce), 'grid-sauce', (val, el) => toggleMulti(val, el, tempItem.sauces, 3), true);
    }

    function renderGrid(list, id, clickFn, multi = false) {
        const cont = document.getElementById(id); if(!cont) return;
        cont.innerHTML = '';
        list.forEach(name => {
            const div = document.createElement('div');
            div.className = 'opt';
            let imgId = (id === 'grid-noodleType') ? config.noodleType[name] : (id === 'grid-sauce' ? config.sauce[name] : config[name]?.img);
            div.innerHTML = `<div class="img-box"><img src="http://googleusercontent.com/profile/picture/${imgId}"></div><span>${name}</span>`;
            div.onclick = () => { if(!multi) Array.from(cont.children).forEach(c=>c.classList.remove('selected')); div.classList.add('selected'); clickFn(name, div); };
            cont.appendChild(div);
        });
    }

    function setCategory(v) { tempItem.category = v; goNext(v === '湯' ? 'step-soup-select' : 'step-food-select'); }
    function toggleMulti(v, el, list, max) { if(list.includes(v)) { list.splice(list.indexOf(v), 1); el.classList.remove('selected'); } else { if(list.length >= max) return; list.push(v); el.classList.add('selected'); } }
    function goNext(id) { document.querySelectorAll('.step').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    function checkSoupNext() { if(tempItem.names.length>0) goNext('step-size'); }
    function handleSizeBack() { goNext(tempItem.category === '湯' ? 'step-soup-select' : 'step-food-select'); }

    function generatePreviewAndGo() {
        let p = 0; tempItem.names.forEach(n => p += (config[n]?.p || 0)); p += (config[tempItem.size]?.p || 0);
        tempItem.price = p; cart.push(JSON.parse(JSON.stringify(tempItem))); 
        updateCartDisplay(); 
        drawPrintCanvas();
        goNext('step-finish');
    }

    function updateCartDisplay() {
        let t = 0; document.getElementById('current-cart').innerHTML = cart.map((item, i) => { t += item.price; return `<div class="cart-item"><div><b>#${i+1} ${item.names.join('+')}</b> [${item.size}]<br><small>${item.noodle||''} ${item.sauces.join(',')}</small></div><div>$${item.price}</div></div>`; }).join('');
        document.getElementById('total-sum').innerText = t;
    }

    function drawPrintCanvas() {
        const canvas = document.getElementById('printCanvas');
        const ctx = canvas.getContext('2d');
        const previewImg = document.getElementById('printPreviewImg');
        const previewArea = document.getElementById('preview-area');

        canvas.height = 300 + (cart.length * 110);
        ctx.fillStyle = "white"; ctx.fillRect(0, 0, 384, canvas.height);
        ctx.textBaseline = "top"; ctx.fillStyle = "black";
        
        ctx.textAlign = "center";
        ctx.font = "bold 34px sans-serif";
        ctx.fillText("Million Noodles", 192, 40);

        ctx.textAlign = "left";
        let y = 110;
        cart.forEach((item, i) => {
            ctx.font = "bold 28px sans-serif";
            ctx.fillText(`#${i+1} ${item.names.join('+')}`, 10, y);
            y += 40;
            ctx.font = "22px sans-serif";
            ctx.fillText(` [${item.size}] ${item.noodle||''} ${item.sauces.join(',')}`, 10, y);
            y += 60;
        });

        ctx.font = "24px sans-serif";
        ctx.fillText("----------------------------", 10, y); y += 45;
        ctx.font = "bold 32px sans-serif";
        ctx.fillText("TOTAL: $" + document.getElementById('total-sum').innerText, 10, y);

        previewImg.src = canvas.toDataURL("image/png");
        previewArea.style.display = "block";
    }

    function resetForNewItem() { tempItem = { category: '', names: [], size: '', noodle: '', sauces: [], price: 0 }; document.querySelectorAll('.opt').forEach(o => o.classList.remove('selected')); goNext('step-start'); }

    async function handleImagePrint() {
        const status = document.getElementById('status');
        const btn = document.getElementById('printBtn');
        const canvas = document.getElementById('printCanvas');
        const ctx = canvas.getContext('2d');
        
        try {
            btn.disabled = true;
            status.innerText = "🔍 搜尋印表機...";
            const device = await navigator.bluetooth.requestDevice({ acceptAllDevices: true, optionalServices: ['0000ffe0-0000-1000-8000-00805f9b34fb'] });
            const server = await device.gatt.connect();
            const services = await server.getPrimaryServices();
            
            let targetChar = null;
            let canFast = false;
            for (const s of services) {
                const chars = await s.getCharacteristics();
                targetChar = chars.find(c => c.properties.writeWithoutResponse);
                if (targetChar) { canFast = true; break; }
                targetChar = chars.find(c => c.properties.write);
                if (targetChar) break;
            }

            if (!targetChar) throw new Error("找不到通道");

            status.innerText = "📤 衝刺列印中...";
            const imgData = ctx.getImageData(0, 0, 384, canvas.height);
            const pixels = imgData.data;

            await targetChar.writeValue(new Uint8Array([0x1B, 0x40])); 
            const widthBytes = 384 / 8;

            for (let y = 0; y < canvas.height; y++) {
                let row = new Uint8Array(8 + widthBytes);
                row.set([0x1D, 0x76, 0x30, 0, widthBytes, 0, 1, 0]);
                for (let x = 0; x < widthBytes; x++) {
                    let b = 0;
                    for (let bit = 0; bit < 8; bit++) {
                        let idx = ((y * 384) + (x * 8 + bit)) * 4;
                        let gray = pixels[idx] * 0.3 + pixels[idx+1] * 0.59 + pixels[idx+2] * 0.11;
                        if (gray < 140) b |= (1 << (7 - bit));
                    }
                    row[8 + x] = b;
                }
                
                if (canFast) {
                    await targetChar.writeValueWithoutResponse(row);
                } else {
                    await targetChar.writeValue(row);
                }
                
                // --- 速度倍增優化 ---
                // 每 30 行休息 10ms (由 20行/25ms 提升)
                if (y % 100 === 0) { await new Promise(r => setTimeout(r, 20)); }
            }

            await targetChar.writeValue(new Uint8Array([0x1B, 0x64, 0x08]));
            await targetChar.writeValue(new Uint8Array([0x1D, 0x56, 0x00]));

            status.innerText = "✅ 列印完成！";
            cart = []; updateCartDisplay(); btn.disabled = false; resetForNewItem();
            await server.disconnect();

        } catch (e) {
            alert("錯誤: " + e.message);
            status.innerText = "❌ 連線失敗";
            btn.disabled = false;
        }
    }
    init();
</script>
</body>
</html>
