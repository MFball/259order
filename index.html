<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Million 麵店 - 40B高速版</title>
    <style>
        :root { --primary: #1a73e8; --secondary: #f0f2f5; --success: #34a853; --price-tag: #d93025; }
        body { font-family: sans-serif; background: var(--secondary); margin: 0; padding: 10px; text-align: center; }
        .container { max-width: 500px; margin: auto; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding-bottom: 90px; }
        .step { display: none; }
        .step.active { display: block; }
        h2 { border-left: 5px solid var(--primary); padding-left: 10px; text-align: left; font-size: 1.1rem; margin: 10px 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .opt { background: #fff; border: 2px solid #eee; border-radius: 12px; cursor: pointer; display: flex; flex-direction: column; overflow: hidden; }
        .img-box { width: 100%; height: 90px; background: #fafafa; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .opt span { padding: 8px; font-weight: bold; font-size: 0.85rem; }
        .opt.selected { border-color: var(--primary); background: #e8f0fe; }
        .cart-box { margin-top: 15px; padding: 15px; border: 2px dashed var(--primary); background: #fffbe6; text-align: left; border-radius: 10px; font-size: 0.9rem; }
        .total-price-bar { font-size: 1.6rem; color: var(--price-tag); font-weight: bold; margin: 15px 0; }
        .nav-btns { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px; display: flex; gap: 10px; max-width: 500px; margin: auto; box-shadow: 0 -5px 10px rgba(0,0,0,0.05); }
        button { flex: 1; padding: 15px; border-radius: 10px; border: none; font-size: 1rem; cursor: pointer; font-weight: bold; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-green { background: var(--success); color: white; }
        #status { font-size: 12px; color: #1a73e8; font-weight: bold; padding: 10px; border: 1px solid #1a73e8; border-radius: 8px; margin-bottom: 10px; background: #f0f7ff; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="status">● 準備就緒 (50B 傳輸模式)</div>
    
    <div class="step active" id="step-start">
        <h2>1. 請選擇類別</h2>
        <div class="grid">
            <div class="opt" onclick="setCategory('湯')"><div class="img-box"><img src="https://lh3.googleusercontent.com/pw/AP1GczOoXizYOs7TlJVh_ikXpPT_8uSFOyH2mnDMFvu2CIFXpJVYqNssfvAbgkwksOqIi89J0NAktQdtJStc5KB6YPkxqk0ccWLkjKAGWKILKERYMt_PYsI=w2400?source=screenshot.guru"></div><span>湯品類</span></div>
            <div class="opt" onclick="setCategory('面')"><div class="img-box"><img src="https://lh3.googleusercontent.com/pw/AP1GczM1EgErnLz57PZ0ckyDapaXUx27rggwr5VvU49Yo1vpygNeiLiTCVK6nGMT7UewX9jWyWN7Q04y5g8QeGtKBFBtYod8YZd1L42sFsRuRCpY2EvidrI=w2400?source=screenshot.guru"></div><span>麵食類</span></div>
        </div>
    </div>

    <div class="step" id="step-soup-select"><div class="grid" id="grid-soupItems"></div><div class="nav-btns"><button class="btn-blue" onclick="checkSoupNext()">下一步</button></div></div>
    <div class="step" id="step-food-select"><div class="grid" id="grid-foodItems"></div></div>
    <div class="step" id="step-size"><div class="grid" id="grid-size"></div></div>
    <div class="step" id="step-noodle-type"><div class="grid" id="grid-noodleType"></div></div>
    <div class="step" id="step-sauce-select"><div class="grid" id="grid-sauce"></div><div class="nav-btns"><button class="btn-blue" onclick="addToCart()">✅ 加入購物車</button></div></div>

    <div class="step" id="step-finish">
        <h2>🛒 點餐明細</h2>
        <div id="current-cart" class="cart-box"></div>
        <div class="total-price-bar">總計: $<span id="total-sum">0</span></div>
        <div class="nav-btns">
            <button class="btn-blue" onclick="resetForNewItem()">➕ 再點一份</button>
            <button class="btn-green" id="printBtn" onclick="handlePrint50B()">🖨️ 列印並切紙</button>
        </div>
    </div>
</div>

<canvas id="printCanvas" width="384"></canvas>

<script>
    const config = {
        '魚圓湯': { p: 5, img: '0' }, '肉圓湯': { p: 5, img: '2' }, '魚餃湯': { p: 5, img: '3' }, '三寶湯': { p: 6, img: '4' },
        '魚圓面': { p: 4, img: '1' }, '香菇肉碎面': { p: 5, img: '5' }, '招牌面': { p: 6, img: '6' }, '餐餐面': { p: 6, img: '7' },
        '肉圓面': { p: 4, img: '8' }, '蝦魚面': { p: 5, img: '9' }, '西刀魚面': { p: 4, img: '10' }, '香菇面': { p: 5, img: '11' },
        '魚餃面': { p: 4, img: '12' }, '(純)肉碎面': { p: 4, img: '1' }, '小魚香面': { p: 4, img: '12' },
        '小的': { p: 0, img: '13' }, '大的': { p: 1, img: '14' },
        'noodleType': { '面薄':'15','幼面':'16','粿條':'17','熟面':'18','米粉':'19','米太目':'20','冬粉':'21','粿條面':'17','粿條米粉':'17','米粉面':'19' },
        'sauce': { '辣椒':'22','茄汁':'23','黑醬油':'24','白醬青':'25','黑醋':'26','(湯)':'27' }
    };

    let cart = [];
    let tempItem = { category: '', names: [], size: '', noodle: '', sauces: [], price: 0 };

    function init() {
        renderGrid(['魚圓湯','肉圓湯','魚餃湯','三寶湯'], 'grid-soupItems', (v, el) => toggleMulti(v, el, tempItem.names, 2), true);
        renderGrid(['魚圓面','香菇肉碎面','招牌面','餐餐面','肉圓面','蝦魚面','西刀魚面','香菇面','魚餃面','(純)肉碎面','小魚香面'], 'grid-foodItems', (v) => { tempItem.names = [v]; goNext('step-size'); });
        renderGrid(['小的', '大的'], 'grid-size', (v) => { tempItem.size = v; if(tempItem.category==='湯') addToCart(); else goNext('step-noodle-type'); });
        renderGrid(Object.keys(config.noodleType), 'grid-noodleType', (v) => { tempItem.noodle = v; goNext('step-sauce-select'); });
        renderGrid(Object.keys(config.sauce), 'grid-sauce', (v, el) => toggleMulti(v, el, tempItem.sauces, 3), true);
    }

    function renderGrid(list, id, clickFn, multi = false) {
        const cont = document.getElementById(id); if(!cont) return;
        cont.innerHTML = '';
        list.forEach(name => {
            const div = document.createElement('div'); div.className = 'opt';
            let imgId = (id==='grid-noodleType')?config.noodleType[name]:(id==='grid-sauce'?config.sauce[name]:config[name]?.img);
            div.innerHTML = `<div class="img-box"><img src="http://googleusercontent.com/profile/picture/${imgId}"></div><span>${name}</span>`;
            div.onclick = () => { if(!multi) Array.from(cont.children).forEach(c=>c.classList.remove('selected')); div.classList.add('selected'); clickFn(name, div); };
            cont.appendChild(div);
        });
    }

    function setCategory(v) { tempItem.category = v; goNext(v==='湯'?'step-soup-select':'step-food-select'); }
    function toggleMulti(v, el, list, max) { if(list.includes(v)) { list.splice(list.indexOf(v), 1); el.classList.remove('selected'); } else { if(list.length >= max) return; list.push(v); el.classList.add('selected'); } }
    function goNext(id) { document.querySelectorAll('.step').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); window.scrollTo(0,0); }
    function checkSoupNext() { if(tempItem.names.length>0) goNext('step-size'); }
    function handleSizeBack() { goNext(tempItem.category==='湯'?'step-soup-select':'step-food-select'); }
    function addToCart() { let p = 0; tempItem.names.forEach(n => p += (config[n]?.p || 0)); p += (config[tempItem.size]?.p || 0); tempItem.price = p; cart.push(JSON.parse(JSON.stringify(tempItem))); updateCartDisplay(); goNext('step-finish'); }
    function updateCartDisplay() { let t = 0; document.getElementById('current-cart').innerHTML = cart.map((item, i) => { t += item.price; return `<div><b>#${i+1} ${item.names.join('+')}</b> [${item.size}]<br><small>${item.noodle||''} ${item.sauces.join(',')}</small> - $${item.price}</div><hr style="border:0.5px dashed #ccc">`; }).join(''); document.getElementById('total-sum').innerText = t; }
    function resetForNewItem() { tempItem={category:'', names:[], size:'', noodle:'', sauces:[], price:0}; document.querySelectorAll('.opt').forEach(o=>o.classList.remove('selected')); goNext('step-start'); }

    // --- 50B 傳輸模式 ---
    async function handlePrint50B() {
        const status = document.getElementById('status');
        const btn = document.getElementById('printBtn');
        const canvas = document.getElementById('printCanvas');
        const ctx = canvas.getContext('2d');
        let device = null;

        try {
            btn.disabled = true;
            status.innerText = "⏳ 生成影像...";
            canvas.height = 280 + (cart.length * 100); 
            ctx.fillStyle = "white"; ctx.fillRect(0, 0, 384, canvas.height);
            ctx.fillStyle = "black"; ctx.textAlign = "center";
            ctx.font = "bold 34px sans-serif"; ctx.fillText("Million Noodles", 192, 50);
            ctx.textAlign = "left"; ctx.font = "26px sans-serif";
            let y = 100;
            cart.forEach((item, i) => {
                ctx.fillText(`#${i+1} ${item.names.join('+')} (${item.size})`, 10, y); y += 40;
                ctx.font = "22px sans-serif"; ctx.fillText(`  ${item.noodle||''} ${item.sauces.join(',')}`, 10, y); y += 50;
                ctx.font = "26px sans-serif";
            });
            ctx.fillText("----------------------------", 10, y); y += 40;
            ctx.font = "bold 32px sans-serif"; ctx.fillText("TOTAL: $" + document.getElementById('total-sum').innerText, 10, y);

            status.innerText = "🔍 連線 Printer001...";
            device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: ['0000ffe0-0000-1000-8000-00805f9b34fb'] 
            });

            const server = await device.gatt.connect();
            const service = await server.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
            const characteristic = await service.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');

            status.innerText = "🚀 列印中 (50B 穩定模式)...";
            const imgData = ctx.getImageData(0, 0, 384, canvas.height);
            const pixels = imgData.data;
            const widthBytes = 384 / 8;

            await characteristic.writeValue(new Uint8Array([0x1B, 0x40]));

            for (let y = 0; y < canvas.height; y++) {
                let row = new Uint8Array(8 + widthBytes);
                row.set([0x1D, 0x76, 0x30, 0, widthBytes, 0, 1, 0]);
                for (let x = 0; x < widthBytes; x++) {
                    let b = 0;
                    for (let bit = 0; bit < 8; bit++) {
                        let idx = ((y * 384) + (x * 8 + bit)) * 4;
                        if (pixels[idx] < 128) b |= (1 << (7 - bit));
                    }
                    row[8 + x] = b;
                }
                
                // --- 改用 50 字節一包 ---
                for (let i = 0; i < row.length; i += 40) {
                    await characteristic.writeValue(new Uint8Array(row.slice(i, i + 40)));
                }
                
                if (y % 8 === 0) await new Promise(r => setTimeout(r, 12));
            }

            status.innerText = "✂️ 正在切紙...";
            // 走紙指令 (走 6 行)
            await characteristic.writeValue(new Uint8Array([0x1B, 0x64, 0x06]));
            // 切紙指令 (GS V 0)
            await characteristic.writeValue(new Uint8Array([0x1D, 0x56, 0x00]));

            status.innerText = "✅ 完成！";
            cart = []; updateCartDisplay(); btn.disabled = false; resetForNewItem();
            await device.gatt.disconnect();

        } catch (e) {
            status.innerText = "❌ 失敗: " + e.message;
            btn.disabled = false;
            if (device && device.gatt.connected) device.gatt.disconnect();
        }
    }
    init();
</script>
</body>
</html>
